    - date: "1944-04-15"
      date_display: ""
      content: "史迪威向廖耀湘谈话问是否因为蒋介石命令才不前进，廖耀湘予以否认。"
      source: "Stillwell's Command Problems P212"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-04-23"
      date_display: ""
      content: "史迪威以书面命令下达了迂回卡马英的命令 不久廖耀湘与孙立人共同向史迪威抗议此命令不适当"
      source: "Stillwell's Command Problems P206"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-04-24"
      date_display: "4月24日至月底"
      content: "廖本人的指挥部不断向前移动 但并未发起进攻 据一个装甲高级军官说是蒋介石不允许进攻"
      source: "Stillwell's Command Problems P208"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-05"
      date_display: ""
      content: "率部先后攻克瓦康、瓦拉渣、马拉高、英克塘和拉其卡五个据点，取得孟拱河谷攻坚战的胜利。"
      source: "中华民国驻印军缅北会战经过概要"
