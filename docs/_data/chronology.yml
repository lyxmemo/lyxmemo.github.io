- year: 1944
  entries:
    - date: "1944-01"
      date_display: ""
      content: "所属六十五团聚歼日军五十五联队第三大队于百贼河南岸。克大洛。"
      source: "中华民国驻印军缅北会战经过概要; 缅北百贼河之役（邱中岳）"
      source_url: "/battles_history/1945/中华民国驻印军缅北会战经过概要.html; /battles_history/1944/缅北百贼河之役（邱中岳）.html"
      original_text: ""
      notes: ""
    - date: "1944-01-09"
      date_display: ""
      content: "收到最高当局电令指责傅宗良擅改作战计划，要求撤换。廖耀湘召集副师长李涛、赵霞及参谋长刘建章磋商后，决定一肩承担责任，向上谎称已事先批准傅团长行动，同时派李涛飞赴前线大力支持傅宗良继续作战。"
      source: "缅北百贼河之役（邱中岳）"
      source_url: "/battles_history/1944/缅北百贼河之役（邱中岳）.html"
      original_text: "廖先生乃于一月九日下午，召集副师长李涛将军、副师长兼政战部主任赵霞将军及参谋长刘建章将军等，几经磋商，决定采取以下诸步骤，对上的责任，由廖先生一肩承担，对傅团长的作战行动则大力支持"
      notes: ""
    - date: "1944-01-19"
      date_display: ""
      content: "新22师66团驰援新38师114团 廖耀湘表达了对空投补给的担忧"
      source: "P134"
      source_url: "https://history.army.mil/portals/143/Images/Publications/catalog/9-2.pdf"
      original_text: ""
      notes: ""
