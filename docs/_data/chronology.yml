      date_display: ""
      content: "率部向孟关、大洛之线转进，掩护军之撤退，入野人山，适逢雨季，部队死伤惨重。"
      source: "杜聿明电蒋中正现廖耀湘余韶孙立人各部正向密支那北进中; 杜聿明电蒋中正现戴安澜余韶廖耀湘等部调遣位置"
