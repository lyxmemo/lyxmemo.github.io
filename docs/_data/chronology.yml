      content: "蒋中正电何应钦，批准蒙巴顿将军经过昆明时授予廖耀湘英国勋章，廖耀湘为受勋第一名。"
      source: "蒋中正电何应钦以蒙巴顿将军经过昆明希届时妥为招待彼于留昆期内授予廖耀湘勋章业经批准"
