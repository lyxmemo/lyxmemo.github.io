      source: "華僑日報"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=4&searchId=caecc4e1c3014ef1a3c30dbeb9080e8f&catalogueId=25d5e6229cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
