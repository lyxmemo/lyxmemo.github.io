    - date: ""
      date_display: "1月初"
      content: "新22师乘车至前线接替新38师，对胡康河谷之敌展开攻击。"
      source: "中华民国驻印军缅北会战经过概要; 郑洞国电蒋中正据廖耀湘电报告新三十二师部署状况"
