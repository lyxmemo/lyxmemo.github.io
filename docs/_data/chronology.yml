      content: "新22师抵达Chishidu"
      source: "Stillwell's Command Problems P210"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-06-01"
      date_display: "6月1日至9日"
      content: "廖耀湘下令以一加强步兵团自马拉高向西大迂回敌后，截断日军交通线，师主力自正面全面压迫，将日军第十八师团主力包围于索卡道以北、南亚色以东沼泽地带。历时九昼夜，至六月九日正午第六十四团第三营张志良营长与前线部队握手会师，全歼被围之敌。"
      source: "索卡道之役之作战经过概要（邱中岳）"
      source_url: "/battles_history/1944/索卡道之役之作战经过概要（邱中岳）.html"
      original_text: "师即以一加强步兵团，自马拉高向西，经二二九五高地、沿拉西河、南亚色溪向南，至魏家向东，迂回敌后，截断敌军交通线后，师主力自敌军正面全面压迫，将敌包围于索卡道附近地区而击灭之。"
      notes: ""
    - date: "1944-06-09"
      date_display: ""
      content: "率部围研索卡道地区日军五千余人，生俘樱井中队长。蒋介石在电报中以「中国虎」三字予以称许，并嘉奖新编第22师虎旗一面。"
      source: "中华民国驻印军缅北会战经过概要; 索卡道之役之作战经过概要（邱中岳）"
      source_url: "/battles_history/1945/中华民国驻印军缅北会战经过概要.html; /battles_history/1944/索卡道之役之作战经过概要（邱中岳）.html"
      original_text: ""
      notes: ""
    - date: "1944-06-16"
      date_display: ""
      content: "率部攻克卡盟（卡马英），与新编第38师及英军空降第7师7旅会师，完成缅北反攻战的第一阶段胜利。"
      source: "中华民国驻印军缅北会战经过概要; 郑洞国回忆录：缅北反攻（上）; 廖耀湘致蒋中正卡马英会战大捷"
      source_url: "/battles_history/1945/中华民国驻印军缅北会战经过概要.html; /battles_history/1944/郑洞国回忆录：缅北反攻（上）（郑洞国）.html; /liaos_tele/1944-06-30廖耀湘致蒋中正卡马英会战大捷.html"
      original_text: ""
      notes: ""
    - date: "1944-07-03"
      date_display: ""
      content: "电军事委员会报告新二十二师缅北反攻以来伤亡统计：阵亡官53、兵1363，负伤官125、兵3472，失踪兵22，逃亡兵29，病故兵51。"
      source: "廖耀湘电军事委员会新二十二师参战起至目前止官兵伤亡脱逃损失数"
      source_url: "/liaos_tele/1944-07-03廖耀湘电军事委员会新二十二师参战起至目前止官兵伤亡脱逃损失数.html"
      original_text: "师参战起至目前止计亡官53兵1363，伤官125兵3472，失兵22，逃兵29，病故兵51。"
      notes: ""
    - date: "1944-08-05"
      date_display: ""
      content: "密支那克复。蒋中正电史迪威祝贺，请转郑洞国、孙立人、廖耀湘各将领暨全体官兵代达嘉勉之意。"
      source: "蒋中正电史迪威贺攻克密支那"
      source_url: "/liaos_tele/1944-08-05蒋中正电史迪威贺攻克密支那.html"
      original_text: "特电驰贺阁下之成功与盟军之胜利，并请转郑洞国、孙立人、廖耀湘各将领暨各师师长副师长参谋长及全体官兵代达余嘉勉之意为盼。"
      notes: ""
    - date: "1944-08"
      date_display: ""
      content: "以战功分别获颁美英及金质自由勋章、爵士司令级巴斯勋章和青天白日勋章。时中国驻印军编为新一军、新六军两个军，廖耀湘晋升新六军首任军长，统辖新二十二师、第十四师和第五十师。新六军利用雨季就战地加强训练，廖耀湘预测未来战场多为城镇村落，手撰《城镇村落战斗》，督导部队训练。"
      source: "中华民国驻印军缅北会战经过概要; 廖耀湘将军传略（刘建章 李珍）"
      source_url: "/battles_history/1945/中华民国驻印军缅北会战经过概要.html; /ten_year_memorial/廖耀湘将军传略（刘建章 李珍）.html"
      original_text: ""
      notes: ""
    - date: "1944-09-04"
      date_display: ""
      content: "升任新编第6军（辖第14师、第50师、新编第22师）中将军长。"
      source: "中华民国驻印军缅北会战经过概要; 廖耀湘将军传略（刘建章 李珍）; 廖耀湘电蒋中正新六军加迈组织成立尔后军属共三师公文均由军转达以免重復"
      source_url: "/battles_history/1945/中华民国驻印军缅北会战经过概要.html; /ten_year_memorial/廖耀湘将军传略（刘建章 李珍）.html; /liaos_tele/1944-09-16廖耀湘电蒋中正新六军加迈组织成立尔后军属共三师公文均由军转达以免重復.html"
      original_text: ""
      notes: ""
    - date: "1944-10-01"
      date_display: ""
      content: "英36师师长菲斯廷与中美军官视察孟关以南的Mu Valley地区，菲斯廷驾驶吉普火车行驶在曼德勒到密支那的铁轨上，廖耀湘陪同。 P78疑似還是廖耀湘"
      source: "中缅印战区盟军将帅图志P 076"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-11-01"
      date_display: ""
      content: "率部进抵伊洛瓦底江北岸。"
      source: "中华民国驻印军缅北会战经过概要; 郑洞国回忆录：缅北反攻（下）"
      source_url: "/battles_history/1945/中华民国驻印军缅北会战经过概要.html; /battles_history/1944/郑洞国回忆录：缅北反攻（下）（郑洞国）.html"
      original_text: ""
      notes: ""
    - date: "1944-11"
      date_display: "11月"
      content: "巡视英军前线时，获悉英军第三十六师在卡萨遭敌袭溃，立命一四八团及时增援破敌挽回颓势，并要求英军三十六师师长改以一八四团为主攻，尽速夺取卡萨以掩护军之西侧背安全。"
      source: "国军印缅作战回忆录（李珍）"
      source_url: "/battles_history/1944/国军印缅作战回忆录（李珍）.html"
      original_text: "适时新六军廖军长巡视英军前线，获悉此情，立命我一四八团及时增援破敌，才挽回颓势。随即要求英军三十六师师长，史莱姆中将改以一八四团为主攻，尽速夺取卡萨，以掩护军之西侧背安全。"
      notes: ""
    - date: "1944-11-05"
      date_display: ""
      content: "强渡伊洛瓦底江。"
      source: "中华民国驻印军缅北会战经过概要; 郑洞国回忆录：缅北反攻（下）"
