- year: 1906
  entries:
    - date: "1906-05-16"
      date_display: ""
      content: "出生于湖南邵阳县三民乡土桥村（今邵阳市新邵县酿溪回龙村）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：该日期依据廖氏族谱记载农历四月二十三日推算，墓碑日期为1906.04.12，亦有说法（《国民革命军第五军将官录》）为5月17日（农历四月二十四）出生。"
- year: 1911
  entries:
    - date: ""
      date_display: ""
      content: "正式从祖父在塾馆受业。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1916
  entries:
    - date: ""
      date_display: ""
      content: "入县立高等小学，习现代教育。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1920
  entries:
    - date: ""
      date_display: ""
      content: "县立小学毕业，考入长沙私立岳云中学。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1921
  entries:
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "注①：农历辛酉年葭月下浣谷旦，即民国十年农历十一月下旬某吉日。"
    - date: ""
      date_display: "春"
      content: "入岳云中学读书。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "冬"
      content: "撰写廖氏辛酉族谱序言。①"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1924
  entries:
    - date: "1924-05"
      date_display: ""
      content: "代表岳云中学参加第七届省运会（第二届华中运动会湖南预选赛），获长跑冠军。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1925
  entries:
    - date: "1925-01"
      date_display: ""
      content: "与汪青结婚。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1925-07"
      date_display: ""
      content: "与萧自诚、孙佐齐、肖竹轩等组织“合刚学友会”。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "夏"
      content: "岳云中学读高中二年级，因家贫辍学，南下报考黄埔军校，因错过第五期招生，就近从军，入赵恒惕属下的湖南陆军第三师叶开鑫部第三旅教导总队当学兵。年底考试在360名学兵中成绩名列第一。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1926
  entries:
    - date: "1926-05"
      date_display: ""
      content: "离开叶开鑫部，回邵阳筹集赴广州路费。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1926-06"
      date_display: ""
      content: "国民革命军北伐，湖南唐生智率部响应，称第八军。地方政府应其要求，征收军费捐款。三民乡配额三万元，指定应捐者遍及全乡，尤以酿溪沙湾为甚，民多怨言。廖耀湘、萧自诚等“合刚学友会”成员分赴全乡调查真相，发现浮收军费捐款多至十余万元，乃检举揭发，请求严惩不法。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1926-07"
      date_display: ""
      content: "考入黄埔军校长沙第三分校第六期骑兵科学习。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1928
  entries:
    - date: "1928-03"
      date_display: ""
      content: "黄埔军校迁入南京，更名中央陆军军官学校，简称中央军校。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1928-04"
      date_display: ""
      content: "转入该校继续习骑兵科。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1929
  entries:
    - date: "1929-05"
      date_display: ""
      content: "中央军校毕业，考入留法预备科，列入留法学生名单。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1929-08"
      date_display: ""
      content: "如中央陆军军官学校留学预备班学习。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1930
  entries:
    - date: "1930-05"
      date_display: ""
      content: "奉派法国。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1930-06"
      date_display: ""
      content: "入陆军第一预备学校高等科学习。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1930-08"
      date_display: ""
      content: "派任陆军军事专科学校准尉教育班长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1930-11"
      date_display: ""
      content: "入陆军骑兵学校轻型机械化部队指挥班学习。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "8-9月间"
      content: "以上士军衔工费赴法国留学。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1931
  entries:
    - date: "1931-08"
      date_display: ""
      content: "转入圣西尔陆军军官学校骑兵科学习。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1932
  entries:
    - date: ""
      date_display: ""
      content: "妻子汪青在邵阳老家病逝。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1933
  entries:
    - date: ""
      date_display: ""
      content: "加入复兴社（欧洲方面）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1934
  entries:
    - date: "1934-06"
      date_display: ""
      content: "军校毕业后派任法国陆军第14步兵师少尉副官。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1934-12-25"
      date_display: ""
      content: "复兴社成立支社并任干事及小组组长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: "在法国与黄寿仁之女黄伯溶女士结婚。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "同年"
      content: "著《法国骑辎专门学校组织设备概况》。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "注：黄伯溶系辛亥革命元勋黄兴（黄克强）之堂侄女。"
- year: 1935
  entries:
    - date: "1935-07"
      date_display: ""
      content: "独子廖定一出生。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1935-11"
      date_display: ""
      content: "调升法国陆军第1隘口龙骑兵团中尉代理排长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1935-12"
      date_display: ""
      content: "蒋百里赴法考察留学生，对其大为赞许。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1936
  entries:
    - date: "1936-10"
      date_display: ""
      content: "毕业回国。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1936-11-23"
      date_display: ""
      content: "派任中央陆军军官学校教导总队（总队长桂永清）骑兵队（队长王翰卿）第2连少校连长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1937
  entries:
    - date: "1937-04"
      date_display: ""
      content: "调任教导总队军士营（营长王公亮）学兵连少校连长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-05-01"
      date_display: ""
      content: "以教导总队骑兵连连长身份随艾尔伯特·德·斯坦法尼、蒋百里等赴各地考察，往复约三星期，沿途经上海、北京、太原、郑州、汉口、广州等地。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-05-08"
      date_display: ""
      content: "自北京至平地泉考察。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-05-14"
      date_display: ""
      content: "至太原。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-08-09"
      date_display: ""
      content: "叙任陆军骑兵少校。参加淞沪会战。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-10-25"
      date_display: ""
      content: "上海告陷，至书其父曰：“上海已不幸失守，改兵分三线直捣京城，为我民族五千年来之大难……男身受国恩、成仁赴义，此分内事也。”"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-11"
      date_display: ""
      content: "升任教导总队第2旅（旅长胡啟儒）中校参谋主任"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-12"
      date_display: ""
      content: "日军进攻南京，参加南京保卫战，率领学生防守南京北门。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-12-13"
      date_display: ""
      content: "南京陷敌，因未及撤离，陷困城内，辗转逃至下关江边，夜宿荒坟，避难栖霞寺，后被和广舒所救。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1938
  entries:
    - date: "1938-01"
      date_display: ""
      content: "国民党政府军事委员会成立机械化师（番号二〇〇师）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-01"
      date_display: ""
      content: "调升武汉卫戍总司令部（总司令陈诚）军官训练总队上校大队长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-02-22"
      date_display: ""
      content: "由南京脱险后抵天长（安徽境内）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-03"
      date_display: ""
      content: "调任200师（师长杜聿明）上校参谋长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-07-09"
      date_display: ""
      content: "晋任陆军骑兵中校。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-08-01"
      date_display: ""
      content: "升任少将参谋长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-10"
      date_display: ""
      content: "200师扩编为新11军，增编新22师（师长邱清泉），成立于湘潭。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-10-01"
      date_display: ""
      content: "调升新编第22师（师长邱清泉）少将副师长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-10-15"
      date_display: ""
      content: "前，于湖南桃源讲授火线构成阵地攻防（同时，蒋百里讲述精神道德注意点）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-10-17"
      date_display: ""
      content: "由戴笠保荐为考察驻外武官人选（驻法）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "2月初"
      content: "渡江至谢家店，奔浦镇，抵滁县，乘火车经蚌埠，达徐州，转车郑州而南，终抵武汉。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：据刘建章言，该年任N22D副师长兼64i团长，曾赴邵阳接兵，廖曾向邱清泉举荐刘建章任中校参谋。"
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：因其自南京后上书蒋介石，详陈建军方略，破格提升为二百师少将参谋长，成为国民党军中由中校越阶晋升少将第一人。"
    - date: ""
      date_display: "年末"
      content: "以南京保卫战为教训，著文《国军今后建军应有之改进》。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1939
  entries:
    - date: "1939-01"
      date_display: ""
      content: "新十一军加编荣誉第一师，改为第五军，仍担任新编第22师副师长，并任军干训班主任。新编第22师驻湖南东安整训，师部设黎家坪，创著《小部队战术》作为训练教材。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1939-03"
      date_display: ""
      content: "国民党军委会校阅第5军，将第五军军事训练列为西南各军第一，新编第22师列第5军第一。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1939-12"
      date_display: ""
      content: "以副师长、代理师长参加昆仑关战役并大捷，击毙号称“钢军”的日军第五师团第二十一旅团少将团长中村正雄。剧作家田汉捷后采访并誉其为北宋名将狄青。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1939-12-30"
      date_display: ""
      content: "攻克昆仑关，开攻坚克险之先声。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1940
  entries:
    - date: "1940-05-01"
      date_display: ""
      content: "参加陆军第5军贵南昆仑关战役阵亡将士追悼大会，题挽辞并致辞。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1940-05-07"
      date_display: ""
      content: "升任新编第22师（辖三团）少将师长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1940-08"
      date_display: ""
      content: "新22师长途行军至贵州芦山县，杜聿明检阅新22师。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "同年"
      content: "成立军士队，开学典礼当日从东安师部至白牙市军士队祝贺、训话。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "春"
      content: "部队集中东安整训，设立战术训练班任副主任（主任邱清泉）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1941
  entries:
    - date: "1941-06"
      date_display: ""
      content: "第5军移驻贵州及云南，新二十二师随军移驻。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1941-12"
      date_display: ""
      content: "随第5军入缅。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "冬"
      content: "N22D64i由湖南东安白牙市出发，沿湘黔公路到云南楚雄。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "年末"
      content: "到达楚雄。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1942
  entries:
    - date: "1942-03"
      date_display: ""
      content: "奉命随军远征印缅。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-01"
      date_display: ""
      content: "暂停开拔。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-08"
      date_display: ""
      content: "日军攻占仰光，分三路积极北进。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-14"
      date_display: ""
      content: "N22D在芒市待命。后在遮放集结。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-15"
      date_display: ""
      content: "N22D由遮放开始运输，乘便车至腊戍，改乘火车向曼德勒（不含）以东地区集中。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-19"
      date_display: ""
      content: "率N22D经腊戍、曼德勒到达缅甸皎楼（皎栖Kuyaukse）集结待命。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-21"
      date_display: ""
      content: "推进至淡文伊、苗拉林之线，占领阵地。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-22"
      date_display: ""
      content: "在曼德勒附近集结完毕，23日即可向平满那输送。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-25"
      date_display: ""
      content: "N22D先头部队与敌143联队在同古以北之叶达西接触。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-27"
      date_display: ""
      content: "N22D师主力逐次集结，向叶达西推进。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-28"
      date_display: ""
      content: "夜，到达同古以北之南阳车站附近，与敌遭遇并交战。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-29"
      date_display: ""
      content: "攻克南阳车站。后敌增援反扑易手。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-30"
      date_display: ""
      content: "奉命率部守于叶达西至平蛮纳地区，掩护军在平满那会战，阻止日军北进达20余日之久。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-04-16"
      date_display: ""
      content: "因右翼英军败退，平蛮纳阵地侧背暴露，只得率部正面与日军作战，阻敌前进。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-04-16"
      date_display: ""
      content: "N22D奉命以64i守瓢背、65i增援赫河、师主力控制于他希。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-04-20"
      date_display: ""
      content: "罗衣考与平满那失守。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-04-25"
      date_display: ""
      content: "64i与敌在瓢背激战竟日，黄昏后向北转移。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-04-25"
      date_display: ""
      content: "雷列姆陷敌。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-04-28"
      date_display: ""
      content: "细包、南马被陷。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-04-29"
      date_display: ""
      content: "转进至曼德勒，知腊戍失守后仓促撤离曼德勒。欲渡伊洛瓦底江向密支那转进。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-05"
      date_display: ""
      content: "率部向孟关、大洛之线转进，掩护军之撤退，入野人山，适逢雨季，部队死伤惨重。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-05-01"
      date_display: ""
      content: "新维陷敌。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-05-01"
      date_display: ""
      content: "掩护全军向曼德勒西北之新果转进。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-05-04"
      date_display: ""
      content: "全师渡伊洛瓦底江，始告脱离战场。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-05-05"
      date_display: ""
      content: "八莫陷敌。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-05-08"
      date_display: ""
      content: "密支那陷敌。被迫向野人山转进。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-05-14"
      date_display: ""
      content: "至堪地，渡更的宛江。自此进入野人山。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-06-29"
      date_display: ""
      content: "抵达哈巴寨。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-08-05"
      date_display: ""
      content: "抵达印度东境小镇列多，编入中国驻印军，新编第22师隶属新编第1军。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-09"
      date_display: ""
      content: "进驻印度比哈尔省蓝姆伽整训。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: "详情及部署：师沿仰曼铁路担任正面攻击，三团及师直属部队分四梯次乘火车南下同古，增援二百师，以解同古二百师之围。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: "详情及部署：晨向敌攻击，晚右翼64i在南阳车站北端附近与敌（55师团之运输营）发生遭遇，师即下车配置，64i、65i分别于仰曼铁路两侧展开，激战数小时后64i占领沙洼地附近村落数处，虏敌战马颇多。65i猛攻南阳车站，激战彻夜。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: "详情及部署：66i担任叶达西之线的守备、64i转进至沙加雅东西之线占领阵地、65i在斯瓦东西之线占领阵地。激战三日四夜后，66i在64i掩护下转进至苗拉东西之线占领阵地，65i自斯瓦转进至耶尼东西之线占领阵地。三个团依次相互掩护，向平满那西北转进。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "同年"
      content: "戴安澜将军去世，率新22师全体挽戴安澜。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1943
  entries:
    - date: "1943-09"
      date_display: ""
      content: "奉命率部集结列多，准备反攻。手著《森林作战法》，用于军事演练。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1943-10"
      date_display: ""
      content: "第二次缅甸战役打响。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1943-11-30"
      date_display: ""
      content: "与蒋介石访问驻印军会餐和交谈"
      source: "P123"
      source_url: "https://history.army.mil/portals/143/Images/Publications/catalog/9-2.pdf"
      original_text: ""
      notes: ""
- year: 1944
  entries:
    - date: "1944-01"
      date_display: ""
      content: "所属六十五团聚歼日军五十五联队第三大队于百贼河南岸。克大洛。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-01-19"
      date_display: ""
      content: "新22师66团驰援新38师114团 廖耀湘表达了对空投补给的担忧"
      source: "P134"
      source_url: "https://history.army.mil/portals/143/Images/Publications/catalog/9-2.pdf"
      original_text: ""
      notes: ""
    - date: "1944-01-20"
      date_display: ""
      content: "手书一封（傅宗良）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-01-20"
      date_display: ""
      content: "史迪威对廖耀湘说要枪毙傅宗良（，援引史迪威日记）"
      source: "Stillwell's Command Problems  P137"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-01-21"
      date_display: ""
      content: "Memo, Liao for Stillwell （引用部分）"
      source: "Stillwell's Command Problems  P137"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-01-23"
      date_display: ""
      content: "新22师歼灭55联队第3营"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-02-18"
      date_display: ""
      content: "廖耀湘与史迪威前往66团视察缴获日军文件（）"
      source: "Stillwell's Command Problems P145"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-03-05"
      date_display: ""
      content: "率部攻克孟关，歼灭日军号称“丛林之王”的第18师团主力、取得胡康河谷作战大捷。盟军东南亚战区最高司令官、英国海军上将蒙巴顿勋爵亲临孟关表示祝贺。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-03-19"
      date_display: ""
      content: "攻克间布班山隘口。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-03-21"
      date_display: ""
      content: "66团坦克进攻失败，64团包抄迂回成功（廖在他的西侧为坦克开辟了一条绕行道路）"
      source: "Stillwell's Command Problems P187"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-03-29"
      date_display: ""
      content: "占据整个间布班山区。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-03-29"
      date_display: ""
      content: "65团攻克Shaduzup"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-04-15"
      date_display: ""
      content: "新22师总计阵亡650人，受伤2000人。"
      source: "Stillwell's Command Problems P188"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-04-15"
      date_display: ""
      content: "史迪威向廖耀湘谈话问是否因为蒋介石命令才不前进，廖耀湘予以否认。"
      source: "Stillwell's Command Problems P212"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-04-23"
      date_display: ""
      content: "史迪威以书面命令下达了迂回卡马英的命令 不久廖耀湘与孙立人共同向史迪威抗议此命令不适当"
      source: "Stillwell's Command Problems P206"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-04-24"
      date_display: "4月24日至月底"
      content: "廖本人的指挥部不断向前移动 但并未发起进攻 据一个装甲高级军官说是蒋介石不允许进攻"
      source: "Stillwell's Command Problems P208"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-05"
      date_display: ""
      content: "率部先后攻克瓦康、瓦拉渣、马拉高、英克塘和拉其卡五个据点，取得孟拱河谷攻坚战的胜利。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-05-01"
      date_display: ""
      content: "廖耀湘、李涛、刘建章、卡尔史密斯研究地图"
      source: "中缅印战区盟军将帅图志P263"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-05-04"
      date_display: ""
      content: "史迪威日记抱怨廖和孙都拒绝前进（史迪威日记）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-05-05"
      date_display: ""
      content: "廖耀湘见史迪威，长谈，廖耀湘表示连级军官的损失很大，他无法前进（史迪威日记）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-05-12"
      date_display: ""
      content: "郑洞国电蒋中正转发廖耀湘电：新二二师参战以来伤亡三千六百人以上，补充甚微，且官兵疲惫，加以史迪威分散国军兵力，以此疲惫之军续攻，久之恐生意外（国史馆）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-05-19"
      date_display: ""
      content: "廖将65团调至前线，延长了64团的右翼，并将66团派往更西"
      source: "Stillwell's Command Problems P210"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-05-24"
      date_display: ""
      content: "史迪威为廖耀湘授予锦旗“间本布”“瓦康”。"
      source: "東南日報 1944.05.26 第2版"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dnrb19440526-01.1.2"
      original_text: ""
      notes: ""
    - date: "1944-05-27"
      date_display: ""
      content: "新22师抵达Chishidu"
      source: "Stillwell's Command Problems P210"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-06-09"
      date_display: ""
      content: "率部围研索卡道地区日军五千余人，生俘樱井中队长。蒋介石在电报中以“中国虎”三字予以称许，并嘉奖新编第22师虎旗一面。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-06-16"
      date_display: ""
      content: "率部攻克卡盟（卡马英），与新编第38师及英军空降第7师7旅会师，完成缅北反攻战的第一阶段胜利。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-08"
      date_display: ""
      content: "以战功分别获颁美英及金质自由勋章、爵士司令级巴斯勋章和青天白日勋章。时中国驻印军编为新一军、新六军两个军，廖耀湘晋升新六军首任军长，统辖新二十二师、第十四师和第五十师。新六军利用雨季就战地加强训练，廖耀湘预测未来战场多为城镇村落，手撰《城镇村落战斗》，督导部队训练。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-09-04"
      date_display: ""
      content: "升任新编第6军（辖第14师、第50师、新编第22师）中将军长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-10-01"
      date_display: ""
      content: "英36师师长菲斯廷与中美军官视察孟关以南的Mu Valley地区，菲斯廷驾驶吉普火车行驶在曼德勒到密支那的铁轨上，廖耀湘陪同。 P78疑似還是廖耀湘"
      source: "中缅印战区盟军将帅图志P 076"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-11-01"
      date_display: ""
      content: "率部进抵伊洛瓦底江北岸。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-11-05"
      date_display: ""
      content: "强渡伊洛瓦底江。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-11-07"
      date_display: ""
      content: "率部攻克瑞古（史维古），向瑞丽河之线推进。于缅北前线著《欣闻知识青年从军有感》。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-11-23"
      date_display: ""
      content: "与蒙大拿州众议员Michael J. Mansfield见面。"
      source: "FRUS, 1945, The Far East, China, Vol.VII"
      source_url: "https://history.state.gov/historicaldocuments/frus1945v07/d2"
      original_text: ""
      notes: ""
    - date: "1944-11-30"
      date_display: ""
      content: "与索尔登、坎农商讨进攻密支那计划"
      source: "中缅印战区盟军将帅图志P250"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-12"
      date_display: ""
      content: "新六军大部空降云南沾益，日军闻风后撤，廖耀湘率部驻节曲靖。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "1月初"
      content: "新22师乘车至前线接替新38师，对胡康河谷之敌展开攻击。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: "随后与新38师于八莫会师，扫灭日军56联队，强渡瑞丽河，连克曼纳、派来和贵街三大据点，迫使日军由南坎向芒密总退却。此时的国内战场，日寇进犯独山，贵阳告急，重庆震动。廖耀湘奉命率新六军回国驰援，留置第50师协同新1军继续打通中印公路。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "同年"
      content: "报纸登载其文《胜利的一年》。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1945
  entries:
    - date: "1945-01"
      date_display: ""
      content: "青年军207师编入新编第6军。"
      source: ""
