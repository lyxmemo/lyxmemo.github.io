      notes: ""
    - date: "1942-05-05"
      date_display: ""
      content: "八莫陷敌。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-05-08"
      date_display: ""
      content: "杜聿明下令收容伤病员，廖耀湘率新二十二师负责沿途收容掩护，将能走动的伤病员编入部队行军。"
      source: "1942年缅甸作战回忆（邓军林）"
      source_url: "/battles_history/1942/1942年缅甸作战回忆（邓军林）.html"
      original_text: "杜聿明下令收容伤病员……师长廖耀湘负责沿途收容掩护"
      notes: ""
    - date: "1942-05-08"
      date_display: ""
      content: "密支那陷敌。被迫向野人山转进。"
      source: "林蔚电蒋中正报告廖耀湘余韶两师续向密支那北进戴安澜部已过眉苗"
      source_url: "/liaos_tele/1942-05-08林蔚电蒋中正报告廖耀湘余韶两师续向密支那北进戴安澜部已过眉苗等情中途如遇敌拟迎头痛击.html"
      original_text: ""
      notes: ""
    - date: "1942-05-14"
      date_display: ""
      content: "至堪地，渡更的宛江。自此进入野人山。"
      source: "杜聿明电蒋中正由康地出发半途被阻等情将疾病落伍官兵收容后即向指定地点前进; 新二十二师缅南作战纪要（郭修甲）"
      source_url: "/liaos_tele/1942-06-15杜聿明电蒋中正由康地出发半途被阻等情将疾病落伍官兵收容后即向指定地点前进.html; /battles_history/1942/新二十二师缅南作战纪要（郭修甲）.html"
      original_text: "五月十四日至堪地，渡更的宛江（因该日是我师转进野人山之始，印象深刻，时日地点，犹记未忘）"
      notes: ""
    - date: "1942-05-24"
      date_display: ""
      content: "65团向龙京、帕干袭击日军，敌受创甚重。"
      source: "蒋中正电俞飞鹏接杜聿明电廖耀湘师六十五团二十四日向龙京帕干袭击敌受创甚重"
      source_url: "/liaos_tele/1942-05-29蒋中正电俞飞鹏接杜聿明电廖耀湘师六十五团二十四日向龙京帕干袭击敌受创甚重等两点情形并请设法联络杜聿明.html"
      original_text: ""
      notes: "按：该电标题提及廖耀湘师六十五团二十四日向龙京帕干袭击，敌受创甚重。原电文待录入。"
    - date: "1942-05-26"
      date_display: ""
      content: "戴安澜师长伤重殉国。率新22师全体挽戴安澜。"
      source: "徐永昌日记（节选与廖耀湘有关片段）; 蒋中正电杜聿明闻戴安澜殉职无任悲哀"
      source_url: "/ten_year_memorial/徐永昌日记（节选与廖耀湘有关片段）.html#194261-戴安澜将军殉国与各方战报; /liaos_tele/1942-06-01蒋中正电杜聿明闻戴安澜殉职无任悲哀凡接近国境各部应即严令其就近回国.html"
      original_text: "据高副师长卅电称，戴师长伤重，于廿六晚十时四十五分在孟密特北殉国"
      notes: "按：杜聿明世申电中引高副师长（高吉人）电报，戴安澜于5月26日晚10时45分殉国。"
    - date: "1942-05-30"
      date_display: "5月30日前后"
      content: "杜聿明电蒋中正遵即先向列多转进。"
