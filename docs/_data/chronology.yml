- year: 1906
  entries:
    - date: "1906-05-16"
      date_display: ""
      content: "出生于湖南邵阳县三民乡土桥村（今邵阳市新邵县酿溪回龙村）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：该日期依据廖氏族谱记载农历四月二十三日推算，墓碑日期为1906.04.12，亦有说法（《国民革命军第五军将官录》）为5月17日（农历四月二十四）出生。"
- year: 1909
  entries:
    - date: ""
      date_display: ""
      content: "约三四岁，深得祖父喜爱，祖父开始在私塾中教他读书。"
      source: "乡亲传颂二三事（陈希桥）"
      source_url: "/ten_year_memorial/乡亲传颂二三事（陈希桥）.html"
      original_text: "出生时其父为之取名'建楚'。三、四岁时长得天真活泼，深得祖父喜爱"
      notes: ""
- year: 1911
  entries:
    - date: ""
      date_display: ""
      content: "正式从祖父在塾馆受业。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: "约五岁，与堂兄廖昌仕（时年九岁）同在院子里的启蒙馆读书。"
      source: "廖耀湘在启蒙馆（廖昌仕 廖鹏程）"
      source_url: "/ten_year_memorial/廖耀湘在启蒙馆（廖昌仕 廖鹏程）.html"
      original_text: "那时我九岁，他才五岁，同在院子里的启蒙馆读书"
      notes: ""
    - date: ""
      date_display: ""
      content: "五六岁时，四书五经中的部分篇章便能朗朗上口。"
      source: "乡亲传颂二三事（陈希桥）"
      source_url: "/ten_year_memorial/乡亲传颂二三事（陈希桥）.html"
      original_text: "五、六岁时，四书、五经中的部分篇章，便能朗朗上口"
      notes: ""
- year: 1914
  entries:
    - date: ""
      date_display: ""
      content: "约八岁，祖父不顾其父反对，坚持送他到宝庆城里五台庵小学读书，并为之改名「耀湘」。"
      source: "乡亲传颂二三事（陈希桥）"
      source_url: "/ten_year_memorial/乡亲传颂二三事（陈希桥）.html"
      original_text: "八岁时，祖父想送他到宝庆城里小学读书……为之改名'耀湘'"
      notes: ""
- year: 1916
  entries:
    - date: ""
      date_display: ""
      content: "入县立高等小学，习现代教育。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1920
  entries:
    - date: ""
      date_display: ""
      content: "县立小学毕业，考入长沙私立岳云中学。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1921
  entries:
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "注①：农历辛酉年葭月下浣谷旦，即民国十年农历十一月下旬某吉日。"
    - date: ""
      date_display: "春"
      content: "入岳云中学读书。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "冬"
      content: "撰写廖氏辛酉族谱序言。①"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1924
  entries:
    - date: "1924-05"
      date_display: ""
      content: "代表岳云中学参加第七届省运会（第二届华中运动会湖南预选赛），获长跑冠军。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1925
  entries:
    - date: "1925-01"
      date_display: ""
      content: "与汪青结婚。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1925-07"
      date_display: ""
      content: "与萧自诚、孙佐齐、肖竹轩等组织「合刚学友会」。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "夏"
      content: "岳云中学读高中二年级，因家贫辍学，南下报考黄埔军校，因错过第五期招生，就近从军，入赵恒惕属下的湖南陆军第三师叶开鑫部第三旅教导总队当学兵。年底考试在360名学兵中成绩名列第一。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1926
  entries:
    - date: "1926-05"
      date_display: ""
      content: "离开叶开鑫部，回邵阳筹集赴广州路费。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1926-06"
      date_display: ""
      content: "国民革命军北伐，湖南唐生智率部响应，称第八军。地方政府应其要求，征收军费捐款。三民乡配额三万元，指定应捐者遍及全乡，尤以酿溪沙湾为甚，民多怨言。廖耀湘、萧自诚等「合刚学友会」成员分赴全乡调查真相，发现浮收军费捐款多至十余万元，乃检举揭发，请求严惩不法。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1926-07"
      date_display: ""
      content: "考入黄埔军校长沙第三分校第六期骑兵科学习。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1928
  entries:
    - date: "1928-03"
      date_display: ""
      content: "黄埔军校迁入南京，更名中央陆军军官学校，简称中央军校。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1928-04"
      date_display: ""
      content: "转入该校继续习骑兵科。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1929
  entries:
    - date: "1929-05"
      date_display: ""
      content: "中央军校毕业，考入留法预备科，列入留法学生名单。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1929-08"
      date_display: ""
      content: "如中央陆军军官学校留学预备班学习。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1930
  entries:
    - date: "1930-05"
      date_display: ""
      content: "奉派法国。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1930-06"
      date_display: ""
      content: "入陆军第一预备学校高等科学习。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1930-08"
      date_display: ""
      content: "派任陆军军事专科学校准尉教育班长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1930-11"
      date_display: ""
      content: "入陆军骑兵学校轻型机械化部队指挥班学习。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "8-9月间"
      content: "以上士军衔工费赴法国留学。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1931
  entries:
    - date: "1931-08"
      date_display: ""
      content: "转入圣西尔陆军军官学校骑兵科学习。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1932
  entries:
    - date: ""
      date_display: ""
      content: "妻子汪青在邵阳老家病逝。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1933
  entries:
    - date: ""
      date_display: ""
      content: "加入复兴社（欧洲方面）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1934
  entries:
    - date: "1934-06"
      date_display: ""
      content: "军校毕业后派任法国陆军第14步兵师少尉副官。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1934-12-25"
      date_display: ""
      content: "复兴社成立支社并任干事及小组组长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: "在法国与黄寿仁之女黄伯溶女士结婚。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "同年"
      content: "著《法国骑辎专门学校组织设备概况》。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "注：黄伯溶系辛亥革命元勋黄兴（黄克强）之堂侄女。"
- year: 1935
  entries:
    - date: "1935-07"
      date_display: ""
      content: "独子廖定一出生。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1935-11"
      date_display: ""
      content: "调升法国陆军第1隘口龙骑兵团中尉代理排长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1935-12"
      date_display: ""
      content: "蒋百里赴法考察留学生，对其大为赞许。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1936
  entries:
    - date: "1936-10"
      date_display: ""
      content: "毕业回国。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1936-11-23"
      date_display: ""
      content: "派任中央陆军军官学校教导总队（总队长桂永清）骑兵队（队长王翰卿）第2连少校连长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1937
  entries:
    - date: "1937-04"
      date_display: ""
      content: "调任教导总队军士营（营长王公亮）学兵连少校连长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-05-01"
      date_display: ""
      content: "以教导总队骑兵连连长身份随艾尔伯特·德·斯坦法尼、蒋百里等赴各地考察，往复约三星期，沿途经上海、北京、太原、郑州、汉口、广州等地。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-05-08"
      date_display: ""
      content: "自北京至平地泉考察。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-05-14"
      date_display: ""
      content: "至太原。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-08-09"
      date_display: ""
      content: "叙任陆军骑兵少校。参加淞沪会战。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-10-25"
      date_display: ""
      content: "上海告陷，至书其父曰：「上海已不幸失守，改兵分三线直捣京城，为我民族五千年来之大难……男身受国恩、成仁赴义，此分内事也。」"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-11"
      date_display: ""
      content: "升任教导总队第2旅（旅长胡啟儒）中校参谋主任"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-12"
      date_display: ""
      content: "日军进攻南京，参加南京保卫战，率领学生防守南京北门。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1937-12-13"
      date_display: ""
      content: "南京陷敌，因未及撤离，陷困城内，辗转逃至下关江边，夜宿荒坟，避难栖霞寺，后被和广舒所救。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1938
  entries:
    - date: "1938-01"
      date_display: ""
      content: "国民党政府军事委员会成立机械化师（番号二〇〇师）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-01"
      date_display: ""
      content: "调升武汉卫戍总司令部（总司令陈诚）军官训练总队上校大队长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-02-22"
      date_display: ""
      content: "由南京脱险后抵天长（安徽境内）。"
      source: "; 钱大钧电蒋中正廖耀湘已脱险到天长"
      source_url: "; /liaos_tele/1938-02-26钱大钧电蒋中正廖耀湘已脱险到天长.html"
      original_text: ""
      notes: ""
    - date: "1938-03"
      date_display: ""
      content: "调任200师（师长杜聿明）上校参谋长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-07-09"
      date_display: ""
      content: "晋任陆军骑兵中校。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-08-01"
      date_display: ""
      content: "升任少将参谋长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-10"
      date_display: ""
      content: "200师扩编为新11军，增编新22师（师长邱清泉），成立于湘潭。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-10-01"
      date_display: ""
      content: "调升新编第22师（师长邱清泉）少将副师长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1938-10-15"
      date_display: ""
      content: "前，于湖南桃源讲授火线构成阵地攻防（同时，蒋百里讲述精神道德注意点）。"
      source: "; 蒋百里致蒋介石史丹发尼前往桃源讲学"
      source_url: "; /liaos_tele/1938-10-15蒋百里致蒋介石史丹发尼前往桃源讲学.html"
      original_text: ""
      notes: ""
    - date: ""
      date_display: "2月初"
      content: "渡江至谢家店，奔浦镇，抵滁县，乘火车经蚌埠，达徐州，转车郑州而南，终抵武汉。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：据刘建章言，该年任N22D副师长兼64i团长，曾赴邵阳接兵，廖曾向邱清泉举荐刘建章任中校参谋。"
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：因其自南京后上书蒋介石，详陈建军方略，破格提升为二百师少将参谋长，成为国民党军中由中校越阶晋升少将第一人。"
    - date: ""
      date_display: "年末"
      content: "以南京保卫战为教训，著文《国军今后建军应有之改进》。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1939
  entries:
    - date: "1939-01"
      date_display: ""
      content: "新十一军加编荣誉第一师，改为第五军，仍担任新编第22师副师长，并任军干训班主任。新编第22师驻湖南东安整训，师部设黎家坪，创著《小部队战术》作为训练教材。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1939-03"
      date_display: ""
      content: "国民党军委会校阅第5军，将第五军军事训练列为西南各军第一，新编第22师列第5军第一。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1939-10-17"
      date_display: ""
      content: "由戴笠保荐为考察驻外武官人选（驻法）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1939-12"
      date_display: ""
      content: "以副师长、代理师长参加昆仑关战役并大捷，击毙号称「钢军」的日军第五师团第二十一旅团少将团长中村正雄。剧作家田汉捷后采访并誉其为北宋名将狄青。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1939-12-08"
      date_display: ""
      content: "桂林行营迁江指挥所电令第五军收复昆仑关，军参谋长黄翔以电话传达命令，新编第二十二师方面由廖耀湘副师长接电话。"
      source: "关于昆仑关战役的回忆（黄翔）"
      source_url: "/battles_history/1939/关于昆仑关战役的回忆（黄翔）.html"
      original_text: "到12月8日桂林行营迁江指挥所发来电令，命令第五军收复昆仑关……接电话的，第二十二师方面是廖耀湘副师长"
      notes: ""
    - date: "1939-12-18"
      date_display: ""
      content: "第五军对昆仑关发起总攻，新编第二十二师于拂晓作为右翼队出发迂回，上午十时攻克六塘，上午十一时夺取五塘，切断敌后方交通。"
      source: "昆仑关战役（邓军林）"
      source_url: "/battles_history/1939/昆仑关战役（邓军林）.html"
      original_text: "右翼队（新二十二师）于十八日拂晓发起攻击，从昆仑关西侧迂回到五塘及六塘之西南侧"
      notes: ""
    - date: "1939-12-30"
      date_display: ""
      content: "攻克昆仑关，开攻坚克险之先声。新编第二十二师六十五团首先冲入昆仑关，肃清守敌。"
      source: "徐庭瑶电蒋中正高峰隘昆仑关及653之线已于昨卅一日完全克复; 白崇禧呈蒋中正桂南会战第一期作战经过概要"
      source_url: "/liaos_tele/1939-12-31徐庭瑶电蒋中正高峰隘昆仑关及653之线已于昨卅一日完全克复.html; /liaos_tele/1940-01-02白崇禧呈蒋中正桂南会战第一期作战经过概要.html"
      original_text: ""
      notes: "按：徐庭瑶电报称「昨卅一日完全克复」，即克复日期为12月31日，与本条目日期12月30日有一日之差，待考。"
- year: 1940
  entries:
    - date: "1940-05-01"
      date_display: ""
      content: "参加陆军第5军贵南昆仑关战役阵亡将士追悼大会，题挽辞并致辞。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1940-05-07"
      date_display: ""
      content: "升任新编第22师（辖三团）少将师长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1940-08"
      date_display: ""
      content: "新22师长途行军至贵州芦山县，杜聿明检阅新22师。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "同年"
      content: "成立军士队，开学典礼当日从东安师部至白牙市军士队祝贺、训话。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "春"
      content: "部队集中东安整训，设立战术训练班任副主任（主任邱清泉）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1941
  entries:
    - date: "1941-04"
      date_display: ""
      content: "父亲廖显悌去世。廖耀湘以新22师少将师长身份回乡奔丧。"
      source: "乡亲传颂二三事（陈希桥）; 廖耀湘将军传略（刘建章 李珍）"
      source_url: "/ten_year_memorial/乡亲传颂二三事（陈希桥）.html; /ten_year_memorial/廖耀湘将军传略（刘建章 李珍）.html"
      original_text: "1941年4月，廖耀湘父亲亡故。当时任国军新22师少将师长"
      notes: ""
    - date: "1941-06"
      date_display: ""
      content: "第5军移驻贵州及云南，新二十二师随军移驻。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1941-11-08"
      date_display: ""
      content: "第五军奉命开赴昆明，担任昆明外围守备及工事构筑，杜聿明兼任昆明防守司令。新二十二师随军分驻安宁、昆阳、呈贡、宜良等县。"
      source: "林蔚阮肇昌致蒋介石何应钦徐永昌第五军开昆明具体安排; 蒋介石致林蔚龙云委任杜聿明为昆明防守司令"
      source_url: "/liaos_tele/1941-11-07林蔚阮肇昌致蒋介石何应钦徐永昌第五军开昆明具体安排电.html; /liaos_tele/1941-11-08蒋介石致林蔚龙云委任杜聿明为昆明防守司令电.html"
      original_text: ""
      notes: ""
    - date: ""
      date_display: "同年"
      content: "军训部年度总校阅中，新22师成绩列为全国第一。"
      source: "廖耀湘将军传略（刘建章 李珍）"
      source_url: "/ten_year_memorial/廖耀湘将军传略（刘建章 李珍）.html"
      original_text: "军训部于是年总校阅中，所部成绩列为全国第一"
      notes: ""
    - date: "1941-12"
      date_display: ""
      content: "随第5军入缅。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "冬"
      content: "N22D64i由湖南东安白牙市出发，沿湘黔公路到云南楚雄。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "年末"
      content: "到达楚雄。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1942
  entries:
    - date: "1942-03"
      date_display: ""
      content: "奉命随军远征印缅。"
      source: "中华民国驻印军缅北会战经过概要"
      source_url: "/battles_history/1945/中华民国驻印军缅北会战经过概要.html"
      original_text: ""
      notes: ""
    - date: "1942-03-01"
      date_display: ""
      content: "暂停开拔。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-08"
      date_display: ""
      content: "日军攻占仰光，分三路积极北进。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-03-14"
      date_display: ""
      content: "N22D在芒市待命。后在遮放集结。"
      source: "杜聿明电蒋中正新二二师九十六师定于14日集中完毕并由遮放向腊戍运输; 林蔚电何应钦徐永昌200师位于同古N22D与96D位于芒市暂不移动"
      source_url: "/liaos_tele/1942-03-12杜聿明电蒋中正新二二师、九十六师定于14日集中完毕并由遮放向腊戍运输.html; /liaos_tele/1942-03-14林蔚电何应钦徐永昌200师位于同古N22D与96D位于芒市暂不移动及其他军情.html"
      original_text: ""
      notes: ""
    - date: "1942-03-15"
      date_display: ""
      content: "N22D由遮放开始运输，乘便车至腊戍，改乘火车向曼德勒（不含）以东地区集中。"
      source: "杜聿明致蒋介石200师新22师及军部行动情况"
      source_url: "/liaos_tele/1942-03-15杜聿明致蒋介石200师、新22师及军部行动情况.html"
      original_text: ""
      notes: ""
    - date: "1942-03-19"
      date_display: ""
      content: "率N22D经腊戍、曼德勒到达缅甸皎楼（皎栖Kuyaukse）集结待命。"
      source: "蒋委员长在重庆接见史迪威讨论缅甸作战方针及统一指挥等问题谈话记录; 杜聿明三月二十四日函呈报告入缅情形"
      source_url: "/liaos_tele/1942-03-19蒋委员长在重庆接见中国战区参谋长史迪威讨论缅甸作战方针及统一指挥等问题谈话记录.html; /liaos_tele/1942-03-24杜聿明三月二十四日函呈报告入缅情形.html"
      original_text: ""
      notes: ""
    - date: "1942-03-21"
      date_display: ""
      content: "推进至淡文伊、苗拉林之线，占领阵地。"
      source: "史迪威致何应钦徐永昌在同古与日军决战部署新廿二师居TAUNGDWINGYI归史直接指挥"
      source_url: "/liaos_tele/1942-03-21史迪威致何应钦徐永昌在同古与日军决战部署新廿二师居TAUNGDWINGYI归史直接指挥.html"
      original_text: ""
      notes: ""
    - date: "1942-03-22"
      date_display: ""
      content: "在曼德勒附近集结完毕，23日即可向平满那输送。"
      source: "杜聿明电蒋中正200师在同古激战及新22师由曼德勒向平满纳输送等情"
      source_url: "/liaos_tele/1942-03-22杜聿明电蒋中正200师在同古激战及新22师由曼德勒向平满纳输送等情.html"
      original_text: ""
      notes: ""
    - date: "1942-03-25"
      date_display: ""
      content: "N22D先头部队与敌143联队在同古以北之叶达西接触。"
      source: "萧毅肃致何应钦徐永昌同古200师激战新22师加速输送中; 萧毅肃致蒋中正新廿二师向叶达西输送但英方输送太缓"
      source_url: "/liaos_tele/1942-03-26萧毅肃致何应钦徐永昌同古200师激战新22师加速输送中.html; /liaos_tele/1942-03-27肖（萧）毅肃致蒋中正新廿二师向叶达西输送但英方输送太缓.html"
      original_text: ""
      notes: ""
    - date: "1942-03"
      date_display: "3月至5月"
      content: "缅南作战期间，廖耀湘指挥新二十二师实施迟滞战斗，但始终不在命令中使用「迟滞」字眼，对各团所下命令均用「固守某地」等极肯定的措辞，从不向部下透露实际的迟滞作战意图。即使后来在蓝姆加整训时亦然。参谋郭修甲事后方从陆大书本中悟知当时实为迟滞战斗。"
      source: "新二十二师缅南作战纪要（郭修甲）"
      source_url: "/battles_history/1942/新二十二师缅南作战纪要（郭修甲）.html"
      original_text: "军师作战，虽是标准迟滞战斗，但在军师命令中，从未见到「迟滞」两字。廖先生亦从未为我等言及。师对各团所下命令，均是用「固守某地」字眼……廖先生始终不提迟滞战斗字眼，即使在蓝姆加时亦然，所下命令，都是用极肯定字眼，如此，亦可见廖先生指挥之卓越也。"
      notes: ""
    - date: "1942-03-27"
      date_display: ""
      content: "N22D师主力逐次集结，向叶达西推进。"
      source: "杜聿明致蒋中正新二二师正向同谷搜索前进但因输送太缓主力未集结尚未总攻; 杜聿明致蒋中正新二二师在KYVNGON附近与敌产生接触"
      source_url: "/liaos_tele/1942-03-27杜聿明致蒋中正新二二师正向同谷搜索前进但因输送太缓主力未集结尚未总攻.html; /liaos_tele/1942-03-27杜聿明致蒋中正新二二师在KYVNGON附近与敌产生接触伤亡二十余人.html"
      original_text: ""
      notes: ""
    - date: "1942-03-28"
      date_display: ""
      content: "夜，到达同古以北之南阳车站附近，与敌遭遇并交战。"
      source: "杜聿明致蒋中正同古戴安澜师KYUNGON廖耀湘师战斗缴获情形; 林蔚致蒋介石廖师今晚可在叶达西集结完毕总兵团即将与日军决战"
      source_url: "/liaos_tele/1942-03-28杜聿明致蒋中正同古戴安澜师KYUNGON廖耀湘师战斗缴获情形.html; /liaos_tele/1942-03-28林蔚致蒋介石廖师今晚可在叶达西集结完毕总兵团即将与日军决战.html"
      original_text: ""
      notes: ""
    - date: "1942-03-27"
      date_display: ""
      content: "晚，廖耀湘打电话通知六十五团团长邓军林：二〇〇师被围情况紧急，翌日六十五团要加紧进攻；军部派战车到前线协助攻击。"
      source: "1942年缅甸作战回忆（邓军林）"
      source_url: "/battles_history/1942/1942年缅甸作战回忆（邓军林）.html"
      original_text: "晚上，接师长廖耀湘电话通知说，二○○师被围，情况紧急，明天六十五团要加紧进攻"
      notes: ""
    - date: "1942-03-29"
      date_display: ""
      content: "攻克南阳车站。后敌增援反扑易手。"
      source: "林蔚致蒋中正战况有变暂缓决战及廖师已占领NANGYUA（南阳）车站等情; 杜聿明致蒋中正200师向西当河转进及新22师在叶达西阻敌等情"
      source_url: "/liaos_tele/1942-03-29林蔚致蒋中正战况有变暂缓决战及廖师已占领NANGYUA（南阳）车站等情.html; /liaos_tele/1942-03-29杜聿明致蒋中正200师向西当河转进及新22师在叶达西阻敌等情.html"
      original_text: ""
      notes: ""
    - date: "1942-03-30"
      date_display: ""
      content: "奉命率部守于叶达西至平蛮纳地区，掩护军在平满那会战，阻止日军北进达20余日之久。"
      source: "杜聿明电蒋中正廖耀湘师向敌攻击略有进展并虏获敌文件; 杜聿明电蒋中正与戴安澜师廖耀湘师暂时失去联系等情; 杜聿明电蒋中正戴安澜师转移情况及廖耀湘师击毙敌少校大队长夺获武器"
      source_url: "/liaos_tele/1942-03-30杜聿明电蒋中正廖耀湘师向敌攻击略有进展并虏获敌文件等四点情形.html; /liaos_tele/1942-03-30杜聿明电蒋中正与戴安澜师廖耀湘师暂时失去联系等情.html; /liaos_tele/1942-03-30杜聿明电蒋中正戴安澜师转移情况及廖耀湘师击毙敌少校大队长夺获武器等语.html"
      original_text: ""
      notes: ""
    - date: "1942-04-01"
      date_display: ""
      content: "同古方面作战以来，200师伤亡2500余，新22师伤亡500余。"
      source: "杜聿明致蒋中正何应钦200师伤亡2500余官兵及新22师伤亡500余官兵"
      source_url: "/liaos_tele/1942-04-01杜聿明致蒋中正何应钦200师伤亡2500余官兵及新22师伤亡500余官兵及其他损耗.html"
      original_text: ""
      notes: ""
    - date: "1942-04-02"
      date_display: ""
      content: "廖耀湘师仍与敌对峙中。"
      source: "杜聿明电蒋中正廖耀湘师仍与敌对峙中"
      source_url: "/liaos_tele/1942-04-02杜聿明电蒋中正廖耀湘师仍与敌对峙中等三点情形.html"
      original_text: ""
      notes: ""
    - date: "1942-04-10"
      date_display: "4月5日至10日"
      content: "斯瓦战斗（4月5至10日），廖师毙敌两千余，我伤亡营长三人及士兵三千余。罗卓英陪同史迪威巡查第五军，将士身体健壮，攻击精神旺盛。"
      source: "杜聿明致徐永昌SWA4月5至10日战斗廖师毙敌两千余; 罗卓英致徐永昌其陪同史迪威巡查第五军将士身体健壮攻击精神旺盛"
      source_url: "/liaos_tele/1942-04-10杜聿明致徐永昌SWA（斯瓦）4月5日至4月10日战斗廖师毙敌两千余我伤亡营长三及士兵三千余.html; /liaos_tele/1942-04-10罗卓英致徐永昌其陪同史迪威巡查第五军将士身体健壮攻击精神旺盛等情.html"
      original_text: ""
      notes: ""
    - date: "1942-04-15"
      date_display: ""
      content: "参加平满那军事会议，廖耀湘发言称新编第二十二师随时可以作战，表现积极。"
      source: "1942年缅甸作战回忆（邓军林）"
      source_url: "/battles_history/1942/1942年缅甸作战回忆（邓军林）.html"
      original_text: "四月十五日在彬文那召开军事会议，各师报告准备情况，我师师长廖耀湘报告说「新二十二师随时可以作战」"
      notes: ""
    - date: "1942-04-16"
      date_display: ""
      content: "因右翼英军败退，平蛮纳阵地侧背暴露，只得率部正面与日军作战，阻敌前进。"
      source: "杜聿明致何应钦4月10至16日廖师阻击敌55师团于斯瓦之经过; 林蔚报告远征军长官部人事复杂等情密电; 林蔚致蒋中正新二二师两团已向平蛮纳集结完毕准备曼德勒决战中"
      source_url: "/liaos_tele/1942-04-17杜聿明致何应钦4月10至16日廖师阻击敌55师团于斯瓦之经过.html; /liaos_tele/1942-04-16林蔚报告远征军长官部人事复杂等情密电.html; /liaos_tele/1942-04-15林蔚致蒋中正新二二师两团已向平蛮纳集结完毕准备曼德勒决战中.html"
      original_text: ""
      notes: ""
    - date: "1942-04-16"
      date_display: ""
      content: "N22D奉命以64i守瓢背、65i增援赫河、师主力控制于他希。"
      source: "杜聿明致何应钦4月10至16日廖师阻击敌55师团于斯瓦之经过; 杜聿明致徐永昌SWA4月5至10日战斗廖师毙敌两千余"
      source_url: "/liaos_tele/1942-04-17杜聿明致何应钦4月10至16日廖师阻击敌55师团于斯瓦之经过.html; /liaos_tele/1942-04-10杜聿明致徐永昌SWA（斯瓦）4月5日至4月10日战斗廖师毙敌两千余我伤亡营长三及士兵三千余.html"
      original_text: ""
      notes: ""
    - date: "1942-04-20"
      date_display: ""
      content: "罗衣考与平满那失守。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-04-24"
      date_display: ""
      content: "廖耀湘预先将六十六团第一营配置于他希，日军以战车掩护步兵进攻，被该营击退，毁伤敌战车数辆。"
      source: "1942年缅甸作战回忆（邓军林）"
      source_url: "/battles_history/1942/1942年缅甸作战回忆（邓军林）.html"
      original_text: "师长廖耀湘预先将六十六团第一营配置于他希，当敌以战车掩护步兵向他希进攻时，被该营击退"
      notes: ""
    - date: "1942-04-25"
      date_display: ""
      content: "64i与敌在瓢背激战竟日，黄昏后向北转移。"
      source: "罗卓英致蒋中正96师200师新22师敌情与处置; 杜聿明电徐永昌报告戴余廖师位置及计划; 罗卓英致蒋中正英军撤退我新廿二师及新卅八于瓦密铁路抵抗中"
      source_url: "/liaos_tele/1942-04-25罗卓英致蒋中正96师200师新22师敌情与处置.html; /liaos_tele/1942-04-26杜聿明电徐永昌报告戴、余、廖师位置及计划.html; /liaos_tele/1942-04-26罗卓英致蒋中正英军撤退我新廿二师及新卅八于瓦密铁路抵抗中及其他撤退情况.html"
      original_text: ""
      notes: ""
    - date: "1942-04-25"
      date_display: ""
      content: "雷列姆陷敌。"
      source: "罗卓英电蒋中正日军越过雷列姆北犯国军各部之部署"
      source_url: "/liaos_tele/1942-04-24罗卓英电蒋中正日军越过雷列姆北犯国军戴安澜刘伯龙杜聿明等部之部署.html"
      original_text: ""
      notes: ""
    - date: "1942-04-28"
      date_display: ""
      content: "细包、南马被陷。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1942-04-29"
      date_display: ""
      content: "转进至曼德勒，知腊戍失守后仓促撤离曼德勒。欲渡伊洛瓦底江向密支那转进。"
      source: "罗卓英致蒋中正英军决心撤退我新廿二师及新卅八于瓦密铁路抵抗中; 林蔚电蒋中正腊戌失守缘于我军未齐仓促布防所致; 蒋中正电罗卓英指示杜聿明张轸余韶廖耀湘孙立人各部移动方针"
