    - date: "1944-01-23"
      date_display: ""
      content: "新22师歼灭55联队第3营"
      source: "中华民国驻印军缅北会战经过概要; 缅北百贼河之役（邱中岳）"
      source_url: "/battles_history/1945/中华民国驻印军缅北会战经过概要.html; /battles_history/1944/缅北百贼河之役（邱中岳）.html"
      original_text: ""
      notes: ""
    - date: "1944-01-25"
      date_display: ""
      content: "歼灭日军第五十五联队第三大队（冈田大队）战斗结束，适逢农历正月初一。廖耀湘动员全师官兵在列多至营区道路两旁夹道欢迎傅宗良凯旋归来，化解其委屈，赢得全师官兵的信仰与敬爱。"
      source: "缅北百贼河之役（邱中岳）"
      source_url: "/battles_history/1944/缅北百贼河之役（邱中岳）.html"
      original_text: "廖先生知道了傅团长的行动，立即动员全师的官兵，在列多到营区道路的两旁，夹道欢迎胜利归来的民族英雄傅宗良上校，廖先生的这一安排，化解了傅团长满脑子的委曲，更赢得了全师官兵对廖先生的信仰和敬爱。"
      notes: ""
    - date: "1944-01-27"
      date_display: "约1月27日"
      content: "收到史迪威致最高当局电文副本，称赞新二十二师第六十五团于百贼河之役全歼日军一个加强大队，傅宗良团长厥功至伟应予勋奖，并请求撤销此前对傅团长的处分案。"
      source: "缅北百贼河之役（邱中岳）"
      source_url: "/battles_history/1944/缅北百贼河之役（邱中岳）.html"
      original_text: "廖先生又收到了史迪威将军致最高当局电文的副本：「新二十二师第六十五团于百贼河之役，全歼日军一个加强大队，傅宗良团长厥功至伟，应予勋奖，前电请处分傅团长一案，请准撤销。」"
      notes: ""
    - date: "1944-02-18"
      date_display: ""
      content: "廖耀湘与史迪威前往66团视察缴获日军文件（）"
      source: "Stillwell's Command Problems P145"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1944-03-05"
      date_display: ""
      content: "率部攻克孟关，歼灭日军号称「丛林之王」的第18师团主力、取得胡康河谷作战大捷。盟军东南亚战区最高司令官、英国海军上将蒙巴顿勋爵亲临孟关表示祝贺。"
      source: "中华民国驻印军缅北会战经过概要; 郑洞国回忆录：缅北反攻（上）; 郑洞国电蒋中正何应钦报告廖耀湘师于五日完全占领孟关斩获甚众"
      source_url: "/battles_history/1945/中华民国驻印军缅北会战经过概要.html; /battles_history/1944/郑洞国回忆录：缅北反攻（上）（郑洞国）.html; /liaos_tele/1944-03-07郑洞国电蒋中正何应钦报告廖耀湘师于五日完全占领孟关斩获甚众.html"
      original_text: ""
      notes: ""
    - date: "1944-03-16"
      date_display: ""
      content: "电蒋中正报告孟关战役中首次与美军并肩作战之观感。评价美军战斗力不坚强、战斗纪律不严，认为国军如有现代装备与良好补给即能击溃日寇，建议与其请美军登陆不如请其供给装备粮弹及医药以自力驱敌。蒋介石批复告诫对友军只可隐忍扬善，不可有轻蔑之言。"
      source: "廖耀湘电蒋中正孟关战役与首次美军并肩作战事件与歼敌经过"
      source_url: "/liaos_tele/1944-03-16廖耀湘电蒋中正孟关战役与首次美军并肩作战事件与歼敌经过.html"
      original_text: "国军如有现代装备、良好补给及卫生，训练指挥适当，以同等兵力即能击溃日寇。将来与其请美军在中国登陆共击日寇，不如请其供给装备、粮弹及医药，自力驱寇于国境之外，免受人挟制。"
      notes: ""
    - date: "1944-03-19"
      date_display: ""
      content: "攻克间布班山隘口。"
      source: "中华民国驻印军缅北会战经过概要"
