    - date: "1963-06-22"
      date_display: ""
      content: "回信一封。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1963-09-14"
      date_display: ""
      content: "民革在四川饭店举行招待会，康澤廖耀湘等參加工作。"
      source: "大公報 1963.09.22"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=18&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=25de3e099cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
      original_text: ""
      notes: ""
    - date: "1963-11-10"
      date_display: ""
      content: "周恩来及陈毅在人民大会堂福建厅接见在京的前四批特赦人员及其家属，并合影留念。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1964
  entries:
    - date: "1964-03-09"
      date_display: ""
      content: "与其他文史专员一行抵达南京谒中山陵。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-03-27"
      date_display: ""
      content: "一行抵达杭州，游览西湖，拜谒岳飞庙，参观新安江发电站。后赴安徽游览黄山，赴江西参观南昌、吉安、井冈山等革命圣地。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-04-14"
      date_display: ""
      content: "一行抵达长沙，游览岳麓山，拜谒黄兴、蔡锷墓。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-04-15"
      date_display: ""
      content: "参观韶山。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-04-22"
      date_display: ""
      content: "一行抵达武汉，参观武汉长江大桥。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-04-26"
      date_display: ""
      content: "一行44人至湖北黄陂县横店区参观。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-08"
      date_display: ""
      content: "经康心如介绍，与辅仁大学毕业生、中学教师张赢毓结婚。"
      source: "接收东北时军统特务活动种种（文强）; 廖耀湘在新中国的二十年（黄双喜）"
      source_url: "/ten_year_memorial/接收东北时军统特务活动种种（文强）.html; /ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "于1964年8月与张结婚"
      notes: ""
    - date: "1964-08"
      date_display: ""
      content: "由全国政协副秘书长辛志超率领，赴西北参观，先后抵达延安、西安、洛阳、郑州等地，国庆节前回到北京。"
      source: "廖耀湘在新中国的二十年（黄双喜）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "1964年8月初，由全国政协副秘书长辛志超率领，赴西北参观"
      notes: ""
    - date: "1964-10-01"
      date_display: ""
      content: "参加庆祝国庆十五周年游行观礼活动。"
      source: "廖耀湘在新中国的二十年（黄双喜）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "接着，他们又参加了庆祝国庆十五周年游行观礼活动"
      notes: ""
    - date: "1964-11-05"
      date_display: ""
      content: "被特邀为中国人民政治协商会议第四届全国委员会委员（与杜聿明、溥仪、宋希濂、范汉杰、王耀武同时），随后曾写信要求加入中国共产党。"
      source: "廖耀湘在新中国的二十年（黄双喜）; 接收东北时军统特务活动种种（文强）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html; /ten_year_memorial/接收东北时军统特务活动种种（文强）.html"
      original_text: "他和杜聿明、溥仪、宋希濂、范汉杰、王耀武六人被特邀为中国人民政治协商会议第四届全国委员会委员"
      notes: "按：据张怡如《溥仪等人在黄陂横店参观情况回忆》所记，4月26日横店参观时已婚，故婚期可能早于8月。文强记为8月。"
- year: 1965
  entries:
    - date: "1965-01-05"
      date_display: ""
      content: "在中国人民政治协商会议第四届全国委员第一次会议上作为特邀人士当选为全国政协（兼主席周恩来）委员。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1966
  entries:
    - date: "1966-06-16"
      date_display: ""
      content: "文化大革命开始。全体文史专员被召去开会，被告知参加文化大革命运动，揭发批判申伯纯。"
      source: "廖耀湘在新中国的二十年（黄双喜）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "6月16日，当时主持政协机关工作的另一位副秘书长，把全体文史专员召去开会"
      notes: ""
    - date: "1966-07-06"
      date_display: ""
      content: "被通知参加批判申伯纯大会，连续「陪斗」三天。"
      source: "廖耀湘在新中国的二十年（黄双喜）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "从7月6日开始，廖耀湘他们便被通知参加...批判申伯纯的大会……一直'陪斗'了三天"
      notes: ""
    - date: "1966-08-24"
      date_display: ""
      content: "被勒令停止一切学习文件和工作，在机关打扫厕所，自9月份起月薪扣减30元。妻子张赢毓在中学任教，亦被批斗，致小产。"
      source: "廖耀湘在新中国的二十年（黄双喜）; 廖耀湘生平补述（李以劻）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "时至8月24日...自即日起停止学习文件...一律在机关打扫厕所……自9月份起扣减30元"
      notes: ""
    - date: "1966-09-30"
      date_display: ""
      content: "向周恩来写信，为文史专员申伯纯同志受造反派迫害请求保护和援助。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1968
  entries:
    - date: "1968-10-08"
      date_display: ""
      content: "写《有关李时雍政治及历史问题证实材料》。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "约十月间"
      content: "散步于和平街口东方歌舞团附近时心脏病发作昏倒，李以劻将其搀扶救回。"
      source: "廖耀湘生平补述（李以劻）"
      source_url: "/ten_year_memorial/记廖耀湘（赵烈安）.html"
      original_text: "1968年秋，约在十月间感心闷，邀我陪他散步于和平街口东方歌舞团附近昏倒"
      notes: ""
    - date: "1968-12-02"
      date_display: ""
      content: "散步归来后晚饭，刷牙时突发心脏病倒地。李以劻闻讯上楼抢救，已迟一步，不幸辞世，临终时双目未瞑。终年62岁。住所为北京和平街11区20楼3单元。"
      source: "接收东北时军统特务活动种种（文强）; 廖耀湘生平补述（李以劻）"
      source_url: "/ten_year_memorial/接收东北时军统特务活动种种（文强）.html"
      original_text: "1968年12月2日散步归来...突然心脏病发作...不幸与世长辞"
      notes: "按：去世日期各来源不一。文强记12月2日，黄双喜记12月7日，陈希桥记12月3日。"
    - date: ""
      date_display: "次日"
      content: "李以劻陪同妻子张赢毓将遗体送至北京八宝山火葬场火化，骨灰安放于革命公墓。"
      source: "廖耀湘生平补述（李以劻）"
      source_url: "/ten_year_memorial/记廖耀湘（赵烈安）.html"
      original_text: "病故次日...由我陪同张女士等人将廖公遗体送至八宝山火葬场"
      notes: ""
- year: 1980
  entries:
    - date: "1980-05"
      date_display: ""
      content: "全国政协机关举行追悼会（与溥仪、黄绍竑、楚溪春、王耀武合并举行），主祭人为政协副主席刘澜涛，参加追悼者400余人。骨灰安放于北京八宝山革命公墓。"
      source: "廖耀湘事略（禹靖寰）; 廖耀湘生平补述（李以劻）; 人民日报"
      source_url: "/ten_year_memorial/廖耀湘事略（禹靖寰）.html; /ten_year_memorial/爱新觉罗溥仪、王耀武、廖耀湘追悼会在京举行（人民日报）.html"
      original_text: "1980年5月30日党和政府垂念追悼，将其骨灰安放北京八宝山"
      notes: "按：禹靖寰记5月30日，黄双喜记5月20日。"
