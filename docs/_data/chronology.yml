      notes: ""
    - date: "1945-03-24"
      date_display: ""
      content: "与蒋介石合影（来源：背后是花坛那个照片）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-04-08"
      date_display: ""
      content: "云南沾益，廖耀湘视察新六军训练"
      source: "中缅印战区盟军将帅图志P251"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-04-29"
      date_display: ""
      content: "云南沾益，廖耀湘、杜聿明。"
      source: "中缅印战区盟军将帅图志P255"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-05"
      date_display: ""
      content: "新编第6军空运湖南芷江，作为湘西会战总预备队，增员王耀武第4方面军，负责保卫芷江机场。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-07-06"
      date_display: ""
      content: "获颁金质棕榈叶勋饰自由勋章（美）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-08-15"
      date_display: ""
      content: "日本宣布无条件投降。新编第6军负责日本投降签字典礼筹备工作及安保工作。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-08-18"
      date_display: ""
      content: "日本签字典礼筹备处全体职员在中美空军联队俱乐部前合影。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-08-21"
      date_display: "8月21-23日"
      content: "列席芷江洽降仪式。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-08-27"
      date_display: ""
      content: "新六军副军长舒适存随冷欣中将率前进指挥所一行159人乘七架美军运输机由芷江飞抵南京，新六军被指定接收南京防区。新六军官兵52人随行先遣。"
      source: "申报 1945年08月28日 第1版 第25650期"
      source_url: "/newspapers/前進指揮所主任冷欣中將飛抵京.html"
      original_text: ""
      notes: ""
    - date: "1945-09-04"
      date_display: ""
      content: "晨，新六军开始空运南京。原定自四日晨起开始空运，惟当日气候恶劣，临时停止，五日晨气候转佳，已开始空运。"
      source: "東南日報 1945.09.05; 申报 1945年09月06日 第1版 第25659期"
      source_url: "/newspapers/新六軍健兒一營昨晨自芷江到京.html"
      original_text: ""
      notes: ""
    - date: "1945-09-04"
      date_display: ""
      content: "芷江各界举行庆祝胜利日大会，同时欢迎何应钦进驻芷江，欢送即将赴京之新六军。何应钦、廖耀湘军长相继演说，芷江各界签名书赠廖军长，以酬其保卫湘西之功。"
      source: "申报 1945年09月05日 第1版 第25658期"
      source_url: "/newspapers/芷江慶祝勝利大會盛况.html"
      original_text: ""
      notes: ""
    - date: "1945-09-05"
      date_display: ""
      content: "为接受占领南京、控制冈村宁次总部，接受京沪铁路沿线防务，确保南京、上海交通畅通，新编第6军空运南京，并担任防城任务。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-09-06"
      date_display: ""
      content: "美军开始大规模空运八万中国军队至京沪，为军事史上最大规模空运之一。新六军由美第十航空隊自芷江空运南京，往返飞行距离1300英里，预计四十日完成。"
      source: "申报 1945年09月07日 第1版 第25660期"
      source_url: "/newspapers/最大規模空運昨開始實現我八萬大軍分運京滬.html"
      original_text: ""
      notes: ""
    - date: "1945-09-07"
      date_display: ""
      content: "廖耀湘偕十四师师长龙天武等飞抵南京，新六军军司令部设于黄埔路。先遣部队已于6日接收光华门外防务，后续部队自8日起加紧空运。"
      source: "申报 1945年09月09日 第1版 第25662期"
      source_url: "/newspapers/新六軍分批空運到京.html"
      original_text: ""
      notes: ""
    - date: "1945-09-09"
      date_display: ""
      content: "受降签字仪式在南京举行，参加观礼。据何应钦事后报告，受降时南京仅运到新六军五个连，当时城区敌军约七万、伪军一万余。黄埔路上满布空运抵此之宪兵及新六军担任警戒，安保工作全由新6军第14师40团担任。"
      source: "申报 1945年09月10日 第1版 第25663期; 申报 1946年05月14日 第2版 第24511期"
      source_url: "/newspapers/中國日軍投降簽字昨在京順利完成.html; /newspapers/何總司令報吿執行任務情形.html"
      original_text: ""
      notes: ""
    - date: "1945-09-09"
      date_display: ""
      content: "受降签字后七小时，何应钦率陆海军将校约八十人谒陵，廖耀湘随行，舒适存、龙天武分率新六军战士乘车前导。"
      source: "中缅印战区盟军将帅图志P252; 申报 1945年09月10日 第1版 第25663期"
      source_url: "/newspapers/受降後七小時何總司令謁陵.html"
      original_text: ""
      notes: ""
    - date: "1945-09-13"
      date_display: ""
      content: "新六军开始在南京城郊布防，备受市民热烈欢迎。"
      source: "申报 1945年09月14日 第1版 第25667期"
      source_url: "/newspapers/新六軍在京布防受熱烈歡迎.html"
      original_text: ""
      notes: ""
    - date: "1945-09-14"
      date_display: ""
      content: "南京全体商民推派代表向何应钦献旗致敬，并备大批慰劳物品慰劳总部将士及新六军。"
      source: "申报 1945年09月15日 第1版 第25668期"
      source_url: "/newspapers/京市民代表謁何總司令獻旗致敬.html"
      original_text: ""
      notes: ""
    - date: "1945-09-14"
      date_display: ""
      content: "第三方面军汤恩伯在沪招待记者，称接收南京之工作已委派新六军廖军长代表处理。"
      source: "申报 1945年09月15日 第1版 第25668期"
      source_url: "/newspapers/湯司令官招待記者談接收京滬工作.html"
      original_text: ""
      notes: ""
    - date: "1945-09-15"
      date_display: ""
      content: "廖耀湘向美联社记者表示：由久历缅甸战事之部队组成中国之新六军，定于国庆日正式进入南京。廖耀湘之部队已占领南京之数商业区，南京之新六军每日增加数百人。"
      source: "時事新報 1945.09.17"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/ssxb19450917-01.1.2"
      original_text: ""
      notes: ""
    - date: "1945-09-15"
      date_display: ""
      content: "新六军空运部队到达者骤增，南京警卫除挹江门一隅外均已由新六军接收把守。"
      source: "申报 1945年09月16日 第1版 第25669期"
      source_url: "/newspapers/新六軍續運抵京.html"
      original_text: ""
      notes: ""
    - date: "1945-10"
      date_display: ""
      content: "于南京题词“先烈之血，民族之光”、“凯旋还京与旧友重临栖霞”。在南京龙门酒家宴请葛顿南少校，并在便签上留名。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-06"
      date_display: ""
      content: "新6军几十位军官与美军联络官们在“新六军军官俱乐部”联欢并合影留念。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-06"
      date_display: ""
      content: "新六军军官合影"
      source: "中缅印战区盟军将帅图志P264"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-08"
      date_display: ""
      content: "在约翰·葛顿南少校的记事本上签名留念并写下通讯地址。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-10"
      date_display: ""
      content: "获颁忠勤勋章。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-10"
      date_display: ""
      content: "宴会上正式赠送纪念品给美国联络官们，赠送即将归国的约翰·葛顿南（John J Gardner，14师联络官）一幅中国花鸟字画长轴，字画噢诶呦英文译文。14师师长龙天武少将正式颁发嘉奖状给葛顿南少校，以及锦旗给其他美军军官。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-12"
      date_display: ""
      content: "晚接见记者，对日军缴械情形发表谈话，表示八万日军已全部缴械完成。"
      source: "聯合日報 1945.10.14"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/lhrb19451014-01.1.1"
      original_text: ""
      notes: ""
    - date: "1945-10-24"
      date_display: ""
      content: "金门酒家宴请晚饭，在座者有杜聿明、赵家骧、李诚毅等"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-25"
      date_display: ""
      content: "晨七时，谒陵；九点半，金门酒家宴请早饭，随后，明孝陵机场送行杜聿明等飞沪"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-29"
      date_display: ""
      content: "廖耀湘离沪赴京。"
      source: "東南日報 1945.10.30 第2版"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dnrb19451030-01.1.2"
      original_text: ""
      notes: ""
    - date: "1945-11-25"
      date_display: ""
      content: "新六军军长廖耀湘午间抵达苏州视察，次日返沪。"
      source: "申报 1945年11月26日 第1版 第24342期"
      source_url: "/newspapers/廖耀湘今日返滬.html"
      original_text: ""
      notes: ""
    - date: "1945-11-26"
      date_display: ""
      content: "由苏州返回上海。同上。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-11-26"
      date_display: ""
      content: "中华口琴会会长王庆勋率代表队赴新六军第十四师慰劳演奏，龙天武师长简述该师作战经过。"
      source: "申报 1945年11月27日 第3版 第24343期"
      source_url: "/newspapers/慰勞新六軍.html"
      original_text: ""
      notes: ""
    - date: "1945-12-20"
      date_display: ""
      content: "马歇尔下午1时55分乘飞机抵沪，在江湾机场降落。何应钦、钱大钧、张治中、郑洞国、廖耀湘、魏德迈等六百余人到场迎接。随后马歇尔与魏德迈同车赴华懋饭店，魏德迈于下午六点设宴，中美各首长作陪。新六军新二二师六五团三营第七、八连担任警卫和仪仗。"
      source: "申报 1945年12月21日 第1版; 申报 1945年12月21日 第5版; 建國日報 1945.12.21; 民國日報 1945.12.21"
      source_url: "/newspapers/馬歇爾特使昨抵滬.html; /newspapers/歡迎馬帥速寫.html"
      original_text: ""
      notes: ""
    - date: "1945-12-26"
      date_display: ""
      content: "新六军副军长舒适存抵达北平，全副美式装备之新六军士兵初次出现北平街头。"
      source: "申报 1945年12月31日 第1版 第24377期"
      source_url: "/newspapers/中蘇間橫亘小陰影東北局勢低迷沉悶.html"
      original_text: ""
      notes: ""
- year: 1946
  entries:
    - date: "1946-01"
      date_display: ""
      content: "新编第6军从上海海运至秦皇岛，后自葫芦岛登陆出关至沟帮子，升任东北行营第4绥靖区司令官，兼第六军军长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-01-02"
      date_display: ""
      content: "廖耀湘、龙天武、李澍等出席淞沪军事长官会商，商定六项办法整肃军纪，取消各军师办事处，不得占用民房。"
      source: "申报 1946年01月03日 第3版 第24380期"
      source_url: "/newspapers/本巿軍事首長商決各軍師辦事處一律取消.html"
      original_text: ""
      notes: ""
    - date: "1946-01-09"
      date_display: ""
      content: "廖耀湘往谒行政院长宋子文，宋氏当日接见钱市长、廖耀湘及申新纺织厂荣鸿元等，听取各方报告。"
      source: "申报 1946年01月10日 第5版 第24387期"
      source_url: "/newspapers/宋院長處理要公聽取各方報吿錢市長廖耀湘等先後往謁.html"
      original_text: ""
      notes: ""
    - date: "1946-01-09"
      date_display: ""
      content: "东北前线国军士兵冬服仍未齐备，多手脚冻坏，报道称俟最精锐之新一军新六军等到达后，前线始可稍息仔肩。"
      source: "申报 1946年01月11日 第1版 第24388期"
      source_url: "/newspapers/東北局勢陰霾漸散國軍待接防瀋陽.html"
      original_text: ""
      notes: ""
    - date: "1946-01-11"
      date_display: ""
      content: "美军总部宣布：美军船只运输新六军由上海赴东北将于本月16日开始，御寒配备已整筹就绪，并已注射防疫针。"
      source: "申报 1946年01月12日 第1版 第24389期"
      source_url: "/newspapers/美宣布定十六日開始運新六軍赴東北.html"
      original_text: ""
      notes: ""
    - date: "1946-01-12"
      date_display: ""
      content: "魏德迈将军招待记者时宣布：新六军将于本月16日开始自沪运往东北，北上者共二万六千人，并备有御寒配备。"
      source: "申报 1946年01月13日 第5版 第24390期"
      source_url: "/newspapers/魏德邁將軍昨招待記者新六軍即由滬開往東北.html"
      original_text: ""
      notes: ""
    - date: "1946-01-14"
      date_display: ""
      content: "美陆军部长柏德遜抵沪，检阅新六军派往机场之仪仗队。"
      source: "申报 1946年01月15日 第5版 第24392期"
      source_url: "/newspapers/美國陸軍部長柏德遜昨飛抵滬.html"
      original_text: ""
      notes: ""
    - date: "1946-01-16"
      date_display: ""
      content: "新六军开始由上海海运赴东北，上海防务由青年军207师接替。"
      source: "申报 1946年01月17日 第5版 第24394期"
      source_url: "/newspapers/新六軍昨開東北靑年軍來滬接防.html"
      original_text: ""
      notes: ""
    - date: "1946-01-17"
      date_display: ""
      content: "裕鞏军服厂因赶制新六军军服棉被手套失火，焚去楼房十二幢，损失棉被千余条、军服七千余件。"
      source: "申报 1946年01月18日 第5版 第24395期"
      source_url: "/newspapers/裕華軍服廠失愼.html"
      original_text: ""
      notes: ""
    - date: "1946-01-17"
      date_display: ""
      content: "新六军二十二师六千人乘美登陆船六艘由上海启程北上，拟直驶葫芦岛登陆续向沈阳推进。全军官兵二万六千人可于本月22日前后全体首途。"
      source: "申报 1946年01月18日 第5版 第24395期; 申报 1946年01月18日 第1版 第24395期"
      source_url: "/newspapers/新六軍開往東北携帶法幣出關五千元爲度.html"
      original_text: ""
      notes: ""
    - date: "1946-01-19"
      date_display: ""
      content: "白崇禧抵沪检阅新六军及青年军207师，廖耀湘陪同白崇禧于虹口公园检阅部队并训话。"
      source: "申报 1946年01月20日 第5版 第24397期"
      source_url: "/newspapers/檢閱上海地區駐軍白崇禧將軍蒞滬.html"
      original_text: ""
      notes: ""
    - date: "1946-01-19"
      date_display: ""
      content: "新六军首批约两团在秦皇岛登陆，即转车径赴新民。"
      source: "申报 1946年01月21日 第1版 第24398期"
      source_url: "/newspapers/新六軍兩團登陸秦皇島.html"
      original_text: ""
      notes: ""
    - date: "1946-01-20"
      date_display: ""
      content: "第二批新六军由上海北运开始，美军以登陆船六艘运载约六千人及配备车辆，登陆葫芦岛。全军二万六千人共分数次北上，第一次始于16日。"
      source: "申报 1946年01月21日 第5版 第24398期"
      source_url: "/newspapers/第二批新六軍昨日北運.html"
      original_text: ""
      notes: ""
    - date: "1946-01-22"
      date_display: ""
      content: "十四师师长龙天武招待新闻记者，十四师首批五千余人已上船，分三批开赴东北。二十二师已于16至19日分两批出发并已抵达目的地。"
      source: "申报 1946年01月23日 第4版 第24400期"
      source_url: "/newspapers/新六軍十四師健兒分三批開東北.html"
      original_text: ""
      notes: ""
    - date: "1946-01-26"
      date_display: ""
      content: "沪市各界于大光明戏院举行欢送新六军、迎接青年军207师盛会，大会代表向廖耀湘献赠「党国干城」锦旗，廖军长致词。"
      source: "南京晚報 1946.01.25 第1版; 申报 1946年01月27日 第4版 第24404期"
      source_url: "/newspapers/各界迎送國軍.html"
      original_text: ""
      notes: ""
    - date: "1946-01-26"
      date_display: ""
      content: "新六军已有二师抵达秦皇岛，一师尚在途中。沈阳国军仍住于营房中，俟新六军全部开到后始正式接防。新民、彰武两地苏军当日上午十时全部撤退。"
      source: "申报 1946年01月27日 第1版 第24404期"
      source_url: "/newspapers/新六軍全部開到後即正式接防瀋陽.html"
      original_text: ""
      notes: ""
    - date: "1946-01-28"
      date_display: ""
      content: "新六军先遣部队两队已在秦皇岛登陆，正向锦州移动中。沈阳尚未正式接防，入夜沈市仍无行人。"
      source: "申报 1946年01月29日 第1版 第24406期"
      source_url: "/newspapers/熊式輝由錦飛平新六軍兩隊自秦皇島推進.html"
      original_text: ""
      notes: ""
    - date: "1946-02-01"
      date_display: ""
      content: "廖耀湘陪同魏德迈视察上海各地，巡视美军需处、美海防司令部及虬江码头。新六军第三批约五千人由登陆舰六艘北上，至此已运北上者达万人左右。廖耀湘预定四五日内乘机北上。"
      source: "申报 1946年02月02日 第3版 第24410期"
      source_url: "/newspapers/魏德邁將軍視察巿區.html"
      original_text: ""
      notes: ""
    - date: "1946-02-01"
      date_display: ""
      content: "军之友社在沪举行联欢大会，欢迎魏德迈就任名誉理事及青年军207师师长罗又伦来沪，同时欢送廖耀湘北上。"
      source: "申报 1946年02月01日 第4版 第24409期"
      source_url: "/newspapers/軍之友社舉行軍友聯歡大會.html"
      original_text: ""
      notes: ""
    - date: "1946-02-02"
      date_display: ""
      content: "新六军已全部登陆完毕，正向沟帮子挺进中，不日或可入驻沈长。苏军撤退延缓，东北接收工作呈停顿状态。"
      source: "申报 1946年02月04日 第1版 第24412期"
      source_url: "/newspapers/東北蘇軍延緩撤退接收工作仍呈停頓.html"
      original_text: ""
      notes: ""
    - date: "1946-02-04"
      date_display: ""
      content: "青年军207师入伍一周年，在中正公园举行阅兵典礼，廖耀湘陪同钱大钧、罗又伦等检阅部队并致词。"
      source: "申报 1946年02月05日 第3版 第24413期"
      source_url: "/newspapers/靑年軍入伍周年觀光雄師受檢.html"
      original_text: ""
      notes: ""
    - date: "1946-02-04"
      date_display: ""
      content: "新六军进至沟帮子、新民后已暂停前进，静待大局开展。东北中共军队约三四十万，苏军撤退延期，局势混沌。"
      source: "申报 1946年02月06日 第1版 第24414期"
      source_url: "/newspapers/東九省經濟接收工作新六軍行止靜待大局開展.html"
      original_text: ""
      notes: ""
    - date: "1946-02-08"
      date_display: ""
      content: "以新22师第66团为右纵队，自沟帮子向盘山挺近。9日，新22师第66团先头部队抵达盘山，下午14时左右发生交战，占领盘山，共军向牛庄撤退。16日午后16时至19日，沙岭激战。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-02-10"
      date_display: ""
      content: "207师今日开拔，廖耀湘明日北飞。新六军奉命卫戍首都，后调防来沪，因东北接收工作迫不容缓，该军于上月初即陆续海运离沪，先头部队十四师已到达新民。配属该军之青年军二〇七师亦定今日开拔。军长廖耀湘与二〇七师师长罗又伦闻明日将乘专机飞锦州，谒见杜聿明后即亲往指挥所部。"
      source: "申报 1946年02月10日 第4版 第24418期"
      source_url: "/newspapers/靑年軍今日離滬廖耀湘即飛錦.html"
      original_text: ""
      notes: ""
    - date: "1946-02-11"
      date_display: ""
      content: "下午由沪飞抵北平"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-02-12"
      date_display: ""
      content: "晨偕东北长官部留守处长李诚毅，分谒东北行营主任熊式辉、北平行营主任李宗仁、第十一战区长官孙xx（连仲？）。并嘱记者前往秦皇岛拍摄新六军罗又伦207师登陆影。新六军二十二师接防盘山后续开入台安、辽中两县接防；207师乘美运输舰八艘由沪抵秦皇岛。"
      source: "華北日報 1946.02.13; 申报 1946年02月16日 第1版 第24424期"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/hbrb19460213-01.1.1; /newspapers/新六軍接防台安遼中廖耀湘即飛錦晤杜聿明.html"
      original_text: ""
      notes: ""
    - date: "1946-02-13"
      date_display: ""
      content: "207师开入锦州，因杜聿明卧病，由参谋长赵家骧代表阅兵。"
      source: "申报 1946年02月16日 第1版 第24424期"
      source_url: "/newspapers/新六軍接防台安遼中廖耀湘即飛錦晤杜聿明.html"
      original_text: ""
      notes: ""
    - date: "1946-02-14"
      date_display: ""
      content: "廖耀湘抵达北平，稍事联络即将飞锦晤杜聿明。杜氏卧病，已有三名大夫同机飞锦医疗。据悉新六军已至沈阳西方九十华里处。"
      source: "時事新報 1946.02.15; 申报 1946年02月16日 第1版 第24424期"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/ssxb19460215-01.1.1; /newspapers/新六軍接防台安遼中廖耀湘即飛錦晤杜聿明.html"
      original_text: ""
      notes: ""
    - date: "1946-02-16"
      date_display: ""
      content: "上午10时，廖耀湘专机由北平飞锦州。东北长官部留守处长李诚毅等人到南苑机场送行。宣抚特使张继、军政部军需署严副署长、步兵司卢司长、东北长官部文处长、第五补给区谭参谋长等十余人同机飞锦。"
      source: "華北日報 1946.02.17"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/hbrb19460217-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-02-17"
      date_display: ""
      content: "军事复员会议"
      source: ""
      source_url: ""
      original_text: ""
      notes: "陈明仁邱清泉王耀武梁华盛都在南京开会了，廖去没去"
    - date: "1946-02-17"
      date_display: ""
      content: "廖耀湘已由北平飞抵锦州会晤杜聿明。军政部次长俞大维、军医署长林可胜亦到达锦州。"
      source: "時事新報 1946.02.18; 時事新報 1946.02.17 第2版"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/ssxb19460218-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-03-10"
      date_display: ""
      content: "新6军由辽中进攻辽南。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-03-21"
      date_display: ""
      content: "新六军攻占辽阳。"
      source: "解放 1946.04.02"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/jfbc19460402-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-03-31"
      date_display: ""
      content: "新六军廖耀湘部主力自辽阳沿南满线向鞍山、刘二堡、七岭子等方向进攻。"
      source: "時代日報 1946.04.02"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/shid19460402-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-05-02"
      date_display: ""
      content: "新6军展开对本溪之攻击。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-04"
      date_display: ""
      content: "会同52军占领本溪。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-05"
      date_display: ""
      content: "获颁胜利勋章。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-06"
      date_display: ""
      content: "新6军结束本溪方面战役。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-07"
      date_display: ""
      content: "新6军回至辽阳南北地区。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-08"
      date_display: ""
      content: "新6军先遣人员开赴开原。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-09"
      date_display: ""
      content: "新6军在辽阳南北各火车站开始车运。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-12"
      date_display: ""
      content: "由辽阳乘火车经沈阳去开原（路过沈阳时下车至长官部见杜聿明了解情况并接受任务，同时也曾研究四平战役结束后下一阶段作战问题）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-13"
      date_display: ""
      content: "新6军两个先头师在新、旧开原以东地区集结完竣（后两个师及军直属部队在5月16日黄昏以前可集中完毕。）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-14"
      date_display: ""
      content: "新6军14师（师长龙天武）指派刘梓皋团进出貂皮屯（未遇战斗即达到目的地）。新6军新22师（师长李涛）指派65团（团长李定一）占领南城子，其后发生威远堡门之激战。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-15"
      date_display: ""
      content: "早晨获得军指挥所参二科连夜整理的在威远堡门所获资料。上午，乘汽车至威远堡门实地了解情况。晚上，给各部队以电话命令，告知下一步作战计划并要求团长以上人员于次日上午8时至新开原指挥所开会，当面给以详细命令和指示。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-16"
      date_display: ""
      content: "上午8时在新开原指挥所开会。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-18"
      date_display: ""
      content: "晚，根据12日与杜聿明商定的战斗指导方案，电令88师（于19日拂晓由开原地区兼程前进至火石岭子地区，限20日拂晓前全部到达，与新22师组成第一线师，由李涛统一指挥）；令207师接平岗之防务（指派一个加强团接替14师平岗之防务）；令14师（与207师交换防务后集结于平岗、火石岭子之间地区）作军之预备队……决心在19日调整部署，20日集中兵力攻击四平街共军之主力（19日晚共军已撤退，未付实施）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-18"
      date_display: ""
      content: "晚，得到新22师电报（火石岭子以西及西北约30华里无共军踪迹）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-19"
      date_display: ""
      content: "下半夜得到（新1军第30师及新38师）进入四平的消息。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-23"
      date_display: ""
      content: "蒋介石夫妇到沈阳视察（廖耀湘和李涛等被视察，国史馆：国民政府主席蒋中正巡视沈阳党政军措施079）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-24"
      date_display: ""
      content: "蒋介石莅临沈阳东北长官部"
      source: ""
      source_url: ""
      original_text: ""
      notes: "好像没有廖耀湘，合照里有杜聿明、郑洞国、梁华盛、赵家骧，但没有廖"
    - date: "1946-05-24"
      date_display: ""
      content: "蒋介石召见刘徳溥、张嘉敖、熊式辉、并巡视沈阳故宫。"
      source: "民國日報 1946.05.25"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/mgrg19460525-01.1.1"
      original_text: ""
      notes: "未见接见廖耀湘报道"
    - date: "1946-05-25"
      date_display: ""
      content: "廖耀湘被任命为长春警备司令。"
      source: "前鋒報 1946.05.25 第1版"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/qifb19460525-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-05-27"
      date_display: ""
      content: "兼任长春警备司令（建康日报1946年05月27第3版）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-28"
      date_display: ""
      content: "警备司令廖耀湘、副司令舒适存于28日正式就职。代长春市长尚传道率秘书长刘守刚等也在次日赶到视事，其他机关相继成立或筹备中。"
      source: "申报 1946年06月14日 第7版 第24542期"
      source_url: "/newspapers/刧後長春在甦生中.html"
      original_text: ""
      notes: ""
    - date: "1946-05-30"
      date_display: ""
      content: "蒋介石偕宋美龄、白崇禧、杜聿明下午12时半离开沈阳，1时10分飞抵长春。郑副长官洞国、警备司令廖耀湘、代市长尚传道及士绅在机场迎接。"
      source: "華光日報 1946.05.31"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/hgrb19460531-01.1.2"
      original_text: ""
      notes: ""
    - date: "1946-06-03"
      date_display: ""
      content: "廖耀湘告知记者长春至吉林明日火车即可恢复，客运可以开始售票，国军将向拉法推进。（民报晚刊1946年6月5日 国家文化资料库）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-06-07"
      date_display: ""
      content: "停止攻击。"
      source: "時事新報 1946.06.08"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/ssxb19460608-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-06-09"
      date_display: ""
      content: "打电话报告拉法受到攻击"
      source: "FRUS, 1946, The Far East: China, Vol.IX, Marshall Mission Files"
      source_url: "https://history.state.gov/historicaldocuments/frus1946v09/d527"
      original_text: ""
      notes: ""
    - date: "1946-06-12"
      date_display: ""
      content: "获颁三等巴斯武士勋章（英）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-06-13"
      date_display: ""
      content: "杜聿明在长春视察，廖耀湘等出席欢迎（国家文化资料库照片：长春欢迎杜聿明将军）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-06-15"
      date_display: ""
      content: "杜聿明偕廖耀湘于下午八时半由永吉专车返回长春（杜聿明晚间飞沈阳）。〔中央社永吉十五日電〕杜長官聿明，梁兼主席華盛，廖司令官耀湘，十五日上午十時出席此間在北山廣塲𦦙行之市民大會，到市民四萬餘人，下午一時杜長官等前往永吉西南廿五公里之小豐滿水力發電所視察，杜長官為嘉奬該所員工保護設備起見，特撥發流通劵廿萬。下午四時由小豐滿抵永吉，即轉車站搭四時五十分專車返長。廖司令官等同行。"
      source: "工商晚報 1946.06.16; 申报 1946.06.16"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=14&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=2e0e00a69cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
      original_text: ""
      notes: ""
    - date: "1946-06-21"
      date_display: ""
      content: "军事调处执行部东北前进小组美代表白鲁德将军抵长春与东北军事当局合影。自右至左：廖耀湘，白鲁德，郑洞国，关邦杰，尚传道。"
      source: "申报 1946年06月21日 第1版 第24549期"
      source_url: "/newspapers/銅圖說明廖耀湘白魯德鄭洞國合影.html"
      original_text: ""
      notes: ""
    - date: "1946-06-22"
      date_display: ""
      content: "长春市民举行慰劳国军大会，郑洞国、廖耀湘接受献花。"
      source: "申报 1946年06月22日 第1版 第24550期"
      source_url: "/newspapers/長春巿民慰勞國軍大會.html"
      original_text: ""
      notes: ""
    - date: "1946-06-28"
      date_display: ""
      content: "何应钦上午11时飞抵长春视察，廖耀湘等陪同，下午16时游览长春名胜。（民报晚刊1946年6月29日 国家文化资料库）"
      source: ""
      source_url: ""
      original_text: "〔中央社長春廿八日電〕何應欽上將於廿八日上午十一時十分由瀋專機飛抵長，同來者有李副部長惟果，蔡參謀長文治，趙參謀長家驥，及潘公弼，王若僖等，鄭副長官洞國，梁兼主席華盛，廖司令官耀湘等，均在機塲歡迎，何氏下機接受獻花，檢閱儀隊後，即乘車逕駛市內前滿鐵總裁公館休息，道經市內大街，歡迎行列長達數里，歡呼不已，情形極為熱烈，何氏將於午參觀各地，可能於廿九日離長轉平。《申报》1946年06月29日  第1版  第24557期 〔中央社長春廿八日電〕何應欽今日下午四時巡視此間名勝及各大建築，由鄭洞國，梁華盛，廖耀湘，尚傳道等陪同前往，迄七時半始返前滿鐵總裁公館，夜間鄭洞國設宴歡迎，並放映汪逆訪東北之影片助興。《申报》1946年06月29日  第1版  第24557期 〔本報北平廿八日電〕今日東北來人稱：東北行營醖釀改組聲中，何應欽突蒞東北，極惹人注視，長春頗有何將繼熊主持東北說，惟此說並未能自最可靠方面證實。《申报》1946年06月29日  第1版  第24557期 "
      notes: ""
    - date: "1946-07-02"
      date_display: ""
      content: "〔中央社長春二日電〕廖耀湘司令官，今日上午十時在中正塲閱兵，長征印緬為國軍爭光之健兒整隊出現長春街頭，時市民爭先出睹，掌聲不絕。"
      source: "申报 1946.07.03"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-07-03"
      date_display: ""
      content: "郑洞国在永吉视察小丰满发电所"
      source: "民报1946年7月5日"
      source_url: ""
      original_text: ""
      notes: "是否廖耀湘同行待查"
    - date: "1946-07-05"
      date_display: ""
      content: "郑洞国由永吉专车返长。"
      source: "民报1946年7月6日"
      source_url: ""
      original_text: ""
      notes: "是否廖耀湘接待待查"
    - date: "1946-07-15"
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: "〔本報長春十五日電〕廖耀湘十五日晨，赴德惠（位於長春東北）視察防務。1946年07月16日  第1版  第24574期"
      notes: ""
    - date: "1946-07-19"
      date_display: ""
      content: "廖耀湘今午自永吉飞长春。"
      source: "民报晚刊7月20日 国家文化资料库"
      source_url: ""
      original_text: ""
      notes: "原文为\"永舌\"，疑为\"永吉\""
    - date: "1946-07-23"
      date_display: ""
      content: "郑洞国廖耀湘等与李立三（敏然）于长春会谈，晚间与尚市长等设宴招待。"
      source: "民报晚刊7月24日 国家文化资料库; 民國日報 1946.07.24"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/mgrg19460724-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-08-13"
      date_display: ""
      content: "长春警备司令部通信布告。"
      source: "東北時報 1946.08.13"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dngb19460813-01.1.2"
      original_text: ""
      notes: ""
    - date: "1946-08-19"
      date_display: ""
      content: "长春警备司令廖耀湘奉令绥靖四平西安一带，遗缺由孙立人担任。19日晚孙抵长春，会晤廖司令商议交接事宜。廖已饬准备移交，一部开往四平，一部开往松花江。"
      source: "華北日報 1946.08.21"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/hbrb19460821-01.1.2"
      original_text: ""
      notes: ""
    - date: "1946-10-07"
      date_display: ""
      content: "〔聯合社天津八日電〕報載：新六軍軍長廖耀湘七日抵瀋，新一軍軍長孫立人及第六十軍軍長八日亦可抵瀋，指示瀋陽或將𦦙行重要軍事會議。"
      source: "申报 1946.10.09"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-10-10"
      date_display: ""
      content: "为《边疆建设》作创刊词。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-10-26"
      date_display: ""
      content: "郑洞国由沈飞长。"
      source: "民报1946年10月28日"
      source_url: ""
      original_text: ""
      notes: "是否廖耀湘接待待查"
    - date: "1946-12-02"
      date_display: ""
      content: "杜聿明返回沈阳后，廖耀湘等由防区来沈举行军事会议。据悉大连共军已开始撤退，国军前进至距离大连不到120里处。"
      source: "立報 1946.12.03"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/libo19461203-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-12-03"
      date_display: ""
      content: "东北将领普获杜鲁门颁发自由勋章，由杜聿明带回沈阳。"
      source: "中央日報 1946.12.04"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/zhyc19461204-01.1.1"
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: "（5月12日晚采取决心与计划，13日早下达相关战斗指令。）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "拂晓"
      content: "65团以战备行军态势由旧开原城出发向南城子搜索前进；9时左右，在南城子以南五华里之威远堡门与共军发生遭遇战；12时左右，得到关于威远堡门激战消息并做出判断及相关指示；16时左右，共军撤退威远堡门。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: "（19日下半夜或20日拂晓前，接长官部向辽河河套发起追击的电令，并指挥195师陈林达部按已策定的作战方案实行。）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "同年"
      content: "为军民日报国庆专刊题词：“为民前锋，为军喉舌，军民相辅，一心一德”。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：兼第六军军长（《抗日名将廖耀湘》）应似有误。"
- year: 1947
  entries:
    - date: "1947-01-31"
      date_display: ""
      content: "廖耀湘由鞍山抵达普兰店，对民众讲话。"
      source: "時事新報 1947.02.03; 武漢日報 (宜昌版) 1947.02.03"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/ssxb19470203-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-02-01"
      date_display: ""
      content: "廖耀湘偕政治部主任周霁光今晨由鞍山乘专车前往普兰店视察。晚八时返回鞍山。"
      source: "民报 1947.02.01 国家文化资料库; 武漢日報 (宜昌版) 1947.02.03"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/wury19470203-01.1.2"
      original_text: ""
      notes: ""
    - date: "1947-02-02"
      date_display: ""
      content: "廖耀湘由普兰店赴营口视察，新六军调至大连附近，当日晚返回鞍山。"
      source: "大公報 1947.02.03"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=11&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=24acba869cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
      original_text: ""
      notes: ""
    - date: "1947-02-02"
      date_display: ""
      content: "廖耀湘抵达沈阳见杜聿明，后即赴辽东视察，自信接收旅大无问题。"
      source: "大公報 1947.02.04"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=16&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=24acc2f29cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
      original_text: ""
      notes: ""
    - date: "1947-02-03"
      date_display: ""
      content: "〔本報瀋陽三日電〕廖耀湘談東北當前唯一急務，為認眞推行縣政，如此松花江南共軍無活動餘地矣，否則一切均無辦法。遼東半島民衆發揮之力量為一最好例證，行政人員需負起責任"
      source: "申报 1947.02.04"
      source_url: ""
      original_text: "〔本報瀋陽三日電〕廖司令官耀湘對記者談稱：大迎接收在軍事上無問題，陸路水路均可前往，行政人員如肯率少數警察，即可至大連執行接收工作。蘇軍因有條約及友好關係，必不能加以阻碍，同時亦不能支援共軍。《申报》1947年02月04日  第1版  第24772期"
      notes: ""
    - date: "1947-02-21"
      date_display: ""
      content: "廖耀湘等来沈阳，即返长春，据称：大连接防遥遥无期，市内难民多逃往普兰店。"
      source: "大江南報 1947.02.22"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dajn19470222-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-03-11"
      date_display: ""
      content: "〔本報瀋陽十一日電〕廖耀湘在鞍山對本報記者談：東北共軍經八個月整訓，或使人增加對共軍有新的神秘之感，但經此次共軍春季攻勢，□□□□無遺。缺點中如對松花江橋頭堡未能攻下，對新武器不善使用等，都是很好的例證。國□□前或不致攻取哈爾濱。"
      source: "申报 1947.03.12"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-03-14"
      date_display: ""
      content: "获颁四等云麾勋章。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-03-17"
      date_display: ""
      content: "沈阳行辕为防止国军进入大连后发生接收机关抢占房屋及其他物资流弊，行辕决定由大一連市政府統一接收，然後再作台理分配，並飭令廖耀湘所部協一助。"
      source: "立報 1947.03.18"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/libo19470318-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-03-18"
      date_display: ""
      content: "上周，廖耀湘来沈向杜聿明汇报与大连市委秘书长黄光斗洽谈事。"
      source: "蘇州明報 1947.03.19; 福建時報 1947.03.19"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/sumb19470319-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-03-21"
      date_display: ""
      content: "大連市黨部主任委員王傑夫，靑年圑組長高廣溥，市商會常務理事韓岡蘊等廿一日上午四時同訪廖耀湘，洽商大連事務。"
      source: "大江南報 1947.03.24"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dajn19470324-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-04-03"
      date_display: ""
      content: "廖耀湘谈接收大连无问题。"
      source: "越報 1947.04.04"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/yueb19470404-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-04-06"
      date_display: ""
      content: "普兰店中苏第一线将领会谈，为接收旅大先声。廖耀湘定当夜由鞍山赴沈阳，报告会谈情形。苏方允我先接收洼子店。"
      source: "申报 1947年04月07日 第2版 第24834期"
      source_url: "/newspapers/接收旅大益趨具體中蘇將領舉行會談.html"
      original_text: ""
      notes: ""
    - date: "1947-04-10"
      date_display: ""
      content: "据刚由普兰店来沈阳之廖耀湘軍民語記者稱：此次會晤係普通聯絡性质，聞旅大區內共軍正進行有計劃之地下组织。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-04-15"
      date_display: ""
      content: "［本報瀋陽十五日電］據悉，龔學遂定廿日來瀋，關於接收大連事，與有關方面有所商談。然關於接收大連問題，仍有不少枝節。如旅順軍港區劃界問題，即為最麻煩之問題。他如中長路問題，蘇方亦有異議。"
      source: ""
      source_url: ""
      original_text: "［本報瀋陽十五日電］新六軍軍長廖耀湘將軍今日上午自鞍山來瀋謁杜長官。渠今午語本報記者稱：關於接收大連問題，我方所交蘇方之書面六項提議，蘇方尚無任何答覆。1947年04月16日  第1版  第24843期"
      notes: ""
    - date: "1947-04-22"
      date_display: ""
      content: "为沈阳新报创刊周年纪念题词：“猗欤新报，革命先鞭，墨张正义，笔扫顽奸，启迪后进，斯民景瞻，日新月进，时代前端”。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-05-15"
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: "〔本報瀋陽十六日電〕第六綏靖區司令官廖耀湘，十五日午三時由撫順抵淸源坐鎮，瀋海，中長兩路軍運忙，國軍可重佔優勢。1947年05月17日  第1版  第24874期"
      notes: ""
    - date: "1947-05-18"
      date_display: ""
      content: "廖耀湘自清源来沈阳，与杜长官商讨防务，于21日返回防区。"
      source: "東南日報 1947.05.22"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-05-20"
      date_display: ""
      content: "下午5时，长官部召开军事会议，赵家骧主持，郑洞国参与。"
      source: "東南日報 1947.05.22"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-05-21"
      date_display: ""
      content: "廖耀湘自沈阳返回防区。"
      source: "東南日報 1947.05.22"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dnrb19470522-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-05-27"
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: "〔本報瀋陽廿七日電〕遼北重鎮鄭家屯，日前被共軍攻陷。又法庫共軍廿七日起，向鐵嶺方面移動，有進犯鐵嶺企圖。平梅路之東豐，廿六日被共軍攻陷，西安情况不明，國軍反擊中。1947年05月28日  第2版  第24885期 〔又電〕王叔銘，鄭洞國，廖耀湘廿七日晨聯袂謁熊式輝，商討當前軍事問題，並同進午餐，〔中央社瀋陽廿七日電〕吉林外圍形勢益穩固，日來戰事中心之市區東北主黃山咀子附近兩高地，為國軍收復，共軍東潰。小豐滿外圍，經國軍予來犯共軍以嚴重打擊，形勢已緩，最近三日無戰事。1947年05月28日  第2版  第24885期 "
      notes: ""
    - date: "1947-05-29"
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: "〔本報瀋陽廿九日電〕昌圖一帶戰事，廿九日在陰雨中進行，異常激烈，廖耀湘廿九日親赴前方指揮，國軍援軍亦開到。據軍事機關表示，東北戰事極有把握。又，空軍廿九日飛西安偵察，據報吿：犯西安共軍曾與國軍展開砲戰，另一部共軍則由東郊繞至白水，企圖與犯四平街之共軍會合。瀋陽永吉間永吉鐵路綫上之梅河口在巷戰中。據軍事機關表示嚴重險期已渡過，日內可有轉機。1947年05月30日  第2版  第24887期"
      notes: ""
    - date: "1947-05-31"
      date_display: ""
      content: "蒋召见廖耀湘（来源：蒋介石日记）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-06-02"
      date_display: ""
      content: "晚，共产党军队不战而占领开原新城区。6月3日凌晨5点，经过激战后占领老城区。高级国民党军官及其家属在激战开始前就已撤离该城。消息来源：目击者翁家麟，前执行总部库利上校的线人。前国民党新六军军长、现负责沈阳防务的廖耀湘将军及其参谋长已于几天前撤离家属。廖耀湘下令其麾下所有军官撤离家属。共产党军队正从东、北、西三个方向向沈阳推进。北部已抵达开原。铁岭是共产党军队和沈阳之间北部唯一的国民党据点。东部共产党军队已推进至清原。驻守梅河口（电报139，6月3日）的国民党师被共产党军队歼灭。消息来源：廖耀湘将军的前机要秘书。"
      source: ""
      source_url: ""
      original_text: "New section Kaiyuan occupied by Communists without fight night June 2. Old section city taken after heavy fighting at 5:00 a.m., [Page 164] June 3. High ranking National officers and families evacuated city even before heavy fighting began. Source: Eye witness Ung Chialing, former informant of Col. Cully, Executive Headquarters. General Liao Yueh-hsiang, former Commander, National New Sixth Army, now responsible for defense Mukden, and his Chief of Staff evacuated families several days ago. Liao issued order to all officers in his Command advising them to evacuate families. Communists advancing Mukden from east, north and west. Have reached Kaiyuan on north. Tiehling only one National strong point between Communists and Mukden on north. Communists as far as Chingyuan on east. National Division at Meihoukou (mytel 139, June 3) annihilated by Communists. Source: Former confidential secretary of General Liao."
      notes: ""
    - date: "1947-06-03"
      date_display: ""
      content: "廖耀湘下令家属离开沈阳"
      source: "FRUS, 1947, The Far East: China, Vol.VII, Telegram from Consul General at Mukden (Ward)"
      source_url: "https://history.state.gov/historicaldocuments/frus1947v07/d134"
      original_text: ""
      notes: ""
    - date: "1947-06-04"
      date_display: ""
      content: "廖耀湘在铁岭指挥。"
      source: "鎮海報 1947.06.06"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/zhhb19470606-01.1.2"
      original_text: ""
      notes: ""
    - date: "1947-06-09"
      date_display: ""
      content: "廖耀湘由铁岭至沈阳见杜聿明，并当日返回铁岭。"
      source: "新民报 南京 1947.06.10 第1版"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-06-09"
      date_display: ""
      content: "晨3时自铁岭至沈阳，10时谒杜长官，报告军情，日内即返回。记者询问军情，他说，共军此次向南深窥，纯系侥幸。目前情况可以具体告者：1）共军侥幸之机已经过去。2）国军战略连接，业已稳固。3）现在战事不在小据点得失，而在摧毁野战军之主力，共军主力约六个师在开原以北，我将给予歼灭之打击，惟此时机不愿预计，不久将有惊人之发展奉告。彼提到哈尔滨未来情势，促记者注意。"
      source: "中央日報 1947.06.10"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/zyrb19470610-01.1.2"
      original_text: ""
      notes: ""
    - date: "1947-06-13"
      date_display: ""
      content: "〔中央社瀋陽十四日電〕廖耀湘十三日晚由鐵嶺來瀋，據語記者，鐵嶺防務已按原定計劃全部完成，共車迄未敢進窺。廖氏分析戰局稱：共軍日來圍攻四平，可能為佯攻性質，僅以多數砲兵圍攻，其眞正野心，可能仍為瀋陽，惟吾人可斷言，其必不能飛越鐵嶺進犯。"
      source: "申报 1947.06.15"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-06-27"
      date_display: ""
      content: "〔中央社瀋陽廿七日電〕四平下午四時電話，國軍北上援軍，廿七日午已攻克距四平三十公里之泉頭，當晚或廿八日最可抵達四平近郊。又開原下午一時電話，鄭副長官偕廖軍長耀湘，舒副軍長適存，廿七日午乘專車抵此，稍事休息，即赴前進防地視察。據鄭副長官語記者，泉頭為共軍據點，國軍一𦦙攻克，可謂甚大勝利。蓋泉頭，四平間當無何阻力，四平之圍不但迎刃而解，而頑攻之共軍，將必就地殲滅，開原慘遭浩刦，極為荒凉。"
      source: "申报 1947.06.28"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-07-09"
      date_display: ""
      content: "〔本報瀋陽九日電〕堅守四平之陳明仁將軍與劉翰東主席，九日下午五時廿分隨鄭洞國副長官，廖耀湘軍長乘專機凱旋來瀋。熊主席着戎裝親迎，各省市首長均在機塲歡迎，彩車過處，呼聲四起，為近來罕見盛况。又董彥平孫立人即飛京。"
      source: "申报 1947.07.10"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-07-12"
      date_display: ""
      content: "开原，廖耀湘接待慰劳团，介绍战斗英雄及军医院等。廖耀湘表示铁岭之役，敌知难而退，旋攻四平，以为不堪一击，实估计错误。盖不打四平而先攻开原，继而进犯铁岭不逞，回师四平，在时间上已迟了两个星期，卒至溃败。"
      source: "当代晚报 1947.07.13 第1版; 武漢日報 1947.07.14"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/wrbo19470714-01.1.2"
      original_text: ""
      notes: ""
    - date: "1947-07-15"
      date_display: ""
      content: "廖耀湘15日晨率随员赴德惠视察，当晚返长春。"
      source: "華北日報 1946.07.17"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/hbrb19460717-01.1.2"
      original_text: ""
      notes: ""
    - date: "1947-07-15"
      date_display: ""
      content: "陈诚到任沈阳"
      source: ""
      source_url: ""
      original_text: ""
      notes: "咋没看见廖耀湘的身影呢？完全没有。只看见赵家骧和郑洞国"
    - date: "1947-07-24"
      date_display: ""
      content: "〔中央社瀋陽廿三日電〕四平會戰有功人員授勛典禮，定廿四日晨舉行，計頒發勛章七十八座，獎章八百餘座，陳軍長明仁及七十一軍八十八師廖排長鈞，各授靑天白日勛章，劉主席翰東授一等雲麾勛章，熊師長新民，宋副師長邦緯，龍師長澤匯，各授三等寳鼎勛章，廖軍長耀湘，周軍長福成，盧軍長濬泉，潘軍長裕昆，各授三等雲麾勛章。"
      source: "申报 1947.07.24"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-08"
      date_display: ""
      content: "捐资国币一亿元（查当时兑换标准约可兑换3400美元，按当时市价可购大米7万斤）成立“耀湘储金奖学会”，具体事宜委托其启蒙恩师石达成（时任邵阳县参议）代为办理。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-08-06"
      date_display: ""
      content: "魏德迈抵达沈阳，会晤廖耀湘。"
      source: "工商晚報 1947.08.07"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=12&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=2e1478989cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
      original_text: ""
      notes: ""
    - date: "1947-08-08"
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: "〔中央社瀋陽八日電〕陳總長誠八日晨專車赴鐵嶺，慰勞當地駐軍，鄭洞國·廖耀湘偕行，當日下午四時返瀋。1947年08月09日  第1版  第24958期"
      notes: ""
    - date: "1947-08-09"
      date_display: ""
      content: "陈诚偕郑洞国廖耀湘等前往铁岭视察。"
      source: "前鋒報 1947.08.10"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/qifb19470810-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-09"
      date_display: ""
      content: "东北第6绥靖区改编为东北第4兵团。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-09-01"
      date_display: ""
      content: "升任东北第4兵团（辖新编第3军、新编第6军、青年军207师及骑兵第2军）中将司令官，驻沈阳。为《新六军三周年纪念册》题字题词并著《新六军三周年纪念日告官兵书》代序，写文《缅战与教训——军长讲述》。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-09-02"
      date_display: ""
      content: "熊式辉离任也没看见廖耀湘送别（又看见郑洞国了，陈诚也去了）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-09-03"
      date_display: ""
      content: "〔本報瀋陽二日電〕第四兵團司令廖耀湘，副司令舒適存及新八軍軍長李滿，昨在□嶺宣誓就職。"
      source: "申报 1947.09.03"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-10-08"
      date_display: ""
      content: "蔣介石離開瀋陽"
      source: ""
      source_url: ""
      original_text: ""
      notes: "難道廖也沒去送別？"
    - date: "1947-10-13"
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: "〔本報瀋陽十三日電〕廖耀湘將軍督戰南北，來去匆匆。十三日記者遇之某處，據談：目前戰局雖不容過份樂觀，但確已趨穩定。匪六次攻勢來勢甚兇，其計劃為澈底破壞北寗路，切斷關內外重要補給路綫，然後奪新民，取鐵嶺，下營口，攫大虎山，完成整個包圍東北心臟之瀋陽，現已𦦙東北野戰匪衆傾巢而出，迄今已臨“六次攻勢”開端戰結束階段。開端戰階段國軍已打破匪之計劃，匪所獲不但無多，而在鐵嶺新民並遭受莫大打擊，現正在考量賭本，徘徊於開原鐵嶺及其他戰綫間。匪一·三·四·六·縱隊打開原鐵嶺，二縱隊打四平，七縱隊打新民，大虎山，八縱隊打營口，十一縱隊打撫順，五，九，十縱隊亦均出動，“六次攻勢”初期使用如此龐大兵力，其一·三·四·六等縱隊，匪目之為勁旅，結局如此，匪不能不考慮賭本也。此後艱難雖多，但國軍實力增强，終能獲得最後勝利。 1947年10月14日  第1版  第25023期"
      notes: ""
    - date: "1947-10-24"
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: "〔本報瀋陽廿四日電〕遼北開原周福成部，與鐵嶺廖耀湘部雙方出擊，克中固後，廿四日午巳會師於北高台子。西綫瀋陽西北國軍再度向新立屯及彰武一帶作主動之攻擊。北票連日激戰，空軍投擲大批軍實接濟守軍。1947年10月25日  第1版  第25034期"
      notes: ""
    - date: "1947-10-30"
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: "〔本報瀋陽卅日電〕廖耀湘卅日再赴鐵嶺開原間指揮鐵開國軍公路出擊，聲勢頗大，首先克昌圖車站，二十九日午再克昌圖縣城（車站西北十餘公里）。昌圖四平間共匪聞風他竄，現鐵（嶺）四（平）間已無匪踪。西綫由錦州馳援義縣國軍，二十九日會師義縣。錦古綫搶修隊越薛家站抵上齊台。遼西國軍二十八日掃蕩老邊（錦西西北十公里）一帶殘匪，當將匪興城支隊包圍殲滅過半。1947年10月31日  第1版  第20540期"
      notes: ""
    - date: "1947-10-31"
      date_display: ""
      content: "〔本報瀋陽卅一日電〕孫連仲卅一日下午一時由平飛抵瀋，綏署副參長鄭長海第九人偕來，孫來東北係奉陳誠電召，將有二三日勾留。陳誠卅一日夜召各省市首長及東北元老與孫連仲共進晚餐後，各軍事首長開會檢討軍事，除陳孫外，鄭洞國，孫渡及行轅兩參長。廖耀湘，周福成，由鐵嶺開原趕回，趙家驤由錦飛返，午夜始散。"
      source: "申报 1947.11.01"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-11"
      date_display: ""
      content: "所部改称第9兵团（辖新编第3军、新编第6军），仍任中将司令官。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-11-08"
      date_display: ""
      content: "晋颁二等云麾勋章。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-12-17"
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: "〔本報濬陽十六日電〕行轅召開之軍事檢討會議，今日下午閉幕，廖耀湘·周福成·潘裕昆等高級將領數十人，均怱怱返防。1947年12月17日  第1版  第25087期"
      notes: ""
    - date: ""
      date_display: "10月间"
      content: "指派新6军暂62师（师长刘梓皋）担任法库防务。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "11月间"
      content: "为支援彰武方面新3军及第105师，暂62师第2团奉令向康平佯攻，因有营长临阵脱逃致使团长阵亡（部队无损失），亲至法库集合全师军官将该营长枪毙。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1948
  entries:
    - date: "1948-01"
      date_display: ""
      content: "东北各兵团与管内兵团统一番号，东北第4兵团改为第9兵团（辖新编第3军、新编第6军、骑兵第2军）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-01-20"
      date_display: ""
      content: "兼任第7（沈阳）陆军训练处（兼处长卫立煌）副处长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-02-18"
      date_display: ""
      content: "自拟急电给暂62师刘梓皋，命其当晚立即由法库经通江口向开原方向撤退。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-04-11"
      date_display: ""
      content: "写《廖耀湘呈国民政府蒋主席中正为东北现阶段作战计划意见》。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-04-18"
      date_display: ""
      content: "〔本報瀋陽十八日電〕中央軍校校長關麟徵，十八日晨九時在潘檢閱廖耀湘兵團，下午二時赴撫順視察第三軍官訓練班，定十九日返瀋。"
      source: "申报 1948.04.19"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-05"
      date_display: ""
      content: "第9兵团扩大为机动攻击兵团（也称西进兵团或辽西兵团），改辖新编第1军、新编第3军、新编第6军，第49军、第52军、第71军。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-05-04"
      date_display: ""
      content: "［本報北平四日電］廖耀湘四日由浙過平飛京，在平西苑機塲曾停留一小時餘，與平軍事當局接觸。"
      source: "申报 1948.05.05"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-05-06"
      date_display: ""
      content: "蒋介石召见赵家骧、廖耀湘。"
      source: "中央日報 1948.05.07"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/zyrb19480507-01.1.2"
      original_text: ""
      notes: ""
    - date: "1948-05-07"
      date_display: ""
      content: "赵家骧、廖耀湘再谒蒋主席。"
      source: "中央日報 1948.05.08"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/zyrb19480508-01.1.2"
      original_text: ""
      notes: ""
    - date: "1948-05-08"
      date_display: ""
      content: "廖耀湘赵家骧来京述职结束，将飞沪并转东北。"
      source: "華僑日報 1948.05.09"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=19&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=280eee2a9cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
      original_text: ""
      notes: ""
    - date: "1948-05-09"
      date_display: ""
      content: "〔本報北平九日電〕張作相·馬占山·趙家驤等，定十一日離平飛潘·九日午傅作義在西郊宴張·馬·趙及廖耀湘·王鐵漢等，席間對東北·華北加緊連繫，遏止東北共匪七次攻勢及阻其進入關內檢計甚久，聞已有所決定。趙家驤·廖耀湘·王鐵漢·董英斌·董彥平·羅又倫等東北將領，九日晚在楚漢春寓聯名宴請張作相·馬占山·藉表歡迎二老出關之意。"
      source: "申报 1948.05.10"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-05-10"
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: "〔本報北平十日電〕東北華北高級將領，十日晨九時在西郊華北剿總𦦙行聯席會議，由傅作義親自主持。張作相·馬占山·趙家驤·廖耀湘·董英斌·董彥平等均出席，對東北·華北聯□及剿匪戰術再加研討，下午繼續開會，東北諸將星定十一日午後飛瀋。《申报》1948年05月11日  第1版  第25227期 〔本報北平十日電〕半官方面透露政府對東北作戰方案，確有全盤新決定，今後將加强空運，並打通陸路交通綫，盡量發揮人力，物力，戰略上將澄淸遼西走廊，以華北力量支持遼西，以遼西支持瀋陽，至共匪次一攻勢，可能以錦州及葫蘆島為目標·《申报》1948年05月11日  第1版  第25227期 "
      notes: ""
    - date: "1948-05-11"
      date_display: ""
      content: "〔本報瀋陽十一日電〕張作相·馬占山·趙家驤·廖耀湘·王鐵漢·米春霖·羅又倫等，十一日下午五時同機抵瀋，據有關方面透露，挽救東北大計，已臻具體。"
      source: "申报 1948.05.12"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-05-27"
      date_display: ""
      content: "〔本報潘陽廿七日電〕據悉：廖耀湘將繼渠華盛任□防守司令官，梁有出任京滬警備司令說。"
      source: "申报 1948.05.28"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-05-30"
      date_display: ""
      content: "传闻廖耀湘将出任沈阳防守司令。"
      source: "大公晚報 1948.05.30"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dgwb19480530-01.1.1"
      original_text: ""
      notes: ""
    - date: "1948-09-22"
      date_display: ""
      content: "晋任陆军少将。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-09-26"
      date_display: ""
      content: "至卫立煌家吃晚饭（另有顾祝同），并将研究意见电报蒋介石。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-09-27"
      date_display: ""
      content: "接蒋介石回电，仍要执行原来行动。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-09-28"
      date_display: ""
      content: "见顾祝同，个别谈话并遭斥责。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-09-29"
      date_display: ""
      content: "顾祝同飞回南京。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-02"
      date_display: ""
      content: "蒋介石飞到沈阳，在励志社单独会见蒋介石。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-02"
      date_display: ""
      content: "蒋介石到沈阳视察（国史馆：总统蒋中正茶会招待东北军政首长）接见廖耀湘等"
      source: ""
      source_url: ""
      original_text: "〔本報北平三日電〕此間獲悉：總統係於二日午十二時十分由平飛批瀋陽。周至柔·郭懺·兪濟時隨行，衛立煌亦陪同飛濟，趙家驤先機返瀋布置。至機塲恭迎者有王鐵漢·董文琦·廖耀湘·高惜冰等，總統着戎裝，外披戴五星章之黃色斗篷，下機後向歡迎者頻頻點首，說好好，旋卽乘車赴勵志社行邸休息，並接見萬福麟·馬占山·董英斌·王鐵漢·董文琦·徐梁·廖耀湘等，略事詢問，各首長卽行辭出，總統午餐後小憇一小時，至午後三時親主持剿總軍事會議，在瀋各軍事首長均參加，歷二小時始畢，總統於五時離剿總返行邸休息，六時再蒞剿總，召集政委會委員，各省高級官員，聽取政情報吿，晚七時假剿總會餐，各軍政首長均被邀參加，餐後，總統復個別接見各首長，垂詢甚詳，至深夜始散。總統此次蒞瀋係第四次，街頭略有戒備，市民皆知總統蒞瀋。《申报》1948年10月04日  第1版  第25372期 〔中央社瀋陽三日電〕總統二日晚六時對政委會委員，各省市首長，各部隊長訓話，盼望黨政軍同心同德，配合軍事，完成戡亂大事，叮囑武裝同志，要有殺身成仁精神，努力剿匪，訓話後聚餐，席間總統再三叮嚀軍政須切實合作，擊潰土匪，而軍政尤須服從衛總司令命令，展開總體戰工作。總統對衛總司令半年米，使東北轉危為安之成就，備致嘉許，晚八時再召集各部隊長訓話。三日晨八時半在行邸召見廖耀湘，周福成，九時召見王鐵漢，董文琦等指示一切，十時召見瀋陽報界負責人，聆取瀋陽新聞事業實况，並訊示努力配合戡亂建國大業，加强報導工作，十時一刻召見衛立煌，周至柔，郭懺，陳良，董彥平，對軍糧供應再作指示，十一時總統偕周至柔，郭懺，兪濟時等乘專機離瀋。《申报》1948年10月04日  第1版  第25372期 〔本報北平三日電〕蔣總統三日上午十一時十五分離瀋南飛，下午一時安抵北平，總統下午曾遊頤和園。《申报》1948年10月04日  第1版  第25372期 "
      notes: ""
    - date: "1948-10-08"
      date_display: ""
      content: "辽西兵团主力开始向巨流河、新民地区集中（未能在11日以前集中完竣）。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-11"
      date_display: ""
      content: "黄昏，占领彰武。与剿总参谋长联络询问锦州当天战况并将情况告诉卫立煌。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-11"
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: "〔本報瀋陽十一日電〕瀋陽西進大軍廖耀湘兵團，十一日下午四時收復瀋西北軍事交通及糧源要地彰武城，戰果輝煌，為東北國軍轉捩戰局進軍一大勝利，匪趕往彰武應援之第五縱隊先國軍收復法庫彰武間之彰武台門，及秀水河子重要據點復乘勝進軍。 1948年10月12日  第1版  第25379期"
      notes: ""
    - date: "1948-10-12"
      date_display: ""
      content: "令71军（原在新民担任防务）北向彰武、西向新立屯、黑山、大虎山方向搜索扫荡。上午陪卫立煌、罗泽闿在彰武前线视察。12时回新民。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-13"
      date_display: ""
      content: "下半夜接蒋介石手电切责，要求亲率主力向锦州前进。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-14"
      date_display: ""
      content: "早晨下令兵团渡新开河西进（留49军一个师守备彰武、71军一个师暂留新民地区）。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-15"
      date_display: ""
      content: "占领新立屯并到达黑山外围。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-16"
      date_display: ""
      content: "拂晓前接刘梓皋（暂62师师长，在葫芦岛整训，塔山预备队）电报称锦州已解放。之后打电话给赵家骧、卫立煌、蒋介石。通知向凤武（71军军长）暂停对黑山的攻击，通知李涛（新6军军长）将部队集结。上午11时左右，杜聿明乘车到新民，与杜商议如何行动问题。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-17"
      date_display: ""
      content: "早上，见卫立煌。下午回新民。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-18"
      date_display: ""
      content: "晚上，电告卫立煌已做好准备于次日攻击黑山，被卫要求等待。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-19"
      date_display: "10月19-20日"
      content: "蒋介石在北平召集卫立煌、杜聿明商讨行动方针。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-19"
      date_display: ""
      content: "全天联系沈阳希望知道决策。晚上直电蒋介石，坚决要求退营口。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-20"
      date_display: ""
      content: "晚上，接卫立煌电话，同意退营口。电告向凤武（71军军长）于次日拂晓攻击黑山。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-21"
      date_display: ""
      content: "71军攻击黑山。令潘裕昆22日亲至前线视察，下午至兵团部报告并接受任务。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-22"
      date_display: ""
      content: "潘裕昆报告前线情况，改命潘裕昆卫攻击指挥官。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-23"
      date_display: ""
      content: "拂晓，新1军参加对黑山的攻击。晚9点，下达向营口撤退命令。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-24"
      date_display: ""
      content: "下午，新6军军部及军属169师到达胡家窝棚。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-24"
      date_display: ""
      content: "到达胡家窝棚，率前进指挥所拟随新6军军部行动。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-26"
      date_display: ""
      content: "胡家窝棚的兵团前进指挥所发生战斗。上午抵达新30师（师长文小山）师部，约11时，李涛（新6军军长）及杨焜（兵团参谋长）到达，12时左右潘裕昆（新1军军长）到达，之后向凤武（71军军长）到达。16时与新22师取得联系，17时左右离开新30师，黄昏左右到达新22师师部，与郑庭笈（49军军长）通电。下半夜率新22师64团到达49军军部陈家窝棚，黎明前到达军部。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-27"
      date_display: ""
      content: "8时左右出门，至新6军军部。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-28"
      date_display: ""
      content: "在黑山被俘，先后关押于东北军区解放军官教导团（哈尔滨、佳木斯等地）、黑龙江绥化监狱、抚顺战犯管理所。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: ""
      date_display: "5月初"
      content: "乘专机到南京，受蒋介石召见。翌日在蒋私邸开会，会间与罗泽闿有发生争吵。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html"
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：《辽西战役纪实》中此处关于占领彰武的时间似有误。"
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：参考资料《国民革命军第五军将官录》、《抗日名将廖耀湘》关于兵团改组及下辖部队问题各说法不一。依《新六军成立三周年纪念册》看，则9月1日晋升时司令时兵团似已称为9兵团。"
