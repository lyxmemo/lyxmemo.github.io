    - date: "1945-06-12"
      date_display: ""
      content: "湘西雪峰山会战决战阶段，何应钦在安江召开军事会议讨论使用新六军等第二线兵力的作战方案。廖耀湘与肖毅肃、冷欣、罗幸理联合提出「中央突破、将敌压缩于资水以西歼灭」的方案，明确反对方面军参谋长邱维达提出的「左翼迂回」方案，理由是美械装备部队离开公路无法发挥优势。辩论持续至深夜，最终何应钦采纳邱维达方案。"
      source: "我对湘西「雪峰山会战」的回忆（节选）"
      source_url: '/battles_history/1945/我对湘西"雪峰山会战"的回忆（节选）.html'
      original_text: "廖耀湘提出不同意第一个方案的理由是：将美械装备部队投到深山樵夫小道上去，等于消耗自己的优势，美式装备部队离开公路不能作战。"
      notes: ""
    - date: "1945-07-06"
      date_display: ""
      content: "获颁金质棕榈叶勋饰自由勋章（美）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-07-19"
      date_display: ""
      content: "芷江沅郡联中学生因校方贪污食堂经费爆发「7·19」事件，县政府派警察持枪入校镇压、逮捕学生代表。学生向驻校的新六军军长廖耀湘面陈情况请求主持公道，廖耀湘当面命令参谋长赵霞加强大门岗哨，任何军警未经许可不得入校抓人。此后警卫连增兵把守并张贴告示，再有持枪警察入校即被缴械驱逐。斗争历时半月，县长秦佑农被免职，学生取得胜利。"
      source: "廖耀湘在芷江的二三事"
      source_url: "/battles_history/1945/廖耀湘在芷江的二三事.html"
      original_text: "廖军长耳闻目睹此事亦深感不平，出于同情和义愤，就在学校操坪里，我亲见廖军长把参谋长赵護少将叫到跟前交待：「加强大门岗哨，任何人不得到校内抓走学生。」"
      notes: ""
    - date: "1945-08-15"
      date_display: ""
      content: "日本宣布无条件投降。新编第6军负责日本投降签字典礼筹备工作及安保工作。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "8月"
      content: "新六军担任芷江洽降警卫任务期间，私人出钱为家乡购买食盐2000斤，嘱托乡人带回，以解乡民食盐匮乏之苦。"
      source: "乡亲传颂二三事（陈希桥）"
      source_url: "/ten_year_memorial/乡亲传颂二三事（陈希桥）.html"
      original_text: "私人出钱买食盐2000斤"
      notes: ""
    - date: "1945-08-18"
      date_display: ""
      content: "第四方面军司令官王耀武派副官处长赵汝汉少将率队抵达芷江，当日下午召集当地军政机关负责人开会，成立「日本投降签字典礼筹备处」，推举新六军军长廖耀湘中将为主任委员，各机关首长为委员，赵汝汉为总干事负责实际执行工作。日本签字典礼筹备处全体职员在中美空军联队俱乐部前合影。"
      source: "参与芷江「日本洽降」经过"
      source_url: '/battles_history/1945/参与芷江"日本洽降"经过.html'
      original_text: "即时成立「日本投降签字典礼筹备处」，推举新六军军长廖耀湘中将为主任委员，出席的各机关首长为委员，赵汝汉少将为总干事，负责实际工作之执行"
      notes: ""
    - date: "1945-08-21"
      date_display: "8月21-23日"
      content: "列席芷江洽降仪式。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-08-27"
      date_display: ""
      content: "新六军副军长舒适存随冷欣中将率前进指挥所一行159人乘七架美军运输机由芷江飞抵南京，新六军被指定接收南京防区。新六军官兵52人随行先遣。"
      source: "申报 1945年08月28日 第1版 第25650期"
      source_url: "/newspapers/前進指揮所主任冷欣中將飛抵京.html"
      original_text: ""
      notes: ""
    - date: "1945-09-04"
      date_display: ""
      content: "晨，新六军开始空运南京。原定自四日晨起开始空运，惟当日气候恶劣，临时停止，五日晨气候转佳，已开始空运。"
      source: "東南日報 1945.09.05; 申报 1945年09月06日 第1版 第25659期"
      source_url: "/newspapers/新六軍健兒一營昨晨自芷江到京.html"
      original_text: ""
      notes: ""
    - date: "1945-09-04"
      date_display: ""
      content: "芷江各界举行庆祝胜利日大会，同时欢迎何应钦进驻芷江，欢送即将赴京之新六军。何应钦、廖耀湘军长相继演说，芷江各界签名书赠廖军长，以酬其保卫湘西之功。"
      source: "申报 1945年09月05日 第1版 第25658期"
      source_url: "/newspapers/芷江慶祝勝利大會盛况.html"
      original_text: ""
      notes: ""
    - date: "1945-09-05"
      date_display: ""
      content: "为接受占领南京、控制冈村宁次总部，接受京沪铁路沿线防务，确保南京、上海交通畅通，新编第6军空运南京，并担任防城任务。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-09-06"
      date_display: ""
      content: "美军开始大规模空运八万中国军队至京沪，为军事史上最大规模空运之一。新六军由美第十航空隊自芷江空运南京，往返飞行距离1300英里，预计四十日完成。廖耀湘逐日向蒋中正电报汇报空运人数及武器数量，如9月11日报告当日以C46运输机37架空运官兵1383人、步枪3371枝等。"
      source: "申报 1945年09月07日 第1版 第25660期; 国史馆藏廖耀湘电蒋中正空运南京系列电报"
      source_url: "/newspapers/最大規模空運昨開始實現我八萬大軍分運京滬.html; /liaos_tele/1945-09-11廖耀湘电蒋中正新六军十一日空运南京官兵员与步枪等武器数量.html"
      original_text: ""
      notes: ""
    - date: "1945-09-07"
      date_display: ""
      content: "廖耀湘偕十四师师长龙天武等飞抵南京，新六军军司令部设于黄埔路。先遣部队已于6日接收光华门外防务，后续部队自8日起加紧空运。据何应钦转呈廖耀湘报告，龙天武师进驻南京后即施行警备并收缴日军武器。"
      source: "申报 1945年09月09日 第1版 第25662期; 何应钦电蒋中正据廖耀湘报告龙天武师进驻南京收缴日军武器施行警备情形"
      source_url: "/newspapers/新六軍分批空運到京.html; /liaos_tele/1945-09-17何应钦电蒋中正据廖耀湘报告龙天武师进驻南京收缴日军武器施行警备情形.html"
      original_text: ""
      notes: ""
    - date: "1945-09-09"
      date_display: ""
      content: "受降签字仪式在南京举行，参加观礼。据何应钦事后报告，受降时南京仅运到新六军五个连，当时城区敌军约七万、伪军一万余。黄埔路上满布空运抵此之宪兵及新六军担任警戒，安保工作全由新6军第14师40团担任。"
      source: "申报 1945年09月10日 第1版 第25663期; 申报 1946年05月14日 第2版 第24511期"
      source_url: "/newspapers/中國日軍投降簽字昨在京順利完成.html; /newspapers/何總司令報吿執行任務情形.html"
      original_text: ""
      notes: ""
    - date: "1945-09-09"
      date_display: ""
      content: "受降签字后七小时，何应钦率陆海军将校约八十人谒陵，廖耀湘随行，舒适存、龙天武分率新六军战士乘车前导。"
      source: "中缅印战区盟军将帅图志P252; 申报 1945年09月10日 第1版 第25663期"
      source_url: "/newspapers/受降後七小時何總司令謁陵.html"
      original_text: ""
      notes: ""
    - date: "1945-09-13"
      date_display: ""
      content: "新六军开始在南京城郊布防，备受市民热烈欢迎。"
      source: "申报 1945年09月14日 第1版 第25667期"
      source_url: "/newspapers/新六軍在京布防受熱烈歡迎.html"
      original_text: ""
      notes: ""
    - date: "1945-09-14"
      date_display: ""
      content: "南京全体商民推派代表向何应钦献旗致敬，并备大批慰劳物品慰劳总部将士及新六军。"
      source: "申报 1945年09月15日 第1版 第25668期"
      source_url: "/newspapers/京市民代表謁何總司令獻旗致敬.html"
      original_text: ""
      notes: ""
    - date: "1945-09-14"
      date_display: ""
      content: "第三方面军汤恩伯在沪招待记者，称接收南京之工作已委派新六军廖军长代表处理。"
      source: "申报 1945年09月15日 第1版 第25668期"
      source_url: "/newspapers/湯司令官招待記者談接收京滬工作.html"
      original_text: ""
      notes: ""
    - date: "1945-09-15"
      date_display: ""
      content: "廖耀湘向美联社记者表示：由久历缅甸战事之部队组成中国之新六军，定于国庆日正式进入南京。廖耀湘之部队已占领南京之数商业区，南京之新六军每日增加数百人。"
      source: "時事新報 1945.09.17"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/ssxb19450917-01.1.2"
      original_text: ""
      notes: ""
    - date: "1945-09-15"
      date_display: ""
      content: "新六军空运部队到达者骤增，南京警卫除挹江门一隅外均已由新六军接收把守。何应钦电告蒋中正，南京伪中央军校器材已令廖耀湘接收，并编列训练该校新生。"
      source: "申报 1945年09月16日 第1版 第25669期; 何应钦电蒋中正南京伪中央军校器材已令廖耀湘接收并编列训练该校新生"
      source_url: "/newspapers/新六軍續運抵京.html; /liaos_tele/1945-09-15何应钦电蒋中正南京伪中央军校器材已令廖耀湘接收并编列训练该校新生.html"
      original_text: ""
      notes: ""
    - date: "1945-10"
      date_display: ""
      content: "于南京题词「先烈之血，民族之光」、「凯旋还京与旧友重临栖霞」。在南京龙门酒家宴请葛顿南少校，并在便签上留名。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-06"
      date_display: ""
      content: "新6军几十位军官与美军联络官们在「新六军军官俱乐部」联欢并合影留念。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-06"
      date_display: ""
      content: "新六军军官合影"
      source: "中缅印战区盟军将帅图志P264"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-08"
      date_display: ""
      content: "在约翰·葛顿南少校的记事本上签名留念并写下通讯地址。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-10"
      date_display: ""
      content: "获颁忠勤勋章。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-10"
      date_display: ""
      content: "宴会上正式赠送纪念品给美国联络官们，赠送即将归国的约翰·葛顿南（John J Gardner，14师联络官）一幅中国花鸟字画长轴，字画噢诶呦英文译文。14师师长龙天武少将正式颁发嘉奖状给葛顿南少校，以及锦旗给其他美军军官。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-12"
      date_display: ""
      content: "晚接见记者，对日军缴械情形发表谈话，表示八万日军已全部缴械完成。"
      source: "聯合日報 1945.10.14"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/lhrb19451014-01.1.1"
      original_text: ""
      notes: ""
    - date: "1945-10-24"
      date_display: ""
      content: "金门酒家宴请晚饭，在座者有杜聿明、赵家骧、李诚毅等"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-25"
      date_display: ""
      content: "晨七时，谒陵；九点半，金门酒家宴请早饭，随后，明孝陵机场送行杜聿明等飞沪"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-10-29"
      date_display: ""
      content: "廖耀湘离沪赴京。"
      source: "東南日報 1945.10.30 第2版"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dnrb19451030-01.1.2"
      original_text: ""
      notes: ""
    - date: "1945-11-25"
      date_display: ""
      content: "新六军军长廖耀湘午间抵达苏州视察，次日返沪。"
      source: "申报 1945年11月26日 第1版 第24342期"
      source_url: "/newspapers/廖耀湘今日返滬.html"
      original_text: ""
      notes: ""
    - date: "1945-11-26"
      date_display: ""
      content: "由苏州返回上海。同上。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1945-11-26"
      date_display: ""
      content: "中华口琴会会长王庆勋率代表队赴新六军第十四师慰劳演奏，龙天武师长简述该师作战经过。"
      source: "申报 1945年11月27日 第3版 第24343期"
      source_url: "/newspapers/慰勞新六軍.html"
      original_text: ""
      notes: ""
    - date: "1945-12-20"
      date_display: ""
      content: "马歇尔下午1时55分乘飞机抵沪，在江湾机场降落。何应钦、钱大钧、张治中、郑洞国、廖耀湘、魏德迈等六百余人到场迎接。随后马歇尔与魏德迈同车赴华懋饭店，魏德迈于下午六点设宴，中美各首长作陪。新六军新二二师六五团三营第七、八连担任警卫和仪仗。"
      source: "申报 1945年12月21日 第1版; 申报 1945年12月21日 第5版; 建國日報 1945.12.21; 民國日報 1945.12.21"
      source_url: "/newspapers/馬歇爾特使昨抵滬.html; /newspapers/歡迎馬帥速寫.html"
      original_text: ""
      notes: ""
    - date: "1945-12-26"
      date_display: ""
      content: "新六军副军长舒适存抵达北平，全副美式装备之新六军士兵初次出现北平街头。"
      source: "申报 1945年12月31日 第1版 第24377期"
      source_url: "/newspapers/中蘇間橫亘小陰影東北局勢低迷沉悶.html"
      original_text: ""
      notes: ""
- year: 1946
  entries:
    - date: "1946-01"
      date_display: ""
      content: "新编第6军从上海海运至秦皇岛，后自葫芦岛登陆出关至沟帮子，升任东北行营第4绥靖区司令官，兼第六军军长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-01-02"
      date_display: ""
      content: "廖耀湘、龙天武、李澍等出席淞沪军事长官会商，商定六项办法整肃军纪，取消各军师办事处，不得占用民房。"
      source: "申报 1946年01月03日 第3版 第24380期"
      source_url: "/newspapers/本巿軍事首長商決各軍師辦事處一律取消.html"
      original_text: ""
      notes: ""
    - date: "1946-01-09"
      date_display: ""
      content: "廖耀湘往谒行政院长宋子文，宋氏当日接见钱市长、廖耀湘及申新纺织厂荣鸿元等，听取各方报告。"
      source: "申报 1946年01月10日 第5版 第24387期"
      source_url: "/newspapers/宋院長處理要公聽取各方報吿錢市長廖耀湘等先後往謁.html"
      original_text: ""
      notes: ""
    - date: "1946-01-09"
      date_display: ""
      content: "东北前线国军士兵冬服仍未齐备，多手脚冻坏，报道称俟最精锐之新一军新六军等到达后，前线始可稍息仔肩。"
      source: "申报 1946年01月11日 第1版 第24388期"
      source_url: "/newspapers/東北局勢陰霾漸散國軍待接防瀋陽.html"
      original_text: ""
      notes: ""
    - date: "1946-01-11"
      date_display: ""
      content: "美军总部宣布：美军船只运输新六军由上海赴东北将于本月16日开始，御寒配备已整筹就绪，并已注射防疫针。"
      source: "申报 1946年01月12日 第1版 第24389期"
      source_url: "/newspapers/美宣布定十六日開始運新六軍赴東北.html"
      original_text: ""
      notes: ""
    - date: "1946-01-12"
      date_display: ""
      content: "魏德迈将军招待记者时宣布：新六军将于本月16日开始自沪运往东北，北上者共二万六千人，并备有御寒配备。"
      source: "申报 1946年01月13日 第5版 第24390期"
      source_url: "/newspapers/魏德邁將軍昨招待記者新六軍即由滬開往東北.html"
      original_text: ""
      notes: ""
    - date: "1946-01-14"
      date_display: ""
      content: "美陆军部长柏德遜抵沪，检阅新六军派往机场之仪仗队。"
      source: "申报 1946年01月15日 第5版 第24392期"
      source_url: "/newspapers/美國陸軍部長柏德遜昨飛抵滬.html"
      original_text: ""
      notes: ""
    - date: "1946-01-16"
      date_display: ""
      content: "新六军开始由上海海运赴东北，上海防务由青年军207师接替。"
      source: "申报 1946年01月17日 第5版 第24394期"
      source_url: "/newspapers/新六軍昨開東北靑年軍來滬接防.html"
      original_text: ""
      notes: ""
    - date: "1946-01-17"
      date_display: ""
      content: "裕鞏军服厂因赶制新六军军服棉被手套失火，焚去楼房十二幢，损失棉被千余条、军服七千余件。"
      source: "申报 1946年01月18日 第5版 第24395期"
      source_url: "/newspapers/裕華軍服廠失愼.html"
      original_text: ""
      notes: ""
    - date: "1946-01-17"
      date_display: ""
      content: "新六军二十二师六千人乘美登陆船六艘由上海启程北上，拟直驶葫芦岛登陆续向沈阳推进。全军官兵二万六千人可于本月22日前后全体首途。"
      source: "申报 1946年01月18日 第5版 第24395期; 申报 1946年01月18日 第1版 第24395期"
      source_url: "/newspapers/新六軍開往東北携帶法幣出關五千元爲度.html"
      original_text: ""
      notes: ""
    - date: "1946-01-19"
      date_display: ""
      content: "白崇禧抵沪检阅新六军及青年军207师，廖耀湘陪同白崇禧于虹口公园检阅部队并训话。"
      source: "申报 1946年01月20日 第5版 第24397期"
      source_url: "/newspapers/檢閱上海地區駐軍白崇禧將軍蒞滬.html"
      original_text: ""
      notes: ""
    - date: "1946-01-19"
      date_display: ""
      content: "新六军首批约两团在秦皇岛登陆，即转车径赴新民。"
      source: "申报 1946年01月21日 第1版 第24398期"
      source_url: "/newspapers/新六軍兩團登陸秦皇島.html"
      original_text: ""
      notes: ""
    - date: "1946-01-20"
      date_display: ""
      content: "第二批新六军由上海北运开始，美军以登陆船六艘运载约六千人及配备车辆，登陆葫芦岛。全军二万六千人共分数次北上，第一次始于16日。"
      source: "申报 1946年01月21日 第5版 第24398期"
      source_url: "/newspapers/第二批新六軍昨日北運.html"
      original_text: ""
      notes: ""
    - date: "1946-01-22"
      date_display: ""
      content: "十四师师长龙天武招待新闻记者，十四师首批五千余人已上船，分三批开赴东北。二十二师已于16至19日分两批出发并已抵达目的地。"
      source: "申报 1946年01月23日 第4版 第24400期"
      source_url: "/newspapers/新六軍十四師健兒分三批開東北.html"
      original_text: ""
      notes: ""
    - date: "1946-01-26"
      date_display: ""
      content: "沪市各界于大光明戏院举行欢送新六军、迎接青年军207师盛会，大会代表向廖耀湘献赠「党国干城」锦旗，廖军长致词。"
      source: "南京晚報 1946.01.25 第1版; 申报 1946年01月27日 第4版 第24404期"
      source_url: "/newspapers/各界迎送國軍.html"
      original_text: ""
      notes: ""
    - date: "1946-01-26"
      date_display: ""
      content: "新六军已有二师抵达秦皇岛，一师尚在途中。沈阳国军仍住于营房中，俟新六军全部开到后始正式接防。新民、彰武两地苏军当日上午十时全部撤退。"
      source: "申报 1946年01月27日 第1版 第24404期"
      source_url: "/newspapers/新六軍全部開到後即正式接防瀋陽.html"
      original_text: ""
      notes: ""
    - date: "1946-01-28"
      date_display: ""
      content: "新六军先遣部队两队已在秦皇岛登陆，正向锦州移动中。沈阳尚未正式接防，入夜沈市仍无行人。"
      source: "申报 1946年01月29日 第1版 第24406期"
      source_url: "/newspapers/熊式輝由錦飛平新六軍兩隊自秦皇島推進.html"
      original_text: ""
      notes: ""
    - date: "1946-02-01"
      date_display: ""
      content: "廖耀湘陪同魏德迈视察上海各地，巡视美军需处、美海防司令部及虬江码头。新六军第三批约五千人由登陆舰六艘北上，至此已运北上者达万人左右。廖耀湘预定四五日内乘机北上。"
      source: "申报 1946年02月02日 第3版 第24410期"
      source_url: "/newspapers/魏德邁將軍視察巿區.html"
      original_text: ""
      notes: ""
    - date: "1946-02-01"
      date_display: ""
      content: "军之友社在沪举行联欢大会，欢迎魏德迈就任名誉理事及青年军207师师长罗又伦来沪，同时欢送廖耀湘北上。"
      source: "申报 1946年02月01日 第4版 第24409期"
      source_url: "/newspapers/軍之友社舉行軍友聯歡大會.html"
      original_text: ""
      notes: ""
    - date: "1946-02-02"
      date_display: ""
      content: "新六军已全部登陆完毕，正向沟帮子挺进中，不日或可入驻沈长。苏军撤退延缓，东北接收工作呈停顿状态。"
      source: "申报 1946年02月04日 第1版 第24412期"
      source_url: "/newspapers/東北蘇軍延緩撤退接收工作仍呈停頓.html"
      original_text: ""
      notes: ""
    - date: "1946-02-04"
      date_display: ""
      content: "青年军207师入伍一周年，在中正公园举行阅兵典礼，廖耀湘陪同钱大钧、罗又伦等检阅部队并致词。"
      source: "申报 1946年02月05日 第3版 第24413期"
      source_url: "/newspapers/靑年軍入伍周年觀光雄師受檢.html"
      original_text: ""
      notes: ""
    - date: "1946-02-04"
      date_display: ""
      content: "新六军进至沟帮子、新民后已暂停前进，静待大局开展。东北中共军队约三四十万，苏军撤退延期，局势混沌。"
      source: "申报 1946年02月06日 第1版 第24414期"
      source_url: "/newspapers/東九省經濟接收工作新六軍行止靜待大局開展.html"
      original_text: ""
      notes: ""
    - date: "1946-02-08"
      date_display: ""
      content: "以新22师第66团为右纵队，自沟帮子向盘山挺近。9日，新22师第66团先头部队抵达盘山，下午14时左右发生交战，占领盘山，共军向牛庄撤退。16日午后16时至19日，沙岭激战。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-02-17"
      date_display: ""
      content: "沙岭六十六团被约十七个团共军围攻，廖耀湘指定邱中岳率部前往解围。当夜廖耀湘表示：「我指定邱中岳去解围，六十六团是不会有危险的。」翌日拂晓邱中岳率部自富家庄绕道抵达沙岭东北近郊，予敌猛攻，共军溃退，沙岭之围遂解。"
      source: "沙岭作战始末（邱中岳）"
      source_url: "/battles_history/liaoshen/1946/沙岭作战始末（邱中岳）.html"
      original_text: "十七日夜，廖先生知道我接受了解围之命令，他当时表示：我指定「邱中岳去解围，六十六团是不会有危险的。」"
      notes: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-02-10"
      date_display: ""
      content: "207师今日开拔，廖耀湘明日北飞。新六军奉命卫戍首都，后调防来沪，因东北接收工作迫不容缓，该军于上月初即陆续海运离沪，先头部队十四师已到达新民。配属该军之青年军二〇七师亦定今日开拔。军长廖耀湘与二〇七师师长罗又伦闻明日将乘专机飞锦州，谒见杜聿明后即亲往指挥所部。"
      source: "申报 1946年02月10日 第4版 第24418期"
      source_url: "/newspapers/靑年軍今日離滬廖耀湘即飛錦.html"
      original_text: ""
      notes: ""
    - date: "1946-02-11"
      date_display: ""
      content: "下午由沪飞抵北平"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-02-12"
      date_display: ""
      content: "晨偕东北长官部留守处长李诚毅，分谒东北行营主任熊式辉、北平行营主任李宗仁、第十一战区长官孙xx（连仲？）。并嘱记者前往秦皇岛拍摄新六军罗又伦207师登陆影。新六军二十二师接防盘山后续开入台安、辽中两县接防；207师乘美运输舰八艘由沪抵秦皇岛。"
      source: "華北日報 1946.02.13; 申报 1946年02月16日 第1版 第24424期"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/hbrb19460213-01.1.1; /newspapers/新六軍接防台安遼中廖耀湘即飛錦晤杜聿明.html"
      original_text: ""
      notes: ""
    - date: "1946-02-13"
      date_display: ""
      content: "207师开入锦州，因杜聿明卧病，由参谋长赵家骧代表阅兵。"
      source: "申报 1946年02月16日 第1版 第24424期"
      source_url: "/newspapers/新六軍接防台安遼中廖耀湘即飛錦晤杜聿明.html"
      original_text: ""
      notes: ""
    - date: "1946-02-14"
      date_display: ""
      content: "廖耀湘抵达北平，稍事联络即将飞锦晤杜聿明。杜氏卧病，已有三名大夫同机飞锦医疗。据悉新六军已至沈阳西方九十华里处。"
      source: "時事新報 1946.02.15; 申报 1946年02月16日 第1版 第24424期"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/ssxb19460215-01.1.1; /newspapers/新六軍接防台安遼中廖耀湘即飛錦晤杜聿明.html"
      original_text: ""
      notes: ""
    - date: "1946-02-16"
      date_display: ""
      content: "上午10时，廖耀湘专机由北平飞锦州。东北长官部留守处长李诚毅等人到南苑机场送行。宣抚特使张继、军政部军需署严副署长、步兵司卢司长、东北长官部文处长、第五补给区谭参谋长等十余人同机飞锦。"
      source: "華北日報 1946.02.17"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/hbrb19460217-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-02-17"
      date_display: ""
      content: "军事复员会议"
      source: ""
      source_url: ""
      original_text: ""
      notes: "陈明仁邱清泉王耀武梁华盛都在南京开会了，廖去没去"
    - date: "1946-02-17"
      date_display: ""
      content: "廖耀湘已由北平飞抵锦州会晤杜聿明。军政部次长俞大维、军医署长林可胜亦到达锦州。"
      source: "時事新報 1946.02.18; 時事新報 1946.02.17 第2版"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/ssxb19460218-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-03-10"
      date_display: ""
      content: "新6军由辽中进攻辽南。十三军、五十二军与新六军部队已向沈阳兼程前进。"
      source: "申报 1946年03月12日 第1版 第24448期"
      source_url: "/newspapers/電話電燈曾中斷國軍正兼程增防.html"
      original_text: ""
      notes: ""
    - date: "1946-03-16"
      date_display: ""
      content: "新六军207师罗又伦部定上午继续入沈阳城增防。新一军十二师已到达辽中附近，新六军一部向沈阳以西推进。"
      source: "申报 1946年03月17日 第1版 第24453期"
      source_url: "/newspapers/接收人員離長返錦.html"
      original_text: ""
      notes: ""
    - date: "1946-03-21"
      date_display: ""
      content: "新六军攻占辽阳。"
      source: "解放 1946.04.02; 申报 1946年03月24日 第1版 第24460期"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/jfbc19460402-01.1.1; /newspapers/長春蘇軍續撤退.html"
      original_text: ""
      notes: ""
    - date: "1946-03-24"
      date_display: ""
      content: "新六军从沈阳南进约五十哩，已抵达鞍山。国军自新民出发，分东南两路向盘山与营口前进。"
      source: "申报 1946年03月25日 第1版 第24464期"
      source_url: "/newspapers/國軍深入東北平原.html"
      original_text: ""
      notes: ""
    - date: "1946-03-25"
      date_display: ""
      content: "东北国军以沈阳为核心向东南北三方推进，已先后到达预定目的地。据延安报告，新六军第十四师自沈阳向西作扇形展开，第二十二师与辽阳共军发生战事。"
      source: "申报 1946年03月26日 第1版 第24462期"
      source_url: "/newspapers/藩錦國軍三面推進.html"
      original_text: ""
      notes: ""
    - date: "1946-03-31"
      date_display: ""
      content: "新六军廖耀湘部主力自辽阳沿南满线向鞍山、刘二堡、七岭子等方向进攻。"
      source: "時代日報 1946.04.02"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/shid19460402-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-04"
      date_display: ""
      content: "第七十一军第八十八师调归新六军指挥参加营口作战，廖耀湘将该师三个团分割三处使用，师长胡家骥感到指挥权被剥夺，与廖耀湘发生争吵，后以违抗军令罪名被撤职查办。陈明仁对此痛愤不已，拒不承认杜聿明派来的继任师长韩增栋。"
      source: "文史资料存稿选编——全面内战（上）"
      source_url: "/newspapers/陈明仁在东北（节选）.html"
      original_text: ""
      notes: "七十一军八十七师军需主任应起鹤回忆"
    - date: "1946-04-16"
      date_display: ""
      content: "长春守军仅数千人，以新六军居多，另有少数保安队，众寡悬殊仍抵抗共军围攻。"
      source: "申报 1946年04月17日 第1版 第24484期"
      source_url: "/newspapers/長春外圍激戰兩日.html"
      original_text: ""
      notes: ""
    - date: "1946-05-02"
      notes: ""
      original_text: ""
      source_url: "/newspapers/踏雪聽砲聲.html"
      source: "申报 1946年04月20日 第1版 第24487期"
      content: "遼陽各界举行盛大欢迎国军大会，新六军14师师长龙天武出席受欢迎，市民代表热烈致辞，一位七十一岁老者当场向龙天武诵读并递交致蒋主席感谢信。"
      date_display: ""
    - date: "1946-04-26"
      date_display: ""
      content: "第六十军一八四师到达海城，脱离六十军建制归廖耀湘指挥。廖耀湘指定其驻防鞍山、海城、大石桥、营口四地，摆成铁路线上防御态势，以巩固辽阳南侧，师部无权自行调整部署。"
      source: "文史资料存稿选编——全面内战（上）"
      source_url: "/newspapers/滇军第一八四师海城起义回忆（节选）.html"
      original_text: ""
      notes: "一八四师参谋长马逸飞回忆"
    - date: "1946-04"
      date_display: "4月下旬"
      content: "杜聿明邀廖耀湘与赵公武（五十二军军长）商讨「先打本溪、再攻四平」方案。廖耀湘本已有先攻本溪之腹案，主动提出担任右翼、沿太子河两岸向桥头方面包围攻击，认为可操胜算。二人一致同意必先攻取本溪，安全沈阳门户，再集中优势兵力北上。"
      source: "国民党破坏和平进攻东北始末（杜聿明）"
      source_url: "/battles_history/liaoshen/1946/国民党破坏和平进攻东北始末（杜聿明）.html"
      original_text: "廖即有先改本溪的腹案，认为在改击本溪中，他担任右翼沿太子河两岸向桥头方面包围攻击，可操胜算。他俩一致认为必先攻取本溪，安全沈阳门户，再集中优势兵力攻下四平，进取长春，方可无后顾之虞。"
      notes: ""
    - date: "1946-04-18"
      date_display: ""
      content: "新6军展开对本溪之攻击。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-02"
      date_display: ""
      content: "杜聿明电蒋中正报告本溪攻势进展：廖耀湘军右翼已攻占老爷岭，正向小岭子进攻；中央主力击退向我猛扑之匪，进占归家子、黑峪；赵公武军已进至火连寨，向本溪湖北郊山地猛攻中。"
      source: "杜聿明电蒋中正告以廖耀湘军右翼已攻占老爷岭等情"
      source_url: "/liaos_tele/1946-05-02杜聿明电蒋中正告以廖耀湘军右翼已攻占老爷岭正向小岭子进攻中央主力击退向我猛扑之匪进占归家子黑峪又赵公武军已进至火连寨向本溪湖北郊山地猛攻中等情.html"
      original_text: ""
      notes: ""
    - date: "1946-05-03"
      date_display: ""
      content: "杜聿明电蒋中正报告：赵公武、廖耀湘两军各以一部攻占本溪湖，左右兵团分向偏堡子及大安平等处扫荡追击。近来与我对战之伪辽东军区曾克林、张学诗所部已完全击溃。"
      source: "杜聿明电蒋中正我赵公武廖耀湘两军各以一部攻占本溪湖等情"
      source_url: "/liaos_tele/1946-05-03杜聿明电蒋中正我赵公武廖耀湘两军各以一部攻占本溪湖左右兵团分向偏堡子及大安平等处扫荡追击又近来与我对战之伪辽东军区曾克林张学诗所部已完全击溃等情.html"
      original_text: ""
      notes: ""
    - date: "1946-05-04"
      date_display: ""
      content: "会同52军占领本溪。据新六军参谋长赵霞称，使用部队番号至少四个、合计约三师人，52军担任两翼，新六军14师和新22师担任中央突破。"
      source: "申报 1946年05月31日 第7版 第24528期"
      source_url: "/newspapers/遼陽之春在共軍的手裏溜走.html"
      original_text: ""
      notes: ""
    - date: "1946-05-05"
      date_display: ""
      content: "获颁胜利勋章。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-06"
      date_display: ""
      content: "新6军结束本溪方面战役。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-07"
      date_display: ""
      content: "新6军回至辽阳南北地区。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-08"
      date_display: ""
      content: "新6军先遣人员开赴开原。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-09"
      date_display: ""
      content: "新6军在辽阳南北各火车站开始车运。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-11"
      date_display: ""
      content: "沈阳市民向杜聿明等献旗，感谢国军出关收复失地。杜聿明、梁华盛、余汉谋均亲临接受。"
      source: "申报 1946年05月13日 第1版 第24510期"
      source_url: "/newspapers/公主嶺戰事激烈.html"
      original_text: ""
      notes: ""
    - date: "1946-05-12"
      date_display: ""
      content: "由辽阳乘火车经沈阳去开原（路过沈阳时下车至长官部见杜聿明了解情况并接受任务，同时也曾研究四平战役结束后下一阶段作战问题）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-12"
      date_display: ""
      content: "公主岭战事激烈，国军渐占优势。东北九省主席及两市市长在沈阳举行会议，讨论东北大局。新六军第14师在太子河一带包围共军阵地及车站，奋力作战。"
      source: "申报 1946年05月13日 第1版 第24510期"
      source_url: "/newspapers/公主嶺戰事激烈.html"
      original_text: ""
      notes: ""
    - date: "1946-05-13"
      date_display: ""
      content: "新6军两个先头师在新、旧开原以东地区集结完竣（后两个师及军直属部队在5月16日黄昏以前可集中完毕。）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-14"
      date_display: ""
      content: "新6军14师（师长龙天武）指派刘梓皋团进出貂皮屯（未遇战斗即达到目的地）。新6军新22师（师长李涛）指派65团（团长李定一）占领南城子，其后发生威远堡门之激战。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-15"
      date_display: ""
      content: "早晨获得军指挥所参二科连夜整理的在威远堡门所获资料。上午，乘汽车至威远堡门实地了解情况。晚上，给各部队以电话命令，告知下一步作战计划并要求团长以上人员于次日上午8时至新开原指挥所开会，当面给以详细命令和指示。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-16"
      date_display: ""
      content: "上午8时在新开原指挥所开会。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-17"
      date_display: ""
      content: "新六军占领四平街东南五十英里之共军重要据点西丰，继续扫荡威胁国军侧翼之共军，巩固阵地以便直指长春。西丰为铁路沿线重镇，三月十三日苏军撤退后由中共军占据。"
      source: "申报 1946年05月19日 第1版 第24516期"
      source_url: "/newspapers/白崇禧在瀋檢軍.html"
      original_text: ""
      notes: ""
    - date: "1946-05-18"
      date_display: ""
      content: "晚，根据12日与杜聿明商定的战斗指导方案，电令88师（于19日拂晓由开原地区兼程前进至火石岭子地区，限20日拂晓前全部到达，与新22师组成第一线师，由李涛统一指挥）；令207师接平岗之防务（指派一个加强团接替14师平岗之防务）；令14师（与207师交换防务后集结于平岗、火石岭子之间地区）作军之预备队……决心在19日调整部署，20日集中兵力攻击四平街共军之主力（19日晚共军已撤退，未付实施）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-18"
      date_display: ""
      content: "晚，得到新22师电报（火石岭子以西及西北约30华里无共军踪迹）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-18"
      date_display: ""
      content: "白崇禧检阅驻沈207师青年军，下午赴铁西工厂区视察。孙立人上午由北平乘专机抵沈，谒杜聿明，定次日赴防地视察部队接防情形。国军将领在沈阳开军事会议讨论东北战局，与会者有熊式辉、杜聿明、牟廷芳、梁华盛暨军长五人。"
      source: "申报 1946年05月19日 第1版 第24516期"
      source_url: "/newspapers/白崇禧在瀋檢軍.html"
      original_text: ""
      notes: ""
    - date: "1946-05-19"
      date_display: ""
      content: "下半夜得到（新1军第30师及新38师）进入四平的消息。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-05-19"
      date_display: ""
      content: "四平战后杜聿明下达追击命令，将公主岭以北中长路及长春划归新六军作战地境，悬赏百万元给先入长春之部队，新一军被指向四平西北方向。孙立人认为杜聿明偏袒廖耀湘嫡系，拒不执行命令并亲赴杜聿明处争吵。"
      source: "文史资料存稿选编——全面内战（上）"
      source_url: "/newspapers/一九四六年四月至五月新一军在四平街作战经过（节选）.html"
      original_text: ""
      notes: "新一军参谋长史说回忆"
    - date: "1946-05-23"
      date_display: ""
      content: "蒋介石夫妇到沈阳视察（廖耀湘和李涛等被视察，国史馆：国民政府主席蒋中正巡视沈阳党政军措施079）"
      source: "申报 1946年05月24日 第1版 第24521期"
      source_url: "/newspapers/國軍昨晨收復長春.html"
      original_text: ""
      notes: ""
    - date: "1946-05-23"
      date_display: ""
      content: "郑洞国所部国军上午十一时正式进驻长春，先头部队四小时前已抵长春近郊。市内少数建筑物内仍有共军顽抗，市民不顾枪击扶老携幼来迎。国军（新一军及新六军）自四平街至长春，五日中前进七十五英里。同日国军进入辽源县及东丰县。"
      source: "申报 1946年05月24日 第1版 第24521期"
      source_url: "/newspapers/國軍昨晨收復長春.html"
      original_text: ""
      notes: ""
    - date: "1946-05-24"
      date_display: ""
      content: "蒋介石莅临沈阳东北长官部"
      source: ""
      source_url: ""
      original_text: ""
      notes: "好像没有廖耀湘，合照里有杜聿明、郑洞国、梁华盛、赵家骧，但没有廖"
    - date: "1946-05-24"
      date_display: ""
      content: "蒋介石召见刘徳溥、张嘉敖、熊式辉、并巡视沈阳故宫。"
      source: "民國日報 1946.05.25"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/mgrg19460525-01.1.1"
      original_text: ""
      notes: "未见接见廖耀湘报道"
    - date: "1946-05-24"
      date_display: ""
      content: "国军收复长春后开始向吉林推进，共军向北方及西北方后退。郑洞国所部昨晚三时完全肃清城内残余共军。国军另一部收复公主岭北面八十里之旧怀德。廖耀湘被任命兼长春警备司令，副军长舒适存、保安第二总队长刘德溥分兼警备副司令。尚传道兼代理长春市长，北上赴任。"
      source: "申报 1946年05月25日 第1版 第24522期"
      source_url: "/newspapers/國軍正向吉林推進.html"
      original_text: ""
      notes: ""
    - date: "1946-05-25"
      date_display: ""
      content: "廖耀湘被任命为长春警备司令。"
      source: "前鋒報 1946.05.25 第1版; 申报 1946年05月25日 第1版 第24522期"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/qifb19460525-01.1.1; /newspapers/國軍正向吉林推進.html"
      original_text: ""
      notes: ""
    - date: "1946-05-27"
      date_display: ""
      content: "兼任长春警备司令（建康日报1946年05月27第3版）。"
      source: ""
      source_url: "/newspapers/新六军军长兼长春警备.html"
      original_text: ""
      notes: ""
    - date: "1946-05-28"
      date_display: ""
      content: "警备司令廖耀湘、副司令舒适存于28日正式就职。代长春市长尚传道率秘书长刘守刚等也在次日赶到视事，其他机关相继成立或筹备中。"
      source: "申报 1946年06月14日 第7版 第24542期"
      source_url: "/newspapers/刧後長春在甦生中.html"
      original_text: ""
      notes: ""
    - date: "1946-05-30"
      date_display: ""
      content: "归廖耀湘指挥的第六十军一八四师在海城起义，师长潘朔端率师直属队和五五二团约3800人投向民主联军。此前副师长郑祖志曾不满廖耀湘指定的部署，但无权调整。起义后鞍山、海城、大石桥被民主联军占领，蒋介石遂令新一军南调辽南作战。"
      source: "文史资料存稿选编——全面内战（上）"
      source_url: "/newspapers/滇军第一八四师海城起义回忆（节选）.html"
      original_text: ""
      notes: "一八四师参谋长马逸飞回忆"
    - date: "1946-05-30"
      date_display: ""
      content: "蒋介石偕宋美龄、白崇禧、杜聿明下午12时半离开沈阳，1时10分飞抵长春。郑副长官洞国、警备司令廖耀湘、代市长尚传道及士绅在机场迎接。"
      source: "華光日報 1946.05.31"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/hgrb19460531-01.1.2"
      original_text: ""
      notes: ""
    - date: "1946-05-31"
      date_display: ""
      content: "国军快速部队七千人抵达距哈尔滨仅十一华里之东南郊，占领高地两处。新六军渡越松花江上游，到达吉林省城东北数英里处；另一部沿铁路推进至哈尔滨西南约八英里之松花江岸。杜聿明宣布国军将继续向东北北部推进，决心接收全境。据外籍军事家称，自本溪湖至四平街、公主岭之役，共军主力已损失六万人。"
      source: "申报 1946年06月01日 第1版 第24529期"
      source_url: "/newspapers/國軍抵哈巿近郊.html"
      original_text: ""
      notes: ""
    - date: "1946-06-03"
      date_display: ""
      content: "蒋介石亲赴长春，在机场大厅慰问地方豪绅后，招集廖耀湘等指示机宜，特别对廖耀湘和郑洞国说拉法为战略要点，必须以一个加强团固守。"
      source: "国民党破坏和平进攻东北始末（杜聿明）; 郑洞国回忆录——解放战争（郑洞国）"
      source_url: "/battles_history/liaoshen/1946/国民党破坏和平进攻东北始末（杜聿明）.html; /battles_history/liaoshen/1948/郑洞国回忆录——解放战争（郑洞国）.html"
      original_text: "蒋介石亲赴长春，在飞机场大厅中招集长春市地方豪绅、巨富、地主慰问后，又招集廖耀湘等指示机宜，再对廖说拉法为战略要点，必须以一个加强团固守。"
      notes: ""
    - date: "1946-06-03"
      date_display: ""
      content: "廖耀湘告知记者长春至吉林明日火车即可恢复，客运可以开始售票，国军将向拉法推进。（民报晚刊1946年6月5日 国家文化资料库）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-06-07"
      date_display: ""
      content: "停止攻击。"
      source: "時事新報 1946.06.08"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/ssxb19460608-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-06-09"
      date_display: ""
      content: "打电话报告拉法受到攻击"
      source: "FRUS, 1946, The Far East: China, Vol.IX, Marshall Mission Files"
      source_url: "https://history.state.gov/historicaldocuments/frus1946v09/d527"
      original_text: ""
      notes: ""
    - date: "1946-06-12"
      date_display: ""
      content: "获颁三等巴斯武士勋章（英）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-06-13"
      date_display: ""
      content: "杜聿明在长春视察，廖耀湘等出席欢迎（国家文化资料库照片：长春欢迎杜聿明将军）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-06-15"
      date_display: ""
      content: "杜聿明偕廖耀湘于下午八时半由永吉专车返回长春（杜聿明晚间飞沈阳）。〔中央社永吉十五日電〕杜長官聿明，梁兼主席華盛，廖司令官耀湘，十五日上午十時出席此間在北山廣塲𦦙行之市民大會，到市民四萬餘人，下午一時杜長官等前往永吉西南廿五公里之小豐滿水力發電所視察，杜長官為嘉奬該所員工保護設備起見，特撥發流通劵廿萬。下午四時由小豐滿抵永吉，即轉車站搭四時五十分專車返長。廖司令官等同行。"
      source: "工商晚報 1946.06.16; 申报 1946.06.16"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=14&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=2e0e00a69cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
      original_text: ""
      notes: ""
    - date: "1946-06-21"
      date_display: ""
      content: "军事调处执行部东北前进小组美代表白鲁德将军抵长春与东北军事当局合影。自右至左：廖耀湘，白鲁德，郑洞国，关邦杰，尚传道。"
      source: "申报 1946年06月21日 第1版 第24549期"
      source_url: "/newspapers/銅圖說明廖耀湘白魯德鄭洞國合影.html"
      original_text: ""
      notes: ""
    - date: "1946-06-22"
      date_display: ""
      content: "长春市民举行慰劳国军大会，郑洞国、廖耀湘接受献花。"
      source: "申报 1946年06月22日 第1版 第24550期"
      source_url: "/newspapers/長春巿民慰勞國軍大會.html"
      original_text: ""
      notes: ""
    - date: "1946-06-28"
      date_display: ""
      content: "何应钦上午11时飞抵长春视察，廖耀湘等陪同，下午16时游览长春名胜。（民报晚刊1946年6月29日 国家文化资料库）"
      source: "申报 1946年06月29日 第1版 第24557期"
      source_url: "/newspapers/何應欽飛抵長春.html"
      original_text: ""
      notes: ""
    - date: "1946-07-02"
      date_display: ""
      content: "〔中央社長春二日電〕廖耀湘司令官，今日上午十時在中正塲閱兵，長征印緬為國軍爭光之健兒整隊出現長春街頭，時市民爭先出睹，掌聲不絕。"
      source: "申报 1946年07月03日 第1版 第24561期"
      source_url: "/newspapers/廖耀湘在長閱兵.html"
      original_text: ""
      notes: ""
    - date: "1946-07-03"
      date_display: ""
      content: "郑洞国在永吉视察小丰满发电所"
      source: "民报1946年7月5日"
      source_url: ""
      original_text: ""
      notes: "是否廖耀湘同行待查"
    - date: "1946-07-05"
      date_display: ""
      content: "郑洞国由永吉专车返长。"
      source: "民报1946年7月6日"
      source_url: ""
      original_text: ""
      notes: "是否廖耀湘接待待查"
    - date: "1946-07-15"
      date_display: ""
      content: "廖耀湘晨赴德惠视察防务。"
      source: "申报 1946年07月16日 第1版 第24574期"
      source_url: "/newspapers/松花江北劃緩衝地帶.html"
      original_text: ""
      notes: ""
    - date: "1946-07-19"
      date_display: ""
      content: "廖耀湘今午自永吉飞长春。"
      source: "民报晚刊7月20日 国家文化资料库"
      source_url: ""
      original_text: ""
      notes: "原文为\"永舌\"，疑为\"永吉\""
    - date: "1946-07-23"
      date_display: ""
      content: "郑洞国廖耀湘等与李立三（敏然）于长春会谈，晚间与尚市长等设宴招待。"
      source: "民报晚刊7月24日 国家文化资料库; 民國日報 1946.07.24"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/mgrg19460724-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-08-13"
      date_display: ""
      content: "长春警备司令部通信布告。"
      source: "東北時報 1946.08.13"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dngb19460813-01.1.2"
      original_text: ""
      notes: ""
    - date: "1946-08-19"
      date_display: ""
      content: "长春警备司令廖耀湘奉令绥靖四平西安一带，遗缺由孙立人担任。19日晚孙抵长春，会晤廖司令商议交接事宜。廖已饬准备移交，一部开往四平，一部开往松花江。"
      source: "華北日報 1946.08.21; 申报 1946年08月20日 第1版 第24609期"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/hbrb19460821-01.1.2; /newspapers/鄭洞國返瀋.html"
      original_text: ""
      notes: ""
    - date: "1946-08-21"
      date_display: ""
      content: "孙立人正式就任第四绥靖区司令官及长春警备司令两职，接见长春记者。廖耀湘率新六军往四平一带驻防。"
      source: "申报 1946年08月23日 第1版 第24612期"
      source_url: "/newspapers/孫立人在長就任兩新職.html"
      original_text: ""
      notes: ""
    - date: "1946-08-30"
      date_display: ""
      content: "廖耀湘及新六军司令部离开长春，赴辽南防地。"
      source: "申报 1946年08月31日 第1版 第24620期"
      source_url: "/newspapers/熱國軍進入承德.html"
      original_text: ""
      notes: ""
    - date: "1946-09-02"
      date_display: ""
      content: "郑洞国由热河前线返沈，谒杜聿明报告一切，当日偕新六军副军长舒适存飞北平，谒李宗仁。国军决维护冀热辽三省交通，清除威胁。"
      source: "申报 1946年09月04日 第2版 第24624期"
      source_url: "/newspapers/鄭洞國返瀋飛平陳繼承視察唐山.html"
      original_text: ""
      notes: ""
    - date: "1946-09-09"
      date_display: ""
      content: "新六军由滦平南下攻古北口正面，正在渡滦河南进中。热河已大军云集，93军、53军、新六军及13军一部主力俱在热境。"
      source: "申报 1946年09月10日 第1版 第24630期"
      source_url: "/newspapers/古北口外圍戰况激烈.html"
      original_text: ""
      notes: ""
    - date: "1946-09-11"
      date_display: ""
      content: "据共方宣传称，新六军已南调辽阳、鞍山、海城一带有所行动。东北大致平静，官方推断林彪将发动进攻以牵制国军西移。"
      source: "申报 1946年09月12日 第1版 第24632期"
      source_url: "/newspapers/傳共軍撤離哈市司令部移佳木斯.html"
      original_text: ""
      notes: ""
    - date: "1946-10-07"
      date_display: ""
      content: "廖耀湘抵沈阳，新一军军长孙立人及第六十军军长亦将抵沈，沈阳或将举行重要军事会议。"
      source: "申报 1946年10月09日 第1版 第24659期"
      source_url: "/newspapers/廖耀湘等抵瀋陽.html"
      original_text: ""
      notes: ""
    - date: "1946-10-10"
      date_display: ""
      content: "为《边疆建设》作创刊词。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1946-10-21"
      date_display: "10月21日至25日"
      content: "安东战役，杜聿明以新六军（廖耀湘）为右兵团、第五十二军为左兵团发起进攻。22日晚廖耀湘报告情况并建议次日向岫岩攻击，获批准。23日新六军各部顺利占领岫岩、黄花甸。24日到达凤城、鸡冠山、通远堡与左兵团会合。25日仅派一个步兵营协助五十二军进占安东，军主力准备转向庄河、大孤山方向。"
      source: "东北保安司令长官部侵占安东战役纪要（杜聿明）"
      source_url: "/battles_history/liaoshen/1947/东北保安司令长官部侵占安东战役纪要（杜聿明）.html"
      original_text: "10月22日晚新六军军长廖耀湘报告了上述情况，并建议于23日向岫岩攻击前进，因系按计划实施的，我同意了他的意见。"
      notes: ""
    - date: "1946-10"
      date_display: "10月中旬"
      content: "新二十二师奉命南下扫荡安东三角地带。小孤山一役，新二十二师以一营兵力击溃辽东军区独立师主力整一个团，匪团长从睡梦中惊醒抱头鼠窜。至月底配合友军将整个三角地带扫除净尽。"
      source: "从辽河扫荡到鸭绿江畔（大可）"
      source_url: "/battles_history/liaoshen/1946/从辽河扫荡到鸭绿江畔（大可）.html"
      original_text: "我们由十月中旬奉命南下扫荡，十月底便配合友军把整个的三角地带扫除净尽。小孤山一役，我军以一营的兵力，打垮了他们的主力整一个团之多。匪团长从睡梦中惊醒，未及穿衣抱头鼠窜而逃"
      notes: ""
    - date: "1946-10-25"
      date_display: ""
      content: "新六军下午四时进入安东，共军主力向桓仁、辑安一带转移。国军此前于24日收复凤城。军事观察家称东北共军已失去与山东共军联络之最后海口，国军次一目标可能为通化。"
      source: "申报 1946年10月27日 第1版 第24677期"
      source_url: "/newspapers/東北行轅開緊急會議.html"
      original_text: ""
      notes: ""
    - date: "1946-10-30"
      date_display: ""
      content: "第五十二军第二十五师在叆阳边门被民主联军第四纵队包围，杜聿明令新六军新二十二师立即从凤城、黄花甸越过铁路直奔叆阳边门解围。杜聿明认为廖耀湘对驰援采取消极态度以维护新六军实力。新二十二师迟至11月1日方抵本溪，11月2日第二十五师即告全歼。"
      source: "东北保安司令长官部侵占安东战役纪要（杜聿明）"
      source_url: "/battles_history/liaoshen/1947/东北保安司令长官部侵占安东战役纪要（杜聿明）.html"
      original_text: "新六军军长廖耀湘对于驰援第二十五师采取消极态度的原因"
      notes: ""
    - date: "1946-10-26"
      date_display: ""
      content: "郑洞国由沈飞长。"
      source: "民报1946年10月28日"
      source_url: ""
      original_text: ""
      notes: "是否廖耀湘接待待查"
    - date: "1946-11-26"
      date_display: ""
      content: "新22师副师长刘建章辟谣称，外传师长李涛四日于本溪赛马集被共军俘获纯属荒谬宣传。"
      source: "申报 1946年11月27日 第2版 第24708期"
      source_url: "/newspapers/新六軍一師長李濤被俘說係謠傳.html"
      original_text: ""
      notes: ""
    - date: "1946-12-02"
      date_display: ""
      content: "杜聿明返回沈阳后，廖耀湘等由防区来沈举行军事会议。据悉大连共军已开始撤退，国军前进至距离大连不到120里处。"
      source: "立報 1946.12.03"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/libo19461203-01.1.1"
      original_text: ""
      notes: ""
    - date: "1946-12-03"
      date_display: ""
      content: "东北将领普获杜鲁门颁发自由勋章，由杜聿明带回沈阳。"
      source: "中央日報 1946.12.04"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/zhyc19461204-01.1.1"
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: "（5月12日晚采取决心与计划，13日早下达相关战斗指令。）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "拂晓"
      content: "65团以战备行军态势由旧开原城出发向南城子搜索前进；9时左右，在南城子以南五华里之威远堡门与共军发生遭遇战；12时左右，得到关于威远堡门激战消息并做出判断及相关指示；16时左右，共军撤退威远堡门。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: "（19日下半夜或20日拂晓前，接长官部向辽河河套发起追击的电令，并指挥195师陈林达部按已策定的作战方案实行。）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: “”
      date_display: “同年”
      content: “湖南遭水旱天灾，与文强等人在沈阳联合筹款赈济湖南灾民，并邀请北平、天津京剧名伶来沈阳义演。”
      source: “接收东北时军统特务活动种种（文强）”
      source_url: “/ten_year_memorial/接收东北时军统特务活动种种（文强）.html”
      original_text: “1946年、47年，湖南遭水、旱天灾”
      notes: “”
    - date: “”
      date_display: “同年”
      content: “为军民日报国庆专刊题词：”为民前锋，为军喉舌，军民相辅，一心一德”。”
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：兼第六军军长（《抗日名将廖耀湘》）应似有误。"
- year: 1947
  entries:
    - date: "1947-01-31"
      date_display: ""
      content: "廖耀湘由鞍山抵达普兰店，对民众讲话。"
      source: "時事新報 1947.02.03; 武漢日報 (宜昌版) 1947.02.03"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/ssxb19470203-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-02-01"
      date_display: ""
      content: "廖耀湘偕政治部主任周霁光今晨由鞍山乘专车前往普兰店视察。晚八时返回鞍山。"
      source: "民报 1947.02.01 国家文化资料库; 武漢日報 (宜昌版) 1947.02.03"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/wury19470203-01.1.2"
      original_text: ""
      notes: ""
    - date: "1947-02-02"
      date_display: ""
      content: "廖耀湘由普兰店赴营口视察，新六军调至大连附近，当日晚返回鞍山。"
      source: "大公報 1947.02.03"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=11&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=24acba869cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
      original_text: ""
      notes: ""
    - date: "1947-02-02"
      date_display: ""
      content: "廖耀湘抵达沈阳见杜聿明，后即赴辽东视察，自信接收旅大无问题。"
      source: "大公報 1947.02.04"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=16&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=24acc2f29cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
      original_text: ""
      notes: ""
    - date: "1947-02-03"
      date_display: ""
      content: "廖耀湘在沈阳对记者谈话，称接收大连在军事上无问题，东北当前唯一急务为认真推行县政。"
      source: "申报 1947年02月04日 第1版 第24772期"
      source_url: "/newspapers/廖耀湘對記者談話.html"
      original_text: ""
      notes: ""
    - date: "1947-02-21"
      date_display: ""
      content: "廖耀湘等来沈阳，即返长春，据称：大连接防遥遥无期，市内难民多逃往普兰店。"
      source: "大江南報 1947.02.22"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dajn19470222-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-03-11"
      date_display: ""
      content: "〔本報瀋陽十一日電〕廖耀湘在鞍山對本報記者談：東北共軍經八個月整訓，或使人增加對共軍有新的神秘之感，但經此次共軍春季攻勢，□□□□無遺。缺點中如對松花江橋頭堡未能攻下，對新武器不善使用等，都是很好的例證。國□□前或不致攻取哈爾濱。"
      source: "申报 1947年03月12日 第1版 第24808期"
      source_url: "/newspapers/東北將領會議.html"
      original_text: ""
      notes: ""
    - date: "1947-03-13"
      date_display: ""
      content: "新六军副军长舒适存抵达长春。长春军事会议展期举行，松花江南岸战事愈烈，共军渡江部队达八师之众。"
      source: "申报 1947年03月14日 第1版 第24810期"
      source_url: "/newspapers/通辽前日收复.html"
      original_text: ""
      notes: ""
    - date: "1947-03-14"
      date_display: ""
      content: "获颁四等云麾勋章。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-03-17"
      date_display: ""
      content: "沈阳行辕为防止国军进入大连后发生接收机关抢占房屋及其他物资流弊，行辕决定由大一連市政府統一接收，然後再作台理分配，並飭令廖耀湘所部協一助。"
      source: "立報 1947.03.18"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/libo19470318-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-03-18"
      date_display: ""
      content: "上周，廖耀湘来沈向杜聿明汇报与大连市委秘书长黄光斗洽谈事。"
      source: "蘇州明報 1947.03.19; 福建時報 1947.03.19"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/sumb19470319-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-03-21"
      date_display: ""
      content: "大連市黨部主任委員王傑夫，靑年圑組長高廣溥，市商會常務理事韓岡蘊等廿一日上午四時同訪廖耀湘，洽商大連事務。"
      source: "大江南報 1947.03.24"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dajn19470324-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-04-03"
      date_display: ""
      content: "廖耀湘谈接收大连无问题。"
      source: "越報 1947.04.04"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/yueb19470404-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-04-06"
      date_display: ""
      content: "普兰店中苏第一线将领会谈，为接收旅大先声。廖耀湘定当夜由鞍山赴沈阳，报告会谈情形。苏方允我先接收洼子店。"
      source: "申报 1947年04月07日 第2版 第24834期"
      source_url: "/newspapers/接收旅大益趨具體中蘇將領舉行會談.html"
      original_text: ""
      notes: ""
    - date: "1947-04-10"
      date_display: ""
      content: "据刚由普兰店来沈阳之廖耀湘軍民語記者稱：此次會晤係普通聯絡性质，聞旅大區內共軍正進行有計劃之地下组织。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-04-15"
      date_display: ""
      content: "廖耀湘上午自鞍山来沈谒杜聿明，称关于接收大连问题，我方所交苏方之书面六项提议，苏方尚无任何答复。"
      source: "申报 1947年04月16日 第1版 第24843期"
      source_url: "/newspapers/旅大接收尚有待.html"
      original_text: ""
      notes: ""
    - date: "1947-04-22"
      date_display: ""
      content: "为沈阳新报创刊周年纪念题词：「猗欤新报，革命先鞭，墨张正义，笔扫顽奸，启迪后进，斯民景瞻，日新月进，时代前端」。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-04-26"
      date_display: "1947年4月（日期不详）"
      content: "普兰店中苏第一线将领举行第二次晤谈，新六军某师师长周璞代表我方两次与苏军查理斯基将军会面。我方表示拟赴石河或金县回拜，苏方称须请示后答复。"
      source: "申报 1947年04月26日 第7版 第24853期"
      source_url: "/newspapers/中蘇第一綫上將領二度晤談.html"
      original_text: ""
      notes: ""
    - date: "1947-05-05"
      date_display: ""
      content: "新六军副军长舒适存与13军军长石觉、60军军长曾泽生、207师师长罗又伦等一行35人，下午二时由沈阳飞北平转南京受训。"
      source: "申报 1947年05月06日 第1版 第24863期"
      source_url: "/newspapers/石觉曾泽生等飞平转京受训.html"
      original_text: ""
      notes: ""
    - date: "1947-05-15"
      date_display: ""
      content: "杜聿明派廖耀湘指挥新二十二师及二〇七师解梅河口之围。廖自抚顺赴清原指挥，派新二十二师分两路经草市向梅河口前进。六十四团正向草市前进时，被解放军在南城子包围，廖派六十五团增援亦被阻于英额门，遂令团长李平向清原撤退。此为新二十二师入东北后第一次重创，丢失重炮两门、装甲汽车三辆及大量美械装备。廖耀湘后称全军官兵士气受到很大打击，对解放军作战从此失去最后胜利的信心。"
      source: "蒋军四平街解围战役中的八棵树争夺战（郑庭笈）"
      source_url: "/battles_history/liaoshen/1947/蒋军四平街解围战役中的八棵树争夺战（郑庭笈）.html"
      original_text: "这是新二十二师入东北后第一次所受到的重创，丢掉二门重炮、三辆装甲汽车、两门75生的炮架，损失许多美械装备。从这次受创后，据廖耀湘说，当时全军官兵士气受到很大打击，对解放军作战，从这时起已失去最后胜利的信心。"
      notes: ""
    - date: "1947-05-15"
      date_display: ""
      content: "廖耀湘下午三时由抚顺抵清源坐镇，沈海、中长两路军运忙。"
      source: "申报 1947年05月17日 第1版 第24874期"
      source_url: "/newspapers/國軍勁旅開抵吉林.html"
      original_text: ""
      notes: ""
    - date: "1947-05-18"
      date_display: ""
      content: "廖耀湘自清源来沈阳，与杜长官商讨防务，于21日返回防区。"
      source: "東南日報 1947.05.22"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-05-20"
      date_display: ""
      content: "下午5时，长官部召开军事会议，赵家骧主持，郑洞国参与。"
      source: "東南日報 1947.05.22"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-05-21"
      date_display: ""
      content: "廖耀湘自沈阳返回防区。"
      source: "東南日報 1947.05.22"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dnrb19470522-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-05-27"
      date_display: ""
      content: "王叔铭、郑洞国、廖耀湘晨联袂谒熊式辉，商讨当前军事问题，并同进午餐。"
      source: "申报 1947年05月28日 第2版 第24885期"
      source_url: "/newspapers/國軍沿中長路掃蕩.html"
      original_text: ""
      notes: ""
    - date: "1947-05-29"
      date_display: ""
      content: "昌图一带战事异常激烈，廖耀湘亲赴前方指挥。"
      source: "申报 1947年05月30日 第2版 第24887期"
      source_url: "/newspapers/國軍出擊節節推進.html"
      original_text: ""
      notes: ""
    - date: "1947-05-31"
      date_display: ""
      content: "蒋召见廖耀湘（来源：蒋介石日记）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-05-31"
      date_display: ""
      content: "新六军副军长舒适存与旅大视察团董彦平、叶南等飞抵沈阳。同日蒋主席离沈返京。沈阳北陵机场外围已发动四万民工构筑工事，揭开保卫大沈阳序幕。"
      source: "申报 1947年06月13日 第1版 第24901期"
      source_url: "/newspapers/瀋陽的痙攣.html"
      original_text: ""
      notes: ""
    - date: "1947-06-02"
      date_display: ""
      content: "晚，共产党军队不战而占领开原新城区。6月3日凌晨5点，经过激战后占领老城区。高级国民党军官及其家属在激战开始前就已撤离该城。消息来源：目击者翁家麟，前执行总部库利上校的线人。前国民党新六军军长、现负责沈阳防务的廖耀湘将军及其参谋长已于几天前撤离家属。廖耀湘下令其麾下所有军官撤离家属。共产党军队正从东、北、西三个方向向沈阳推进。北部已抵达开原。铁岭是共产党军队和沈阳之间北部唯一的国民党据点。东部共产党军队已推进至清原。驻守梅河口（电报139，6月3日）的国民党师被共产党军队歼灭。消息来源：廖耀湘将军的前机要秘书。"
      source: "FRUS, 1947, The Far East: China, Vol.VII, Telegram from Consul General at Mukden (Ward)"
      source_url: "/liaos_tele/1947-06-05美国驻沈阳总领事沃德致国务卿电.html"
      original_text: ""
      notes: ""
    - date: "1947-06-03"
      date_display: ""
      content: "廖耀湘下令家属离开沈阳"
      source: "FRUS, 1947, The Far East: China, Vol.VII, Telegram from Consul General at Mukden (Ward)"
      source_url: "/liaos_tele/1947-06-05美国驻沈阳总领事沃德致国务卿电.html"
      original_text: ""
      notes: ""
    - date: "1947-06-04"
      date_display: ""
      content: "廖耀湘在铁岭指挥。"
      source: "鎮海報 1947.06.06"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/zhhb19470606-01.1.2"
      original_text: ""
      notes: ""
    - date: "1947-06-05"
      date_display: ""
      content: "国军机动兵团晨克复开原，沿长沈线向北挺进。新六军在铁岭准备予来犯共军以歼灭性打击，全县民众日夜动员协助修筑城防，五日内已完成工事。赵家骧以警备司令身份在沈阳广播电台广播当前情势。"
      source: "申报 1947年06月07日 第1版 第24895期"
      source_url: "/newspapers/開原烏拉街收復.html"
      original_text: ""
      notes: ""
    - date: "1947-06-06"
      date_display: ""
      content: "杜聿明腿疾痊愈后首次接见记者，称共军大部兵力约十余万集于开原、清源间，国军已撤离不重要地区实行集中，最近期内或可展开决定性战斗，局势当能改观。"
      source: "申报 1947年06月07日 第1版 第24895期"
      source_url: "/newspapers/開原烏拉街收復.html"
      original_text: ""
      notes: ""
    - date: "1947-06-09"
      date_display: ""
      content: "廖耀湘由铁岭至沈阳见杜聿明，并当日返回铁岭。"
      source: "新民报 南京 1947.06.10 第1版"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-06-09"
      date_display: ""
      content: "晨3时自铁岭至沈阳，10时谒杜长官，报告军情，日内即返回。记者询问军情，他说，共军此次向南深窥，纯系侥幸。目前情况可以具体告者：1）共军侥幸之机已经过去。2）国军战略连接，业已稳固。3）现在战事不在小据点得失，而在摧毁野战军之主力，共军主力约六个师在开原以北，我将给予歼灭之打击，惟此时机不愿预计，不久将有惊人之发展奉告。彼提到哈尔滨未来情势，促记者注意。"
      source: "中央日報 1947.06.10; 申报 1947年06月10日 第2版 第24898期"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/zyrb19470610-01.1.2; /newspapers/鐵嶺形勢險要天成.html; /newspapers/廖耀湘谈目前东北局势.html"
      original_text: ""
      notes: ""
    - date: "1947-06-13"
      date_display: ""
      content: "廖耀湘晚由铁岭来沈，对记者称铁岭防务已全部完成，分析共军围攻四平可能为佯攻，其真正野心仍为沈阳，但断言其必不能飞越铁岭进犯。"
      source: "申报 1947年06月15日 第1版 第24903期"
      source_url: "/newspapers/東北局勢益趨緊張四平市郊展開砲戰.html; /newspapers/廖耀湘谈攻沈共军绝难获得进展（中央社）.html; /newspapers/廖耀湘分析东北战局（中央社）.html"
      original_text: ""
      notes: ""
    - date: "1947-06-16"
      date_display: ""
      content: "新六军某部前在中固（距沈阳三十公里）俘获共军中日本人九名，当日专机解送南京审讯。据供属共军第三师七团，半年前在敦化待遣回国时被共军扣押充担架兵。共军炮兵十分之七为韩人。"
      source: "申报 1947年06月17日 第1版 第24905期"
      source_url: "/newspapers/共軍中九名日兵經俘獲由瀋解京.html"
      original_text: ""
      notes: ""
    - date: "1947-06-20"
      date_display: "约6月20日"
      content: "廖耀湘在铁岭军部指挥所召集各师师长李涛、龙天武、郑庭笈开会。下午三时郑庭笈到达后，在廖办公室见到蒋经国。蒋经国称奉蒋介石命前来慰问，从皮包中取出蒋介石亲笔信分发各师长，信中表达对官兵关怀及对东北战局之焦虑，要求各师长抱「不成功必成仁」之决心，准备在四平街地区与共军大决战。"
      source: "蒋军四平街解围战役中的八棵树争夺战（郑庭笈）"
      source_url: "/battles_history/liaoshen/1947/蒋军四平街解围战役中的八棵树争夺战（郑庭笈）.html"
      original_text: "有一天（大约是6月20日），廖耀湘在铁岭军部指挥所，要各师师长（李涛，龙天武，郑庭笈）到军部开会。下午3时左右，我从铁岭南十公里的得胜台车站到军部去……在廖的办公室见到蒋经国"
      notes: ""
    - date: "1947-06-25"
      date_display: ""
      content: "五十三军增援四平在开原集结完毕。郑洞国先期派新六军分向开原以东八棵树、貂皮屯及以北威远堡门等地占领阵地，对清源、西丰方面采取侧防，确保中长铁路安全。五十三军随后由八面城回师增援新六军威远堡门地区，因民主联军已主动撤退未发生重大战斗。"
      source: "文史资料存稿选编——全面内战（上）"
      source_url: "/battles_history/liaoshen/1947/第五十三军增援四平街作战经过（节选）（谷振寰 李连仲）.html"
      original_text: ""
      notes: "廖耀湘审稿确认符合当时情况"
    - date: "1947-06-27"
      date_display: ""
      content: "郑洞国偕廖耀湘、舒适存午乘专车抵开原，稍事休息即赴前进防地视察。"
      source: "申报 1947年06月28日 第1版 第24916期"
      source_url: "/newspapers/國軍越雙廟子北進.html"
      original_text: ""
      notes: ""
    - date: "1947-06-23"
      date_display: "6月23日至25日"
      content: "八棵树争夺战。23日下午解放军主力以步炮联合猛攻八棵树高地第五〇五团阵地，激战至黄昏八棵树附近高地全部失守。郑庭笈向廖耀湘报告，廖连问「八棵树附近高地都失了吗」，严令使用全部力量恢复阵地。25日下午三时在空军与炮兵协同下发动反攻，激战至黄昏后重占八棵树高地。"
      source: "蒋军四平街解围战役中的八棵树争夺战（郑庭笈）"
      source_url: "/battles_history/liaoshen/1947/蒋军四平街解围战役中的八棵树争夺战（郑庭笈）.html"
      original_text: "廖听到以后，非常着急，他连问「八棵树附近高地都失了吗」？我说「是」。廖严格地要求我使用全部力量去恢复已失的阵地，否则对军之右侧及整个增拨部队的后方威胁太大了。"
      notes: ""
    - date: "1947-06-27"
      date_display: ""
      content: "四平会战，廖耀湘电话激励169师505团团长贾维録攻取八棵树二十七高地，谓「此次作战关系整个东北存亡」。贾维録部恶战三昼夜，反复冲杀，得而复失者三次，最终攻占要地，四平之危遂解。战后清理战场，缴获轻重武器千余件，毙敌三千余。505团伤亡惨重：团长贾维録负伤，第一营长钟棫祥负重伤，第二营长郭承绪阵亡，连长阵亡四员、负伤五员，伤亡军官四十余员、士兵九百余名。"
      source: "廖公耀湘先生与我（贾维録）"
      source_url: "/ten_year_memorial/廖公耀湘先生与我（贾维録）.html"
      original_text: "此次作战关系整个东北存亡，贵团责任重大应有进无退，你表现对党国对领袖之忠诚，即在此一战。……此一战，我为攻取八棵树二十七高地战略要点，恶战三昼夜，反复冲杀，得而复失者三次，最后终能攻占要地而能解四平之危者，益应归功于耀湘先生对我之激励也。战斗结束，经清理战场，计虏获匪轻重武器一千余件，匪遣尸三千余具，而我团除我负伤外，第一营长钟棫祥负重伤，第二营长郭承绪阵亡，连长阵亡四员，负伤五员，综计伤亡军官四十余员，士兵九百余名，亦可谓壮烈矣！"
      notes: ""
    - date: "1947-07-02"
      date_display: ""
      content: "解放军主力向西丰、西安方向撤退。杜聿明命令廖耀湘向西丰、西安追击并收复该地区。廖判断解放军撤至西丰是诱蒋军深入、准备在西安地区决战之计，若新六军单独深入追击必中其计，遂拒不执行杜聿明的追击命令。四平解围战役至此告一段落。"
      source: "蒋军四平街解围战役中的八棵树争夺战（郑庭笈）"
      source_url: "/battles_history/liaoshen/1947/蒋军四平街解围战役中的八棵树争夺战（郑庭笈）.html"
      original_text: "廖当时判断攻四平街的解放军主力，撤到西丰地区来，是准备引蒋军深入，在西安地区与蒋军决战。如果新六军单独深入追击，必中解放军之计，遂没有执行杜聿明的追击命令。"
      notes: ""
    - date: "1947-07-09"
      date_display: ""
      content: "〔本報瀋陽九日電〕堅守四平之陳明仁將軍與劉翰東主席，九日下午五時廿分隨鄭洞國副長官，廖耀湘軍長乘專機凱旋來瀋。熊主席着戎裝親迎，各省市首長均在機塲歡迎，彩車過處，呼聲四起，為近來罕見盛况。又董彥平孫立人即飛京。"
      source: "申报 1947.07.10"
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-07-12"
      date_display: ""
      content: "开原，廖耀湘接待慰劳团，介绍战斗英雄及军医院等。廖耀湘表示铁岭之役，敌知难而退，旋攻四平，以为不堪一击，实估计错误。盖不打四平而先攻开原，继而进犯铁岭不逞，回师四平，在时间上已迟了两个星期，卒至溃败。"
      source: "当代晚报 1947.07.13 第1版; 武漢日報 1947.07.14"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/wrbo19470714-01.1.2; /newspapers/廖耀湘检讨四平之战.html"
      original_text: ""
      notes: ""
    - date: "1947-07-15"
      date_display: ""
      content: "廖耀湘15日晨率随员赴德惠视察，当晚返长春。"
      source: "華北日報 1946.07.17"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/hbrb19460717-01.1.2"
      original_text: ""
      notes: ""
    - date: "1947-07-15"
      date_display: ""
      content: "陈诚到任沈阳"
      source: ""
      source_url: ""
      original_text: ""
      notes: "咋没看见廖耀湘的身影呢？完全没有。只看见赵家骧和郑洞国"
    - date: "1947-07-24"
      date_display: ""
      content: "四平会战有功人员授勋典礼举行，廖耀湘授三等云麾勋章。"
      source: "申报 1947年07月24日 第1版 第24942期"
      source_url: "/newspapers/四平會戰有功人員授勳典禮.html"
      original_text: ""
      notes: ""
    - date: "1947-08"
      date_display: ""
      content: "捐资国币一亿元（查当时兑换标准约可兑换3400美元，按当时市价可购大米7万斤）成立「耀湘储金奖学会」，具体事宜委托其启蒙恩师石达成（时任邵阳县参议）代为办理。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-08-06"
      date_display: ""
      content: "廖耀湘陪同魏德迈特使赴抚顺视察，检阅罗又伦部队，参观露天采煤区、炼油厂及发电厂。魏德迈面询士兵有肉吃否，登台讲话称官兵打成一片、生活在一起。"
      source: "工商晚報 1947.08.07; 申报 1947年08月07日 第1版 第24956期"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=12&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=2e1478989cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP=; /newspapers/魏特使視察撫順.html"
      original_text: ""
      notes: ""
    - date: "1947-08-07"
      date_display: ""
      content: "魏德迈上午八时五十分离沈飞青岛，向廖耀湘等老友面致谢忱。在机场送行之军界长官仅廖耀湘一人。陈诚前日下午抵沈，晚八时至晨二时与魏德迈密谈，当日一早即与熊式辉及郑洞国举行会议。"
      source: "申报 1947年08月08日 第1版 第24957期"
      source_url: "/newspapers/魏特使離瀋陽前曾與陳總長晤談.html"
      original_text: ""
      notes: ""
    - date: "1947-08-08"
      date_display: ""
      content: "陈诚晨乘专车赴铁岭慰劳当地驻军，郑洞国、廖耀湘偕行，当日下午四时返沈。"
      source: "申报 1947年08月09日 第1版 第24958期; 前鋒報 1947.08.10"
      source_url: "; https://gpa.eastview.com/crl/lqrcn/newspapers/qifb19470810-01.1.1"
      original_text: ""
      notes: ""
    - date: "1947-08-09"
      date_display: ""
      content: "东北第6绥靖区改编为东北第4兵团。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-09-01"
      date_display: ""
      content: "升任东北第4兵团（辖新编第3军、新编第6军、青年军207师及骑兵第2军）中将司令官，驻沈阳。为《新六军三周年纪念册》题字题词并著《新六军三周年纪念日告官兵书》代序，写文《缅战与教训——军长讲述》。"
      source: "申报 1947年09月03日 第1版 第24983期"
      source_url: "/newspapers/廖耀湘等就職.html"
      original_text: ""
      notes: ""
    - date: "1947-09-02"
      date_display: ""
      content: "熊式辉离任也没看见廖耀湘送别（又看见郑洞国了，陈诚也去了）"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-10-08"
      date_display: ""
      content: "蔣介石離開瀋陽"
      source: ""
      source_url: ""
      original_text: ""
      notes: "難道廖也沒去送別？"
    - date: "1947-10-13"
      date_display: ""
      content: "廖耀湘督战南北，对记者谈目前战局已趋稳定，共军六次攻势开端战阶段计划已被打破。"
      source: "申报 1947年10月14日 第1版 第25023期"
      source_url: "/newspapers/廖耀湘對記者談話共匪計劃全毀滅.html"
      original_text: ""
      notes: ""
    - date: "1947-10-24"
      date_display: ""
      content: "辽北开原周福成部与铁岭廖耀湘部双方出击，克中固后会师于北高台子。"
      source: "申报 1947年10月25日 第1版 第25034期"
      source_url: "/newspapers/空運部隊首批抵長春.html"
      original_text: ""
      notes: ""
    - date: "1947-10-30"
      date_display: ""
      content: "廖耀湘再赴铁岭开原间指挥国军公路出击，克昌图车站及昌图县城，铁岭至四平间已无共军踪迹。"
      source: "申报 1947年10月31日 第1版 第20540期"
      source_url: "/newspapers/陸空配合固守吉長遼北收復昌圖縣城.html"
      original_text: ""
      notes: ""
    - date: "1947-10-31"
      date_display: ""
      content: "陈诚夜召各军事首长开会检讨军事，廖耀湘、周福成由铁岭开原赶回，赵家骧由锦州飞返，午夜始散。"
      source: "申报 1947年11月01日 第1版 第25041期"
      source_url: "/newspapers/孫連仲抵瀋.html"
      original_text: ""
      notes: ""
    - date: "1947-11"
      date_display: ""
      content: "所部改称第9兵团（辖新编第3军、新编第6军），仍任中将司令官。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-11-08"
      date_display: ""
      content: "晋颁二等云麾勋章。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1947-11-14"
      date_display: ""
      content: "廖耀湘电蒋中正：暂五十一师师长唐保黄于阜新战役仅率一团与匪激战，所部伤亡殆尽后自杀，为东北将领第一个自戕成仁者。现家贫亲老无法凭藉，拟恳从优特恤以全孤族。"
      source: "廖耀湘电蒋中正暂五十一师师长唐保黄于阜新战役自杀成仁恳请从优特恤"
      source_url: "/liaos_tele/1947-11-14廖耀湘电蒋中正暂五十一师师长唐保黄于阜新战役仅率一团与匪激战所部伤亡殆尽后自殺为东北将领第一个自戕成仁者现家贫亲老无法凭藉拟恳从优特恤以全孤族.html"
      original_text: ""
      notes: ""
    - date: "1947-12-16"
      date_display: ""
      content: "行辕军事检讨会议下午闭幕，廖耀湘、周福成、潘裕昆等高级将领数十人匆匆返防。"
      source: "申报 1947年12月17日 第1版 第25087期"
      source_url: "/newspapers/東北大戰又揭開.html"
      original_text: ""
      notes: ""
    - date: ""
      date_display: "10月间"
      content: "指派新6军暂62师（师长刘梓皋）担任法库防务。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: "11月间"
      content: "为支援彰武方面新3军及第105师，暂62师第2团奉令向康平佯攻，因有营长临阵脱逃致使团长阵亡（部队无损失），亲至法库集合全师军官将该营长枪毙。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1948
  entries:
    - date: "1948-01"
      date_display: ""
      content: "东北各兵团与管内兵团统一番号，东北第4兵团改为第9兵团（辖新编第3军、新编第6军、骑兵第2军）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-01-06"
      date_display: ""
      content: "公主屯会战，率右（第九）兵团奋力西进解围，在敌第一、三、六、十纵队阻截下，至午夜攻抵黄花山、东西蛇山子之线，距公主屯不足十公里，但新五军已于当日中午被击破覆灭。邱中岳指出廖耀湘提前一天完成规定任务（原令一月七日进出该线），责任不在廖。"
      source: "追述辽南、公主屯、辽西诸战役之作战经过及是非曲直（邱中岳）"
      source_url: "/ten_year_memorial/追述辽南、公主屯、辽西诸战役之作战经过及是非曲直（邱中岳：新22师连、营、团长）.html"
      original_text: "廖将军受命之后，仍依命令立即左旋并向右梯次展开攻击，在强敌第一、第三、第六、第十等四个纵队之阻截下，奋力西进，迄三十七年一月六日午夜，攻抵黄花山、东西蛇山子之线，距公主屯不足十公里时，新五军已于六日中午为匪击破覆灭。"
      notes: ""
    - date: "1948-01-08"
      date_display: ""
      content: "新五军在公主屯被歼、军长陈林达被俘后，蒋介石亲飞沈阳。陈诚将责任推给将领不服从命令，请求惩办廖耀湘及新六军军长李涛。蒋介石召开东北师长以上会议，痛骂廖耀湘、李涛不服从命令、不去解新五军之围。廖、李不服，挺身辩称并未奉到援救命令，形成僵局。最后陈诚不得不站起来承认「新五军的被消灭完全是我自己指挥无方」。"
      source: "辽沈战役概述（杜聿明）; 郑洞国回忆录——解放战争（郑洞国）"
      source_url: "/battles_history/liaoshen/1948/辽沈战役概述（杜聿明）.html; /battles_history/liaoshen/1948/郑洞国回忆录——解放战争（郑洞国）.html"
      original_text: "蒋先生整整骂了大约十几分钟，大家以为骂也骂得差不多了，岂知他话锋一转，又接着大骂起廖耀湘将军和李涛将军来，切责其不服从命令，拥兵自保，见死不救，致使新5军全军覆没。"
      notes: ""
    - date: "1948-01-20"
      date_display: ""
      content: "兼任第7（沈阳）陆军训练处（兼处长卫立煌）副处长。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-01-23"
      date_display: ""
      content: "共军发动「第七次攻势」，沈阳危急。169师505团（团长贾维録）驻防铁岭中固一线。当晚11时许，廖耀湘电令贾维録交接防务、增援沈阳，限次日午前完成准备，并配属506团步兵一营及炮兵一营，命其于27日夜向浑河机场以东之张家宫棚攻击，以掩护五十二军侧背安全。"
      source: "廖公耀湘先生与我（贾维録）"
      source_url: "/ten_year_memorial/廖公耀湘先生与我（贾维録）.html"
      original_text: "沈阳情势紧急，贵团现有防务，已令五○六团之主力前来接替，另以五○六团步兵一营，配属贵团，限你在明（二十四）午十二时前交接完毕，完成增援沈阳之准备。"
      notes: ""
    - date: "1948-01-27"
      date_display: ""
      content: "169师505团（团长贾维録）夜袭张家宫棚，奇袭得手，冲入村庄展开激战，共军不支向辽阳方向溃退。天明后全部占领张家宫棚及附近要点，缴获散乱文件及俘虏百余名，始知张家宫棚系共军第八纵队司令部所在地。第八纵队司令部被击溃后，整个战局改观，沈阳之围遂解。"
      source: "廖公耀湘先生与我（贾维録）"
      source_url: "/ten_year_memorial/廖公耀湘先生与我（贾维録）.html"
      original_text: "二十七日天明，已将张家宫棚及其附近地区之要点全部占领，虏获匪不少之散乱文件及百余名俘虏，始知张家宫棚系匪之第八纵队司令部所在地，由于匪之第八纵队司令部被击溃，使整个战局为之改观沈阳之围遂解。"
      notes: ""
    - date: "1948-01-27"
      date_display: ""
      content: "据报卫立煌将统率国军精锐约一百万人，包括美式配备暨训练之新一军与新六军、新二军与新五军、一骑兵师及一独立旅等。中国最精锐之机械化部队近在葫芦岛登陆，正向北移动，目标为收复新立屯及打通北宁路。"
      source: "申报 1948年01月28日 第1版 第25126期"
      source_url: "/newspapers/新立屯陷入混戰.html"
      original_text: ""
      notes: ""
    - date: "1948-02-05"
      date_display: ""
      content: "陈诚呈蒋中正研核廖耀湘所呈开展东北军事局势之意见。"
      source: "陈诚呈蒋中正研核廖耀湘所呈开展东北军事局势之意见"
      source_url: "/liaos_tele/1948-02-05陈诚呈蒋中正研核廖耀湘所呈开展东北军事局势之意见.html"
      original_text: ""
      notes: ""
    - date: "1948-02-18"
      date_display: ""
      content: "自拟急电给暂62师刘梓皋，命其当晚立即由法库经通江口向开原方向撤退。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-02-21"
      date_display: ""
      content: "廖耀湘电蒋中正：匪发动二次进截沈阳，经以内线方式击退各匪，但东北局势较前严重。似宜速以海空由营口、葫芦岛、沈阳增援打开危局，并增强空运补给及新兵，争取融雪前准备时间。"
      source: "廖耀湘电蒋中正称匪发动二次进截沈阳等"
      source_url: "/liaos_tele/1948-02-21廖耀湘电蒋中正稱匪发动二次进截沈阳经以內线方式击退各匪但东北局势较前严重似宜速以海空由营葫沈增援打开危局并增强空运补给及新兵争取融雪前准备时间.html"
      original_text: ""
      notes: ""
    - date: "1948-03-31"
      date_display: ""
      content: "廖耀湘呈国民政府主席蒋中正：为对东北现阶段作战计划提出意见，主张彻底集中兵力。"
      source: "廖耀湘呈国民政府主席蒋中正为对东北现阶段作战计画意见"
      source_url: "/liaos_tele/1948-03-31廖耀湘呈国民政府主席蒋中正为对东北现阶段作战计画意见.html"
      original_text: ""
      notes: ""
    - date: "1948-04-09"
      date_display: ""
      content: "廖耀湘再次呈蒋中正对现阶段东北作战之意见并附要图。"
      source: "廖耀湘呈蒋中正对现阶段东北作战之意见并附要图"
      source_url: "/liaos_tele/1948-04-09廖耀湘呈蒋中正对现阶段东北作战之意见并附要图.html"
      original_text: ""
      notes: ""
    - date: "1948-04-11"
      date_display: ""
      content: "廖耀湘电呈蒋中正：东北力量分散，指挥系统松懈，形同麻痹，有被逐点肢解与各个击破之可能。拟请立即变更部署，彻底集中六个军编为两个攻击兵团统一指挥，求匪主力主动作战，有百分之六十胜算可操。如迟疑不为或过分顾虑，将来或可能陷全军于覆败。如需详陈，恳电生飞京面述。"
      source: "廖耀湘电呈国民政府主席蒋中正为愿亲往南京面报东北军情; 廖耀湘呈蒋中正对东北作战意见（经薛岳代呈）"
      source_url: "/liaos_tele/1948-04-11廖耀湘电呈国民政府主席蒋中正为愿亲往南京面报东北军情.html; /liaos_tele/1948-04-16廖耀湘呈蒋中正对东北作战意见.html"
      original_text: "东北力量分散，指挥系统松懈，形同麻痹，有被逐点肢解与各个击破之可能。"
      notes: "4月16日薛岳代呈版与4月11日原电内容一致，提出以六个军编为两个攻击兵团的具体作战计划"
    - date: "1948-04-18"
      date_display: ""
      content: "关麟征晨九时检阅廖耀湘兵团。"
      source: "申报 1948年04月19日 第2版 第25205期"
      source_url: "/newspapers/關麟徵在瀋.html"
      original_text: ""
      notes: ""
    - date: "1948-05"
      date_display: ""
      content: "第9兵团扩大为机动攻击兵团（也称西进兵团或辽西兵团），改辖新编第1军、新编第3军、新编第6军，第49军、第52军、第71军。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#一蒋介石曾决心撤退沈阳主力"
      original_text: ""
      notes: ""
    - date: ""
      date_display: "5月初"
      content: "乘专机到南京，受蒋介石召见。翌日在蒋私邸开会，会间与罗泽闿有发生争吵。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#一蒋介石曾决心撤退沈阳主力"
      original_text: ""
      notes: ""
    - date: ""
      date_display: "春"
      content: "国民政府竞选总统，程潜竞选副总统，廖耀湘是第一个热心拥护者，派新六军政治部主任赴南京协助竞选工作，后成为「宪政协进会」委员。"
      source: "接收东北时军统特务活动种种（文强）"
      source_url: "/ten_year_memorial/接收东北时军统特务活动种种（文强）.html"
      original_text: "1948年国民党政府竞选总统，程潜竞选副总统...廖耀湘是第一个热心拥护者"
      notes: ""
    - date: "1948-05-04"
      date_display: ""
      content: "廖耀湘由沈阳经北平飞南京，在北平西苑机场停留一小时余，与北平军事当局接触。"
      source: "申报 1948年05月05日 第1版 第25221期"
      source_url: "/newspapers/廖耀湘飛京.html"
      original_text: ""
      notes: ""
    - date: "1948-05-06"
      date_display: ""
      content: "蒋介石召见赵家骧、廖耀湘。"
      source: "中央日報 1948.05.07"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/zyrb19480507-01.1.2"
      original_text: ""
      notes: ""
    - date: "1948-05-07"
      date_display: ""
      content: "赵家骧、廖耀湘再谒蒋主席。"
      source: "中央日報 1948.05.08"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/zyrb19480508-01.1.2"
      original_text: ""
      notes: ""
    - date: "1948-05-08"
      date_display: ""
      content: "廖耀湘赵家骧来京述职结束，将飞沪并转东北。"
      source: "華僑日報 1948.05.09"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=19&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=280eee2a9cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
      original_text: ""
      notes: ""
    - date: "1948-05-09"
      date_display: ""
      content: "傅作义午宴张作相、马占山、赵家骧及廖耀湘、王铁汉等，商讨东北华北加紧联系事宜。晚，赵家骧、廖耀湘、王铁汉、董英斌、董彦平、罗又伦等东北将领联名宴请张作相、马占山。"
      source: "申报 1948年05月10日 第1版 第25226期"
      source_url: "/newspapers/打開東北現狀方案.html"
      original_text: ""
      notes: ""
    - date: "1948-05-10"
      date_display: ""
      content: "东北华北高级将领晨九时在西郊华北剿总举行联席会议，傅作义主持，廖耀湘、赵家骧、董英斌、董彦平等出席，研讨东北华北联合剿匪战术。"
      source: "申报 1948年05月11日 第1版 第25227期"
      source_url: "/newspapers/東北華北將領在平開聯席會.html"
      original_text: ""
      notes: ""
    - date: "1948-05-11"
      date_display: ""
      content: "下午与张作相、马占山、赵家骧、王铁汉等同机离平，五时抵沈。"
      source: "申报 1948年05月12日 第1版 第25228期"
      source_url: "/newspapers/東北將星離平返防.html"
      original_text: ""
      notes: ""
    - date: "1948-05-27"
      date_display: ""
      content: "传廖耀湘将继梁华盛任沈阳防守司令官，梁有出任京沪警备司令说。"
      source: "申报 1948年05月28日 第1版 第25244期"
      source_url: "/newspapers/瀋陽防守司令官將由廖耀湘繼任.html"
      original_text: ""
      notes: ""
    - date: "1948-05-30"
      date_display: ""
      content: "传闻廖耀湘将出任沈阳防守司令。"
      source: "大公晚報 1948.05.30"
      source_url: "https://gpa.eastview.com/crl/lqrcn/newspapers/dgwb19480530-01.1.1"
      original_text: ""
      notes: ""
    - date: "1948-09-22"
      date_display: ""
      content: "晋任陆军少将。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1948-09-26"
      date_display: ""
      content: "至卫立煌家吃晚饭（另有顾祝同），并将研究意见电报蒋介石。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#三蒋介石出辽西与东北国民党将领的守沈阳和出营口的争执"
      original_text: ""
      notes: ""
    - date: "1948-09-27"
      date_display: ""
      content: "接蒋介石回电，仍要执行原来行动。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#三蒋介石出辽西与东北国民党将领的守沈阳和出营口的争执"
      original_text: ""
      notes: ""
    - date: "1948-09-28"
      date_display: ""
      content: "见顾祝同，个别谈话并遭斥责。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#三蒋介石出辽西与东北国民党将领的守沈阳和出营口的争执"
      original_text: ""
      notes: ""
    - date: "1948-09-29"
      date_display: ""
      content: "顾祝同飞回南京。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#三蒋介石出辽西与东北国民党将领的守沈阳和出营口的争执"
      original_text: ""
      notes: ""
    - date: "1948-10-02"
      date_display: ""
      content: "蒋介石中午飞抵沈阳，廖耀湘等到机场恭迎。下午三时蒋主持剿总军事会议，晚七时会餐，餐后个别接见各首长，至深夜始散。"
      source: "申报 1948年10月04日 第1版 第25372期; 辽西战役纪实（廖耀湘）"
      source_url: "/newspapers/總統決暫坐鎮北平.html; /liaos_writings/辽西战役纪实（廖耀湘）.html#四蒋介石到沈阳强催主力出辽西"
      original_text: ""
      notes: ""
    - date: "1948-10-03"
      date_display: ""
      content: "蒋介石晨八时半在行邸召见廖耀湘、周福成，九时召见王铁汉、董文琦等。十一时蒋离沈飞北平。"
      source: "申报 1948年10月04日 第1版 第25372期"
      source_url: "/newspapers/總統決暫坐鎮北平.html"
      original_text: ""
      notes: ""
    - date: "1948-10-06"
      date_display: ""
      content: "在新民县火车站前进指挥所集合团长以上人员讲话并转达蒋介石命令。廖强调共军围攻锦州目的是打援，须先打下彰武、新立屯切断共军交通线；要注意联络，战斗时集中火力猛攻一点，宿营时防共军夜袭指挥部；通信中断时部队要独立作战。"
      source: "辽西兵团的覆灭（郑庭笈）"
      source_url: "/battles_history/liaoshen/1948/辽西兵团的覆灭（郑庭笈）.html"
      original_text: "6日早上，廖耀湘在新民县火车站前进指挥所，集合团长以上人员讲话……廖在讲话中特别强调共军这次围攻锦州的目的是打从沈阳援锦的新一军和新六军的部队"
      notes: ""
    - date: "1948-10-08"
      date_display: ""
      content: "辽西兵团主力开始向巨流河、新民地区集中（未能在11日以前集中完竣）。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#五攻占彰武塔山久攻不克"
      original_text: ""
      notes: ""
    - date: "1948-10-11"
      date_display: ""
      content: "在巨流河车站兵团指挥所（设在列车上）集合各部队团长以上人员开作战会议。廖对锦州地区国共双方态势作了介绍，指示须先攻占彰武、新立屯切断共军交通线；特别注意联络，通信中断时要能独立作战；宿营时注意共军对指挥系统的袭击。"
      source: "新编第一军在辽西（陈时杰）"
      source_url: "/battles_history/liaoshen/1948/新编第一军在辽西（陈时杰）.html"
      original_text: "廖耀湘于十一日曾在巨流河车站兵团指挥所（设在列车上），集合各部队团长以上人员开作战会议。会上廖对锦州地区国共双方部队情况、态势作了介绍，尤其对尔后之作战指导，作了详尽的分析和说明"
      notes: ""
    - date: "1948-10-11"
      date_display: ""
      content: "黄昏，占领彰武。与剿总参谋长联络询问锦州当天战况并将情况告诉卫立煌。"
      source: "申报 1948年10月12日 第1版 第25379期; 辽西战役纪实（廖耀湘）"
      source_url: "/newspapers/東北戰局之轉捩點.html; liaos_writings/辽西战役纪实（廖耀湘）.html#五攻占彰武塔山久攻不克"
      original_text: ""
      notes: ""
    - date: "1948-10-12"
      date_display: ""
      content: "令71军（原在新民担任防务）北向彰武、西向新立屯、黑山、大虎山方向搜索扫荡。上午陪卫立煌、罗泽闿在彰武前线视察。12时回新民。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#五攻占彰武塔山久攻不克"
      original_text: ""
      notes: ""
    - date: "1948-10-13"
      date_display: ""
      content: "下半夜接蒋介石手电切责，要求亲率主力向锦州前进。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#五攻占彰武塔山久攻不克"
      original_text: ""
      notes: ""
    - date: "1948-10-14"
      date_display: ""
      content: "早晨下令兵团渡新开河西进（留49军一个师守备彰武、71军一个师暂留新民地区）。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#六进占新立屯后的打算"
      original_text: ""
      notes: ""
    - date: "1948-10-15"
      date_display: ""
      content: "占领新立屯并到达黑山外围。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#六进占新立屯后的打算"
      original_text: ""
      notes: ""
    - date: "1948-10-15"
      date_display: ""
      content: "上午九时许，蒋介石自沈阳打来电话催促西进兵团前进，廖耀湘不在，由参谋长杨琨接听。蒋自称委员长，问廖司令官去了哪里、为何不前进。杨琨答彰武之敌尚未肃清、桥梁未架好。蒋最后命令：「你们司令官回来，你告诉他，我命令他赶快前进，不要再拖延了！」"
      source: "辽西战役补述（杨琨）"
      source_url: "/battles_history/liaoshen/1948/辽西战役补述（杨琨）.html"
      original_text: "10月15日上午9点钟左右，蒋介石从沈阳打来电话，我接的电话（廖不在）。他自称是蒋委员长……他最后说：「你们司令官回来。你告诉他，我命令他赶快前进，不要再拖延了!」"
      notes: ""
    - date: "1948-10-16"
      date_display: ""
      content: "拂晓前接刘梓皋（暂62师师长，在葫芦岛整训，塔山预备队）电报称锦州已解放。之后打电话给赵家骧、卫立煌、蒋介石。通知向凤武（71军军长）暂停对黑山的攻击，通知李涛（新6军军长）将部队集结。上午11时左右，杜聿明乘车到新民，与杜商议如何行动问题。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#七锦州被解放后的想法"
      original_text: ""
      notes: ""
    - date: "1948-10-17"
      date_display: ""
      content: "早上，见卫立煌。下午回新民。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#七锦州被解放后的想法"
      original_text: ""
      notes: ""
    - date: "1948-10-18"
      date_display: ""
      content: "晚上，电告卫立煌已做好准备于次日攻击黑山，被卫要求等待。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#七锦州被解放后的想法"
      original_text: ""
      notes: ""
    - date: "1948-10-19"
      date_display: "10月19-20日"
      content: "蒋介石在北平召集卫立煌、杜聿明商讨行动方针。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#七锦州被解放后的想法"
      original_text: ""
      notes: ""
    - date: "1948-10-19"
      date_display: ""
      content: "全天联系沈阳希望知道决策。晚上直电蒋介石，坚决要求退营口。同日，毛泽东电林罗刘：沈敌似已决心撤退，退营口可能性很大，令各部堵塞敌退路；攻新立屯，抓住廖耀湘攻击，使他走不脱，各个歼灭之。"
      source: "辽西战役纪实（廖耀湘）; 毛泽东电林罗刘准备各个歼灭廖耀湘部"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#七锦州被解放后的想法; /liaos_tele/1948-10-19毛泽东电林罗刘准备各个歼灭廖耀湘部.html"
      original_text: "攻新立屯，抓住廖耀湘攻击，使他走不脱，各个歼灭之。"
      notes: ""
    - date: "1948-10-20"
      date_display: ""
      content: "晚上，接卫立煌电话，同意退营口。电告向凤武（71军军长）于次日拂晓攻击黑山。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#七锦州被解放后的想法"
      original_text: ""
      notes: ""
    - date: "1948-10-21"
      date_display: ""
      content: "71军攻击黑山。令潘裕昆22日亲至前线视察，下午至兵团部报告并接受任务。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#八进犯黑山受阻"
      original_text: ""
      notes: ""
    - date: "1948-10-22"
      date_display: ""
      content: "潘裕昆报告前线情况，改命潘裕昆卫攻击指挥官。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#八进犯黑山受阻"
      original_text: ""
      notes: ""
    - date: "1948-10-23"
      date_display: ""
      content: "拂晓，新1军参加对黑山的攻击。晚9点，下达向营口撤退命令。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#九决心向营口迅速撤退"
      original_text: ""
      notes: ""
    - date: "1948-10-24"
      date_display: ""
      content: "下午，新6军军部及军属169师到达胡家窝棚。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#九决心向营口迅速撤退"
      original_text: ""
      notes: ""
    - date: "1948-10-24"
      date_display: ""
      content: "到达胡家窝棚，率前进指挥所拟随新6军军部行动。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#九决心向营口迅速撤退"
      original_text: ""
      notes: ""
    - date: "1948-10-24"
      date_display: "10月24日夜"
      content: "解放军夜袭胡家窝棚新六军指挥部，廖耀湘与李涛狼狈不堪，徒步逃至历家窝棚新二十二师司令部，与各军失去联络。郑庭笈将情况电告沈阳卫立煌。"
      source: "辽西兵团的覆灭（郑庭笈）"
      source_url: "/battles_history/liaoshen/1948/辽西兵团的覆灭（郑庭笈）.html"
      original_text: "24日夜间，解放军夜袭胡家窝棚新六军指挥部，廖耀湘、李涛狼狈不堪，徒步逃到历家窝棚新二十二师司令部和各军失了联络。"
      notes: ""
    - date: "1948-10-26"
      date_display: ""
      content: "胡家窝棚的兵团前进指挥所发生战斗。上午抵达新30师（师长文小山）师部，约11时，李涛（新6军军长）及杨焜（兵团参谋长）到达，12时左右潘裕昆（新1军军长）到达，之后向凤武（71军军长）到达。16时与新22师取得联系，17时左右离开新30师，黄昏左右到达新22师师部，与郑庭笈（49军军长）通电。下半夜率新22师64团到达49军军部陈家窝棚，黎明前到达军部。"
      source: "辽西战役纪实（廖耀湘）; 追随湘公十年略述（周璞）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#十辽西兵团被歼灭经过; /ten_year_memorial/追随湘公十年略述（周璞：新22师连、营、团、副师长）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-26"
      date_display: ""
      content: "拂晓，廖耀湘用无线电话明语（未加密）下达兵团指挥所及向沈阳撤退的全部部署。参谋长杨焜一再劝其使用密语，廖性急不肯听。此举等于将全部行动路线通知解放军，使其得以作出全歼部署。"
      source: "辽西战役补述（杨琨）"
      source_url: "/battles_history/liaoshen/1948/辽西战役补述（杨琨）.html"
      original_text: "廖性情急躁，尤其没有那样的沉着、耐心。10月26日拂晓，兵团指挥所以及向沈阳撤退的部署，都是用无线电话明语讲的。我一再劝他不要性急，要使用密语，他不肯听。"
      notes: ""
    - date: "1948-10-26"
      date_display: ""
      content: "蒋中正电卫立煌：著廖耀湘兵团即经辽中向沈阳集中，并令刘玉章部协同海军固守营口，俟主力到达沈阳後再定行动。另电告海军先头重庆号已抵营口，饬王叔铭集中空军主力援黑山大虎山方面战斗并任空中补给。"
      source: "蒋中正电卫立煌著廖耀湘兵团即经辽中向沈阳集中等; 蒋中正电卫立煌据报海军先头重庆号已抵营口等"
      source_url: "/liaos_tele/1948-10-26蒋中正电卫立煌著廖耀湘兵团即经辽中向沈阳集中并令刘玉章部协同海军固守营口俟主力到达沈阳後再定行动.html; /liaos_tele/1948-10-26蒋中正电卫立煌據报海军先头重庆號已抵营口桂永清乘太康舰亦抵营口已电其来平决定海运增援事另饬王叔铭集中空军主力援黑山大虎山方面战斗并任空中补给等.html"
      original_text: ""
      notes: ""
    - date: "1948-10-26"
      date_display: "10月26日夜"
      content: "到达新22师师部后，廖耀湘亲自作图上撤退部署，亲自写稿，电示兵团所指挥各军师行动。在旁之军师长默无一语。随后偕李涛赴大兴堡四十九军军部。"
      source: "追随湘公十年略述（周璞）"
      source_url: "/ten_year_memorial/追随湘公十年略述（周璞：新22师连、营、团、副师长）.html"
      original_text: "是夜公亲自作图上撤退布署，亲自写稿，电示兵团所指挥各军师行动。在旁之军师长默无一语。"
      notes: ""
    - date: "1948-10-26"
      date_display: "10月26日半夜"
      content: "廖耀湘、李涛到达陈家窝棚四十九军指挥部，与郑庭笈会面用晚餐后继续向沈阳撤退。冬夜严寒，士气委颓，前进不远即发生情况，汽车无法行驶，只得徒步从村庄空隙小道逃命。各军已丧失指挥和控制，兵团与军师团联络全断。"
      source: "辽西兵团的覆灭（郑庭笈）"
      source_url: "/battles_history/liaoshen/1948/辽西兵团的覆灭（郑庭笈）.html"
      original_text: "半夜，廖耀湘、李涛到达陈家窝棚四十九军指挥部，和郑庭笈会面并用晚餐后，继续向沈阳撤退。冬夜严寒，士气委颓，大都垂头丧气，毫无战斗意志。"
      notes: ""
    - date: "1948-10-27"
      date_display: ""
      content: "8时左右出门，至新6军军部。"
      source: "辽西战役纪实（廖耀湘）"
      source_url: "/liaos_writings/辽西战役纪实（廖耀湘）.html#十辽西兵团被歼灭经过"
      original_text: ""
      notes: ""
    - date: "1948-10-27"
      date_display: "10月27日拂晓"
      content: "撤退纵队被解放军切断、隔离、分别包围，陷入极度混乱。廖耀湘、李涛与参谋长杨琨三人杂在乱窜人群中，先乘汽车后徒步奔跑，高喊让溃兵组织突围无人理睬。杨琨建议三人分散行动以缩小目标，廖、李同意，就此分开各走一方。"
      source: "辽西战役补述（杨琨）"
      source_url: "/battles_history/liaoshen/1948/辽西战役补述（杨琨）.html"
      original_text: "那时廖耀湘、李涛和我三人也杂在这些乱窜、乱奔的人群中瞎跑。……最后我说：「我们三个人，都带有随从，同在一起跑，目标太大，还是分散开来各跑各的好，免得大家同归于尽。」他们两人都同意，于是分开了，各走一方。"
      notes: ""
    - date: "1948-10-27"
      date_display: "10月27日"
      content: "周璞随廖耀湘、李涛渡绕扬河，水深过腹，大炮车辆无法通过。东南已有情况，渡河后遇伏。接近江家屯以南村庄遇匪，目击前行官兵悉已被俘。廖耀湘举小手枪自戕，为副官李万福所夺。辗转于开阔地带，至黄昏仅余廖耀湘、李涛、周璞与军部高参邓图南及卫士十余人。夜分匍匐脱围，仍渡绕扬河东行，河中骤然遇匪，李涛失踪。"
      source: "追随湘公十年略述（周璞）"
      source_url: "/ten_year_memorial/追随湘公十年略述（周璞：新22师连、营、团、副师长）.html"
      original_text: ""
      notes: "按：周璞记述其为战场上最后一个与廖耀湘共在一起者。"
    - date: "1948-10-28"
      date_display: "10月28日凌晨"
      content: "廖耀湘、周璞、邓图南三人疲惫至极，误入村庄被匪军当作病兵命卧民炕休息。中午匪以牛车送廖耀湘与周璞赴团医务所，途中趁押送匪兵在前，二人跃车逃跑，匪兵连发四枪，一弹穿透周璞裤腿未伤及肉，一弹中廖耀湘右足亦未致伤，急跑约三华里脱险，避入高粱堆内。"
      source: "追随湘公十年略述（周璞）"
      source_url: "/ten_year_memorial/追随湘公十年略述（周璞：新22师连、营、团、副师长）.html"
      original_text: ""
      notes: ""
    - date: "1948-10-28"
      date_display: ""
      content: "在田野中高粱秆堆里隐匿一天。"
      source: "廖耀湘事略（禹靖寰）; 追随湘公十年略述（周璞）"
      source_url: "/ten_year_memorial/廖耀湘事略（禹靖寰）.html; /ten_year_memorial/追随湘公十年略述（周璞：新22师连、营、团、副师长）.html"
      original_text: "于28日'在田野中的高粱杆堆里隐匿了一天'"
      notes: ""
    - date: "1948-10-30"
      date_display: ""
      content: "卫立煌电蒋中正：据新第六军逃回官兵称，曾目睹廖耀湘企图在辽中以西渡河，被匪冲散，至今下落不明；又据传闻廖耀湘乘装甲车突围，在长冈子附近中匪炮弹焚毙等语。（按：实际廖耀湘此时尚在逃亡中，后于11月初被俘。）"
      source: "卫立煌电蒋中正称据新第六军逃回官兵称曾目睹廖耀湘企图在辽中以西渡河被匪冲散等语"
      source_url: "/liaos_tele/1948-10-30卫立煌电蒋中正稱據新第六军逃回官兵稱曾目睹廖耀湘企图在辽中以西渡河被匪冲散至今下落不明又據传闻廖耀湘乘装甲车突围在长冈子附近中匪炮弹焚毙等语.html"
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：《辽西战役纪实》中此处关于占领彰武的时间似有误。"
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：参考资料《国民革命军第五军将官录》、《抗日名将廖耀湘》关于兵团改组及下辖部队问题各说法不一。依《新六军成立三周年纪念册》看，则9月1日晋升时司令时兵团似已称为9兵团。"
- year: 1949
  entries:
    - date: ""
      date_display: ""
      content: "被俘后秘密指示邱中岳南下，嘱咐夫人黄伯溶携子廖定一经香港赴台湾。"
      source: "编后赘言（李珍）; 父亲与我（廖定一）"
      source_url: "/ten_year_memorial/编后赘言——我怎样写廖耀湘将军传（李珍）.html; /ten_year_memorial/父亲与我——我记忆中的父亲（廖定一）.html"
      original_text: "要内人排除万难，迅速带定一经香港去台湾"
      notes: ""
- year: 1950
  entries:
    - date: ""
      date_display: ""
      content: "夫人黄伯溶历尽艰辛，由长沙冒死携子经香港辗转赴台。"
      source: "敬悼廖耀湘将军（何福祥）; 廖耀湘将军传略（刘建章 李珍）"
      source_url: "/ten_year_memorial/敬悼 廖耀湘将军（舒适存：曾任新六军副军长）.html; /ten_year_memorial/廖耀湘将军传略（刘建章 李珍）.html"
      original_text: "廖夫人三十八年孤陷长沙，历尽艰难，冒死携子逃离匪区，辗转来台"
      notes: "按：刘建章、李珍记为民国三十九年（1950年）间。"
- year: 1951
  entries:
    - date: ""
      date_display: ""
      content: "应刘伯承之邀，自抚顺功德林赴南京解放军军事学院讲授「小部队战术」、「森林战术」及辽沈战役经验。"
      source: "刘伯承请廖耀湘讲军事课（木青）"
      source_url: "/ten_year_memorial/刘伯承请廖耀湘讲军事课（木青）.html"
      original_text: "刘伯承指名要把关押在抚顺功德林改造的战犯廖耀湘请来讲课"
      notes: ""
- year: 1955
  entries:
    - date: "1955-06"
      date_display: ""
      content: "自东北抚顺战犯管理所转押至北京功德林战犯管理所。"
      source: "接收东北时军统特务活动种种（文强）"
      source_url: "/ten_year_memorial/接收东北时军统特务活动种种（文强）.html"
      original_text: "1955年6月转到功德林来的"
      notes: "按：黄双喜记为1956年1月。文强本人也是被关在功德林的亲历者，其日期可能更为准确。"
- year: 1956
  entries:
    - date: "1956-01"
      date_display: ""
      content: "公安部在北京设立战犯管理所，将全国重要战犯集中到北京功德林。与杜聿明、范汉杰、宋希濂等200余人同在功德林学习改造。"
      source: "廖耀湘在新中国的二十年（黄双喜）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "1956年1月，公安部在北京设立战犯管理所，将全国重要战犯都集中到北京"
      notes: ""
- year: 1957
  entries:
    - date: ""
      date_display: "春"
      content: "管理所首次组织战犯外出参观，游览北京百货商店、工厂、官厅水库等。"
      source: "廖耀湘在新中国的二十年（黄双喜）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "1957年春，党和政府决定，把战犯带到各地去参观"
      notes: ""
    - date: ""
      date_display: "七八月间"
      content: "参观东北及武汉长江大桥，与李以劻相识。"
      source: "廖耀湘生平补述（李以劻）"
      source_url: "/ten_year_memorial/记廖耀湘（赵烈安）.html"
      original_text: "我与廖公相识相交是从1957年七、八月间，参观东北及武汉大桥时开始的"
      notes: ""
    - date: ""
      date_display: "秋"
      content: "到天津、鞍山钢铁厂、长春第一汽车制造厂、沈阳铁西工业区等地参观。"
      source: "廖耀湘在新中国的二十年（黄双喜）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "1957年秋，管理所组织战犯们到天津、东北参观"
      notes: ""
- year: 1958
  entries:
    - date: ""
      date_display: "春"
      content: "参观新竣工的武汉长江大桥。"
      source: "廖耀湘在新中国的二十年（黄双喜）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "1958年春，管理所又组织战犯们参观了刚竣工不久的武汉长江大桥"
      notes: ""
    - date: "1958-10-01"
      date_display: ""
      content: "参加国庆观礼。"
      source: "廖耀湘在新中国的二十年（黄双喜）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "10月1日，天将破晓，战犯们一跃而起"
      notes: ""
    - date: "1958-10"
      date_display: ""
      content: "被送至京郊秦城公安部农场劳动锻炼，在第四小组管理葡萄园，与杜聿明、文强等同组。"
      source: "廖耀湘在新中国的二十年（黄双喜）"
      source_url: "/ten_year_memorial/廖耀湘在新中国的二十年（黄双喜）.html"
      original_text: "1958年10月，管理所为了进一步推动战犯们的深入改造...来到了京郊秦城公安部农场"
      notes: ""
- year: 1959
  entries:
