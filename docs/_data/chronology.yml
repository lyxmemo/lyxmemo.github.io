      notes: ""
    - date: "1942-08-05"
      date_display: ""
      content: "抵达印度东境小镇列多，编入中国驻印军，新编第22师隶属新编第1军。全师出发时约九千余人，到达列多时仅剩约五千人，沿途病亡近四千人。"
      source: "1942年缅甸作战回忆（邓军林）"
