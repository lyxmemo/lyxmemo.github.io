    - date: "1942-06-10"
      date_display: ""
      content: "与俞飞鹏取得无线电联络，开始以飞机在太洛（Taro）附近投送粮食。"
      source: "杜聿明电蒋中正与俞飞鹏取得无线电连络开始以飞机在太洛附近投送粮食"
      source_url: "/liaos_tele/1942-06-10杜聿明电蒋中正与俞飞鹏取得无线电连络开始以飞机在太洛附近投送粮食.html"
      original_text: "职已与俞部长取得无线电联络并于本日开始以飞机在太洛TARO附近投送粮食矣"
      notes: ""
    - date: "1942-06-15"
      date_display: "5月31日至6月15日"
      content: "杜聿明率部自堪地出发，原定五日到达大洛，途中大雨倾盆、山洪暴发，官兵绝粮八日，饥病交加死伤甚重，经十五日始到达大洛。"
      source: "杜聿明电蒋中正由康地出发中途因山洪爆发官兵绝粮数日死亡甚重"
      source_url: "/liaos_tele/1942-06-15杜聿明电蒋中正原订由康地出发到达大洛中途因山洪爆发官兵绝粮数日死亡甚重到达后将疾病落伍官兵收容即向指定地点前进.html"
      original_text: "职辰卅由康地出发，原定五日到达大洛，中途大雨倾盆，山洪暴发，到处被阻，杳无人烟。官兵绝粮八日，草根罗掘皆空。饥病交加，死伤甚重。经十五日始到达。"
      notes: ""
    - date: "1942-06-29"
      date_display: ""
      content: "抵达哈巴寨。"
      source: "杨业孔电蒋中正新二十二师已全部到达哈巴采五六日后可全部到达狄棚"
