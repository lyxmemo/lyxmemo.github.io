      notes: ""
    - date: "1963-09-14"
      date_display: ""
      content: "民革在四川饭店举行招待会，康澤廖耀湘等參加工作。"
      source: "大公報 1963.09.22"
      source_url: "https://sls.hkpl.gov.hk/digital-collection/tc/contentcoverpage.html?currentPosition=18&searchId=c56e00adc51549839dcc00f56fb7934d&catalogueId=25de3e099cb711ef9c2&mainKeyword=%E5%BB%96%E8%80%80%E6%B9%98&isHKMP="
      original_text: ""
      notes: ""
    - date: "1963-11-10"
      date_display: ""
      content: "周恩来及陈毅在人民大会堂福建厅接见在京的前四批特赦人员及其家属，并合影留念。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1964
  entries:
    - date: "1964-03-09"
      date_display: ""
      content: "与其他文史专员一行抵达南京谒中山陵。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-03-27"
      date_display: ""
      content: "一行抵达杭州，游览西湖，拜谒岳飞庙，参观新安江发电站。后赴安徽游览黄山，赴江西参观南昌、吉安、井冈山等革命圣地。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-04-14"
      date_display: ""
      content: "一行抵达长沙，游览岳麓山，拜谒黄兴、蔡锷墓。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-04-15"
      date_display: ""
      content: "参观韶山。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-04-22"
      date_display: ""
      content: "一行抵达武汉，参观武汉长江大桥。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-04-26"
      date_display: ""
      content: "一行44人至湖北黄陂县横店区参观。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-08"
      date_display: ""
      content: "一行再次从北京出发，赴西北参观，先后抵达延安、西安、洛阳、郑州等地。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1964-11-05"
      date_display: ""
      content: "被特邀为中国人民政治协商会议第四届全国委员（随后写信要求加入中国共产党）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: ""
      date_display: ""
      content: ""
      source: ""
      source_url: ""
      original_text: ""
      notes: "按：同年，经康心如介绍，与中学教师张赢毓结婚。据张怡如《溥仪等人在黄陂横店参观情况回忆》（刊载于《湖北文史资料》2001-01期）所记，4月26日时已经结婚。"
- year: 1965
  entries:
    - date: "1965-01-05"
      date_display: ""
      content: "在中国人民政治协商会议第四届全国委员第一次会议上作为特邀人士当选为全国政协（兼主席周恩来）委员。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1966
  entries:
    - date: "1966-09-30"
      date_display: ""
      content: "向周恩来写信（为文史专员申伯纯同志受造反派迫害而请求保护和援助）。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
- year: 1968
  entries:
    - date: "1968-10-08"
      date_display: ""
      content: "写《有关李时雍政治及历史问题证实材料》。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
    - date: "1968-12-02"
      date_display: ""
      content: "因心脏病发卒于北京。"
      source: ""
      source_url: ""
      original_text: ""
      notes: ""
