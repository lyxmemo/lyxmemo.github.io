# Q&A 数据文件 / Q&A Data File
# 共 9 个问题
# 字段说明: question (问题), answers (回答列表), respondent (受访者), text (内容)

- question: "你是在什么契机下“认识”廖耀湘将军的？那一刻是什么打动了你？"
  answers:
    - respondent: "长亭"
      text: "认识了解小廖将军其实蛮早之前了，对抗战有了解的很难不知道他。深入了解的契机大概就是白天霖写的那段骄傲小熊了，出于一个我倒要看看你的战绩的那种心情。然后就，行吧虽然还是不服气但是理解，再然后就看了很多相关的史料书籍发现是很有趣的一个人。"
    - respondent: "Eric Liu"
      text: "看美军通信兵的照片，因发现文质彬彬的眼镜儿军官儿而认识廖将军。有正脸的孙立人和史迪威都认识，不认识平头+眼镜"
      image: "/assets/images/qa/image1.png"
    - respondent: "鱼珠前航道舵手"
      text: "一些有关辽西战役的基础性介绍，当时只是单纯对那场十万大军夤夜撤退却在瞬息之间走向溃败的过程感到不解与好奇。至于真正让我被吸引的原因，或许多少有点不太适合过审XD。最开始认识他时，留下的印象大概是一个典型的职业军人形象，带着几分近乎苛刻的一丝不苟。后来读到一些来自不同人物视角的回忆文章，才渐渐觉得他也是一个相当鲜活的人。他会说着一口带点喜感的方言、自吹自擂是家乡的“二号人物”、分不清萝卜和香菜、从小被当耀祖唤去写族谱、会暗中参与一些zz活动并押宝、手下有一群私刻公章又偷车的骄兵悍将←个人认为骄兵悍将都是长官宠出来的hhh。"
    - respondent: "新粤系军长贺司"
      text: "关于认识廖将军的契机…大概是2023年某次看老照片的时候在合照里看到了他，当时的感觉就是他好俏皮好可爱啊（？）但是真正认识到他是24年中考前某个周末的一个下午，偶然打开了《大决战之辽沈战役》，看到给到他的镜头一眼就迷住了，自信张扬很有气质😎就是这个镜头一眼万年，就此开始了故事。"
    - respondent: "原谅你一生不羁笑点低"
      text: |
        十几年前在德国留学的时候在youtube上看了很多纪录片，其中有几部印象深刻，从那时开始了解到廖耀湘将军：
        《一寸河山一寸血》，黎东方介绍说在入缅作战大反攻阶段廖耀湘的新22师和孙立人的新38师像一个出色拳击手的两只铁拳，配合默契，给日军沉重打击。从那时候起知道了这对国军少壮派双星。
        《凤凰大视野-中国远征军》，里面介绍了一些廖耀湘将军的事迹，还记得窦文涛这样介绍他：虽然其貌不扬但性格倔强砌而不舍，硬是面见老蒋，从而获得法国圣希尔军校的入学资格，他的坚韧不拔让我印象深刻。
        《凤凰大视野-铁马冰河-东北解放全记录》，里面介绍了孙立人在东北战场的黯然离场和廖耀湘指挥西进兵团从开始的意气风发到辽西大溃败的沮丧。八路军老战士都佩服新六军身处绝境依然顽强抗争的勇气和素质，令人惋惜的是种种原因导致的东西对进战略没有成功，最终廖将军兵败被俘，多少年深陷囹圄，最后成为时代的牺牲品，真是时也运也命也。
    - respondent: "醉倚烟波"
      text: "“初识”大概是小学左右吧。那时候第一次听到“廖耀湘兵团”，第一反应是：这个“廖耀湘”名字一听就很有学问，应该很厉害。不过那时候太小，又因为近代史太过惨烈所以没“敢”入坑。后来无意间看到剧版《大决战》里的形象，觉得和我想象中差距太大了，所以去看了影版。影版周志宇老师的形象塑造绝对是打动我的一方面，但真正让我感兴趣的，其实是影版莫名给我一种他的下属都很敬重他的感觉（好像这一点很少见人提及，大概是我的关注点比较惊奇吧），所以就很好奇历史上的他究竟是个怎么样的人，是不是如电影里这般有人格魅力，故而去查了资料。这算是“初见”吧，不成想初见即沦陷。对一个不十分颜控但百分百看感觉、慕强且精神洁癖的人来说，他真实的形象可能不如电影里塑造出来的那么高大帅气、精英范十足，但他相对平凡的容貌和儒雅温和的气质却意外让我觉得很“舒服”。之后越了解便越感兴趣，越感兴趣就越想了解更多，似乎陷入了某种循环……总的来说，一开始对他产生兴趣是因为名字和影视形象，或是冥冥之中的“感觉”，但真正让我无法自拔的应该是他的道德才学、战功战绩，以及令人唏嘘慨叹的最后命运。所以严格来说打动我的不是具体的某一刻某一点，而是历史的轴线上由各个“点”所构成的复杂而立体的他。"
    - respondent: "刘兴汉"
      text: "因为《大决战》。我永远都不会原谅这个电影，我变成今天这个疯疯癫癫的样子都是因为它。如果不看这个电影我根本不会变成尼龙佬，根本不会入坑近代史。它把我的人生全毁了，我做鬼都不会放过它的。"
    - respondent: "Chenshihang"
      text: |
        一开始是偶然看到一个关于第五军的视频，然后先认识的杜聿明和戴安澜，再认识的廖耀湘，喜欢小廖最初是因为觉得他的名字很好听，念起来有种唇齿留香的感觉，一些奇奇怪怪的入坑原因哈哈哈哈。后来就是去看了影版大决战，然后周老师饰演的小廖我太喜欢了，然后看着那个角色我就会想那历史上的小廖又会是什么样子的呢？好奇、探索、求知欲以及史同女某种八卦心理促使我对小廖有了非常强的兴趣，还有他本人其实也长在了我对审美点上了。
        现在认识的小廖跟我一开始印象中的廖耀湘多了一点人情味或者说就是很鲜活的感觉。比如香菜的梗，因为我基本了解的都是他光鲜的履历、战斗啊、训练啊、作为长官的那一面，也很感谢喜欢第五军和廖耀湘的同担姐姐们分享的小故事让我认识更加鲜活可爱的廖耀湘将军。
    - respondent: "Chen"
      text: "应该是看了一本远征军的小说"
    - respondent: "341"
      text: "影版大决战！意气风发的样子真的很帅，尤其是合影那幕，简直萌哉！"
    - respondent: "敲棋子"
      text: "因为写的小说人物有昆仑关和远征军的经历，因此去找了相关的材料，但也仅限于知道此人，并没有什么特别的感觉。b 站上有一些相关剪辑，记得非常清楚，有一条弹幕“应该称巴顿是美国的廖耀湘”（大致意思如此），感觉很有意思，就去搜了一下，发现此君真的是KMT 中的一股清流，因此去看了一些书籍，自此一发不可收拾。一开始其实没有什么很打动我的，或者说打动我的点太多：学霸将军，战功卓著，清廉自持，敢怼上司（？），非常自信（太喜欢这种厉害且自知的人了）等等等等，与此同时此君还极具萌点（只有一条裤子什么的。。。）。从个人来说，最打动我的点——他真的是位好领导！！！（此外还是好下属、好老师、好学生、好丈夫、好父亲、好儿子等等等等），当然，最打动人的还是彪炳史册的抗日战绩（N6A 就是缅甸日军最严厉的父亲）。"
    - respondent: "柒言"
      text: "重温《大决战》，周老师的廖将军很傲娇很可爱"
    - respondent: "Thinker"
      text: |
        初识是影版大决战（那简直就是我和众多近代人物相识的殿堂，私以为是国内目前最好的战争影片），但当初我的视线大多被我方将帅所吸引，对廖将军只有寥寥印象还夹杂着弹幕里的调侃（但是还要说周志宇老师是真的好看好看），印象最深的就是他在彰武照的相和台词（再刷还和朋友吐槽你看他一会儿就会打脸了），现在想来着实好笑；再见是上学期期末周复习 中国近现代史纲要 无聊时随意翻看的《沈醉回忆录》，然后便是老生常谈的“香菜萝卜秧梗”和“宝庆出了两个名将，一个是蔡松坡，另一个就是我廖耀湘”，真的好生动好有趣好可爱（可能是期末摸鱼印象格外深刻）。
        如果是第一次留下印象大多是因为周志宇老师精湛的演技，那么重逢时令我雀跃的便是廖将军的个人魅力。于狱中不失军人本色，不妄自菲薄，内心坚定不迷失自我…… 这些难得的品质足以打动我。
    - respondent: "明月清风我"
      text: "最初认识是在《大决战》电影啦，（“畅通无阻”确实很出名哈哈哈），当时确实不是很在意，是看了电影弹幕有他的简介，知道他是一位抗日名将，于是就找了一些资料去了解"
    - respondent: "萨尔玛"
      text: "我是在偶然看网上关于国民党将领的阅读文章中认识了解廖耀湘将军的，一开始对将军没有深入了解，越了解越觉得廖将军十分具有人格魅力。"
    - respondent: "赵美琛"
      text: "第一次听说“廖耀湘”这个名字是10多年前看电视剧亮剑时丁伟和老战友吹嘘“我一个师扫他廖耀湘一个军”orz，集中了解廖将军事迹在源于2021年在网络上看到对剧决的一片声讨，终于补看了影决和决战之后，开始四处寻找历史碎片，不可救药地爱上5A这群人。现在的印象和最初印象中单纯的军事指挥方面相比，增加了他在危险时刻依旧实事求是、秉持着为他人负责的宗旨书写证明材料的君子之风的印象，增加了对他生命最后几年在心理上承受的痛苦的感受。"
    - respondent: "🍊"
      text: "其实一开始看的是剧决，虽然感觉好离谱一股新三国味，但很喜欢光亭（美强惨），然后开始在老福特看各种同人，先看到的是薇拉，接着看了《老廖的婚后生活》，然后开始在红白，看完盈雨之后本人已经很不坚定的有偏向廖长官的趋势了，接着开始看小林（一字牛），记得特别清楚是在八月底看的，然后特别遗憾没看到远上寒山，于是一边追小林一边找资源，终于让我找到了！一开始觉得杜好迷人，看完之后已经深深爱上廖无法自拔！最打动我的应该是特殊时期替下属写证明材料那段（或许别人也有吧但我已经有滤镜了），对一个，被释放重获新生的战犯，身处特殊时期，能这样做在我个人看来是很不容易的（但或许在廖长官看来再正常不过了），超有人格魅力诶！（重复刷影决更是把我牢牢按到坑底）"
    - respondent: "睦月"
      text: "开始于朋友写的远征军相关的文，初始印象是很可爱但又很会打仗的将军。我想我现在依旧是这样觉得的，只是比起之前停留在形象、言语、战绩这样浅显的东西外，更是逐渐看到了将军的待人接物、情绪起伏以及超前的军事思想。他的言语变得有声音，形象也变得有血有肉，并带着一股湘楚人杰地灵的气息，也是一种“可爱”。一旦想起在离我似远似近的时空里竟有这样一个人真实地存在着，便难免激动。"
    - respondent: "dashwood"
      text: |
        因为喜感表情。25年5月在b站刷到5a群像（bgm：不老梦），视频里杜、郑、戴、邱本尊照片都是证件照级别，而廖将军的照片一出来，画风突变，表情相当喜感，和前四位形成鲜明对比。当时想，这人谁啊，表情这么逗。虽然那时刚看了《沈醉回忆录》片段和电影《决战之后》，但啥也没记住。直到6月底的一天，我在长沙南站漫无目的地转悠，脑子里闪现“廖耀湘”这个名字，一时想不起在哪儿看过，心想：看名字应该是湖南人吧。到现在我也不知道为什么那时会突然想起这个名字，可能宝庆第二名人在长沙南站发力了（ bushi）。返程后，开始阅读廖将军相关资料，尤其是建楚bot老师和各位录入及校对文字的老师们共建的资料库，赞美并感谢老师们！！

- question: "现在你认识的他，和一开始的印象又有什么不同？"
  answers:
    - respondent: "长亭"
      text: "最开始的印象就是金丝眼镜法国留子，远征军扛把子之一。现在就是，谁能不喜欢一只充满生活气息的分不清香菜胡萝卜的骄傲的可爱小熊将军呢。"
    - respondent: "Eric Liu"
      text: "刚认识，所以没有对比。"
    - respondent: "鱼珠前航道舵手"
      text: "歪个题，n22d新兵入伍那期报刊上的照片吧，可以证明们小廖不矮只是脖子短（？）不不不，全因我们是——创造中国的新！生！命！"
    - respondent: "原谅你一生不羁笑点低"
      text: "十几年前觉得他指挥具体的战斗还可以，遇到大兵团作战力有不怠；现在看来就是时运不济，他已经在他的位置他的时代做出了他作为一个专业军人的最优选择，战争走向不会因为一个人而改变，真是时也运也命也。"
    - respondent: "醉倚烟波"
      text: "如果说一开始他给我的印象是名字听着很有学问（第一次知道他的时候），性格颇为骄傲自负（看影决的时候），那么现在大概就是：他岂止是名字听起来有学问，他就是很有学问！至于性格方面，一开始看影决的时候会觉得他是那种被塑造出来的典型的国军将领的形象，自信自负自命不凡。但现在倒是觉得，他其实不太像国军的将领。所谓的说他骄傲狂妄，更像是是他本身性格给人造成的一种误解。我现在依然觉得他确实是一个很骄傲的人，但这不是说他自命不凡、自认为功过于人，更不是说他轻视别人，目中无人。我理解的骄傲，更像是一个耿介率直的内敛的人身上杂糅了君子、军人和知识分子等多种身份后，被学识阅历所润养出来的，连他自己都没有意识到的那种不经意间流露出来却不能被人理解和包容的独特气质。"
    - respondent: "刘兴汉"
      text: "区别的话，其实不大。读关于他生活上的细节的史料时会感慨“确实是湖南人啊”、“嗯，法国留学生”。大概这样。"
    - respondent: "Chenshihang"
      text: "欣赏的瞬间太多了，第一次远征、缅北反攻、芷江受降在我这里就是属于他的最为意气风发的时刻，至于为什么提第一次远征呢，可能对于大家来说都是不太好的回忆，但是我的感受上层指挥的失误不影响新22师在解200师之围时的出色表现，所以我也把这段不太温和的回忆加了进去。意难平的瞬间，一个是野人山撤退，野人山撤退是整个第一次入缅远征军的悲剧，不局限于小廖一个人，其实这场悲剧我最遗憾还是戴安澜，一个是辽沈战役，不是说我希望kmt赢哈（狗头保命）只是针对小廖本身我觉得这场战役给他的局限太多，特别是他的同事领导限制太多，以及在两位领导对于九兵团撤退地点有着不同意见的情况下，却都不太愿意承担这个责任时，就是谁都没有给小廖下一个明确的撤退命令，这也是一点小小的意难平吧。"
    - respondent: "341"
      text: "一开始是很刻板印象里的kmt将军那种（比划）但是后面越吃资料越发现这个人的可爱之处，，，"
    - respondent: "敲棋子"
      text: "一开始的确崇拜居多，但崇拜容易将人神化；现在再看，感觉他还是一个人嘛。（高质量人类就是了（bushi））。"
    - respondent: "柒言"
      text: "比初识更立体更有魅力了"
    - respondent: "Thinker"
      text: "前文中提到了一开始对他的了解是通过影片和他人的回忆录，选取的大多都是他失意或者战败的素材，所以最初对他的印象底色大多是悲情的，总是绕不开失苦闷；但随着进一步的了解，我看到了他过往的从军经历，抚摸着那些好似仍有硝烟之气、兵戈轰鸣之声的文字，发现我简直太片面了，那些如此有灵气的战法让我眼前一亮，再看他的照片，还有那些被下属抑或同僚记载下来的战时趣闻和照片中标志性的黑框眼镜和歪头笑（这也太可爱了吧，怎么能这样反差萌呢），他的形象在我心目中愈加清晰全面，一时间就更爱了（说来也奇怪，要是只看照片的话谁想象得到看着这么可爱憨厚的一个人有这么敏锐的战争嗅觉和这么传奇又波折的经历呢，廖将军咱俩都要好好思考一下了）。"
    - respondent: "小嘻"
      text: "机缘巧合。偶然在 B 站看到影版《大决战》，周志宇老师气宇轩昂，指挥若定，强大的气场立时吸引了我。弹幕上“建楚之才，名耀三湘”的评价与人物形象相得益彰，自此，廖耀湘这个名字便在我的脑海中挥之不去。于是，我开始沉溺于各种边边角角的资料中，试图从历史的碎片拼凑出一个完整的他。那个夏天，我把自己关在小房间里，一遍又一遍地浏览屏幕上的那些文字，敬佩、遗憾、无奈、痛惜在心里不断交织、翻腾。建楚前半生之传奇与落幕之凄凉形成了强大的张力，不断冲击我的心灵。就这样，另一个时空里的他，成为我生命中最重要的人之一。"
    - respondent: "明月清风我"
      text: "一开始我认识的他，因为是在电影，所以是比较平面的：一个gmd将军兵败被俘，仅此而已。但现在不同了，他很爱笑，照片里几乎都有大大的笑容，也是个很温和，重视友情的人，叫他廖小熊一点都不为过呢hhh"
    - respondent: "🍊"
      text: "在阅读小说和观看影视作品的过程中，他对于还说可能还处于纸片人的阶段；那么在看各种小故事和网站上的材料（疯狂为建楚bot打call）的过程中，则是不断为他充盈血肉。不抽烟不喝酒不好色，没有不良习惯，深谙军事但又像个学者（我觉得他好儒雅！）"
    - respondent: "dashwood"
      text: |
        从初印象喜感到现在的崇敬。越看越喜欢越佩服，作家谢冰莹说他是“十全十美的君子”，毫不为过。廖将军一代儒将，其学识、能力及品行无不出众。
        他的很多故事不仅让人印象深刻，更让人敬服。比如：1.学习英法双语的拼劲，少年时熟背《英华字典》，赴法后要求先进法国小学，向小学生学习发音及口语，并每天专读军事科技相关专业词汇在一万以上。这种学习方法和态度令人非常钦佩。2.大难不死、知恩图报，在和广舒老人及其全家的帮助下，逃离失守后的南京，也睡过坟地，也藏身于乱尸中，持枪侧卧防备时还差点被近敌发现，整个过程很惊险。抗战胜利后，他专程拜见和老，并帮其开设米铺以报恩情。这种知恩报恩之举让人与人之间有了温暖，情深义重，为之动容。3.战法灵活、力克强敌，斯瓦阻击战中，孤军奋战、以少敌众、虚虚实实，牵制敌人达半月之久，顺利完成阻击任务，光亭将军曾评价“在我抗日远征史上这是罕见的战例”；孟拱河谷战役中，仅以四个步兵团兵力，击败号称“常胜军”“森林战之王”的敌第十八师团，创森林战典型（该师团在1937年12月初攻陷了我家乡，血债累累，真的非常非常感谢保家卫国的英雄，致敬中国远征军）。
        关于他的故事很多很多，说不尽道不完，总之，是非常宝藏的廖将军～

- question: "在所有关于他的历史碎片中（战役指挥、性格轶事、照片神态等），哪一个瞬间或哪一个侧面让你最意难平或最欣赏？"
  answers:
    - respondent: "长亭"
      text: "其实是和夫人的结婚照…每次看都有一种意气风发家庭美满的人生在东北的风雪里和照片一起褪色的遗憾。结婚照太幸福了，所以就更遗憾了。"
    - respondent: "新粤系军长贺司"
      text: "最欣赏的话，大概就是真的觉得他有种“出淤泥而不染，濯清涟而不妖”的气质，感觉他的所有品质放到那个环境都特别特别难得…完美将领出现了orz！！以及好喜欢他笔下这种“朝花夕拾”（？）的淡淡的哀思感和满足感…还有意难平💢死的太不能让人接受了！每每想起都很难受。辛苦了小廖！…"
    - respondent: "原谅你一生不羁笑点低"
      text: |
        都是意难平：
        1.  辽西战场被俘，一代将星，终是无法力挽狂澜。
        2. 68年去世，当初的意气风发的少年，变成了风烛残年的老人，但也没躲过时代的洪流。
    - respondent: "醉倚烟波"
      text: "他的失败当然是最意难平的，但还有他的离世、他生前身后横被口语以及他不被人知的功绩。曾经的荣耀与苦难都已随身而殁，感觉他整个人都让我意难平。"
    - respondent: "刘兴汉"
      text: |
        是缅甸时期，他在车上镇定的站着，别人要他躲避敌军炮火他拒绝，说能击毙他的子弹还没造出来的那一幕。
        当时看到这里心跳都加快了，太帅了，我如果在现场的话绝对会移不开眼。
    - respondent: "Chenshihang"
      text: "形容他的词：才华横溢（指指挥战斗以及训练士兵）、质朴、爱兵如子、还有某种天之骄子的感觉、鲜活可爱、很萌很萌的teddy bear。"
    - respondent: "Chen"
      text: "行事谨慎和务实的作风最让我欣赏，感觉小廖偏行胜于言的类型。最意难平的就是他被俘……和家人到死也没能见面…他本该有很好的结局😭😭😭"
    - respondent: "睦月"
      text: "从功德林被特赦时。很难讲清楚我在意难平什么，只是时也命也的感叹。"
    - respondent: "341"
      text: "啊啊啊啊一时间忘记是那张照片了，总之歪头笑着的，一下子就感受到原来很遥远的人其实也曾是那么鲜活，那样舒展，，，"
    - respondent: "敲棋子"
      text: "那必然是 1945 年 9 月率 N6A 谒拜中山陵，在车牌号为“湘字 0001”的车上的那几张照片，何等的意气风发！"
    - respondent: "柒言"
      text: "最欣赏的:廖将军和N6回南京，照片里的廖将军实在是太太太意气风发了"
    - respondent: "Thinker"
      text: |
        感觉有好多啊，选最好难……
        最意难平的是他意外早逝。他挣脱了南京的炼狱，躲过野人山的密林，最后悄无声息地却折在和平年代的角落，过早的满头白发，没有亲朋好友相伴，有的只是无尽的指责与谩骂，他本是那么骄傲的人啊，真的太可惜太可惜。
        最欣赏的是他在功德林里的那句话“宝庆出了两个名将，一个是蔡松坡，另一个就是我廖耀湘”。初闻是觉得他傲娇自夸，逗人一笑，但是再细看过他复杂波折的前半生之后，又对这句话有了新的理解:觉得这份心性很难得，既是身陷囹吾的聊以自慰，也是对于自身价值的自我肯定，真的是很好很好的廖老师。还有他打那一手漂亮灵活的战役、超高的学习与总结能力（廖老师你教教我嘛，当初看你一天背一万个单词真的好可怕）、严格高尚的个人修养……简直太多太多了！
    - respondent: "明月清风我"
      text: "昆仑关！！！梦开始的地方。对待这场战役，我的感情很复杂，我当然欣赏他，欣赏一位将军在战场挥洒热血与侵略者决战。但也有意难平，几年后内战时，他是否会想起那段艰难却温暖的中国人民团结在一起的时光呢？"
    - respondent: "萨尔玛"
      text: "所有历史碎片中，1945年廖将军带领新六军接收南京时，他意气风发的样子还笑着的瞬间，我最欣赏。"
    - respondent: "赵美琛"
      text: "最意难平是一句 “他说我们不抗日！”"
    - respondent: "🍊"
      text: "这张！（翻相册没找到，在老师的视频里截的）看的我好心痛啊啊啊，感觉布满了沧桑与惆怅，虽然被特赦可喜可贺，但和之前的意气风发对比我要被刀晕了"
      image: "/assets/images/qa/image7.png"
    - respondent: "dashwood"
      text: |
        最戳萌点的是，他特别爱笑，好多照片都乐呵呵的，还总爱歪头（怀疑此习惯是因为拍照被挡镜头而养成的，哈哈哈），大家都说看着性格真好，感觉很好相处；还是理想的上班、干饭搭子，跟着廖长官，能比平时多炫几碗饭，但前提是他吃饭时不谈工作。
        最意难平的是，磊落君子却落幕凄凉，耀眼夺目是他，落寞悲凉也是他。无论是陈列于建川博物馆的材料“他们只是执行我的命令而已”，还是去世前一周的谈话记录，还是“他说我们不抗日”，无不引人伤心落泪。多少次死里逃生却没能走出肃杀的凛冬（他一南方人应该挺怕冷吧？），“临终时眼睛开着而不瞑目”。他有如出鞘的利剑，在印缅直插敌人要害，然而青锋最终难以入鞘。自古英雄如红颜，数遍人间不待老。

- question: "如果用几个词或一句话来形容他，是什么？"
  answers:
    - respondent: "长亭"
      text: "流水落花春去也。"
    - respondent: "Eric Liu"
      text: "军事天才"
    - respondent: "鱼珠前航道舵手"
      text: "专业、勤奋、认真。"
    - respondent: "新粤系军长贺司"
      text: "书生意气 铁血将才 憾生于乱世棋局（TT可惜啊如此有才的一个精英最终变成了政治里的困兽）"
    - respondent: "原谅你一生不羁笑点低"
      text: "“时来天地皆同力 运去英雄不自由”"
    - respondent: "醉倚烟波"
      text: "文艺版——君非池中物，奈何云雨蛟龙，困死在池中。通俗版——似乎除了八字不好什么都好。"
    - respondent: "刘兴汉"
      text: |
        “孰知不向边庭苦，纵死犹闻侠骨香”。
        他是一个坚毅果决的人。
    - respondent: "Chenshihang"
      text: "想对他说的话：亲爱的廖司令长官，我真的很喜欢您也很敬佩您，也会尽全力让现在的我们都记得您的存在和事迹，希望转世而来的您会拥有更加安稳、美满的人生，如果真的有来生的话……"
    - respondent: "Chen"
      text: "我想也许我没办法用几个词形容他，出于粉丝滤镜恨不得把所有赞美之词都给他哈哈哈哈哈哈哈会比较偏颇，首先是毫无疑问的军事天才！其次给我比较深刻印象的就是他人比较内敛一些，不是那种大开大合的性格。"
    - respondent: "341"
      text: |
        反差萌（看着这么软和的一个人，底色是严谨，雷厉风行的）
        小熊（谁看到他柔和笑着的样子不会心软软，，）
    - respondent: "敲棋子"
      text: "将中之将。"
    - respondent: "柒言"
      text: "可爱、可敬、可惜"
    - respondent: "Thinker"
      text: |
        一身转战三千里，一剑曾当百万师。
        军人是廖老师身上最鲜明也最深刻的标签。长洲岛的报国青年，塞纳河畔的赤诚才子，南京城的无畏勇士，昆仑关隘的坚实后盾，异国他乡的战术大师，芷江金陵的民族英豪，白山黑水处的折戟帅才……前半生的每一帧侧面都透着军人的本色，不失为最大特点最纯正的标签。
    - respondent: "明月清风我"
      text: |
        沧海横流，方显英雄本色
        青山矗立，不堕凌云之志
        曲径危桥都历遍，出来依旧一吟身
    - respondent: "萨尔玛"
      text: "博学，勤奋，有趣，可爱。"
    - respondent: "赵美琛"
      text: "专业、忠诚、直率、君子、书虫、硬核??哈哈（结合廖的文字材料和字迹，对比邱和廖任N22A师长的胸章等）"
    - respondent: "🍊"
      text: "有胆有识 风骨铮铮"
    - respondent: "睦月"
      text: "抱憾却无悔，敬意在心，言语难表。"
    - respondent: "dashwood"
      text: |
        是天空的雄鹰，是丛林的猛虎，是可爱的小熊，是殊异乎公族的美玉。

- question: "如果时空可以折叠，你有一分钟的时间站在他面前，或者单纯想对他轻轻说一句话，你会说什么？"
  answers:
    - respondent: "长亭"
      text: "别人是否定不了你精彩的这一生的，好好照顾自己。"
    - respondent: "Eric Liu"
      text: "Général Liao, bonjour à vous.  您在印缅战场上的指挥，帅爆了！打出了中国的军威！"
    - respondent: "鱼珠前航道舵手"
      text: "永远感谢您为中国抗战做出的贡献，谨向您致以深深的敬意。（鞠躬）"
    - respondent: "新粤系军长贺司"
      text: "（…好像没有什么很深情庄重想说的）大概就是，感谢陪我一路走来那么多年，让我了解到了学到了很多，充实了自己的生活，拥有了很多因为你带来的乐趣和朋友…后世还有很多很多喜欢你的人，你虽然离开了很久但是因为您的事迹 您的魅力 在后世连接了一群还爱着您的人，谢谢！TT"
    - respondent: "原谅你一生不羁笑点低"
      text: "“不要去东北战场，拉着孙立人坐着船，吃着火锅唱着歌，一起去接收名古屋吧。”"
    - respondent: "醉倚烟波"
      text: "太平亦是将军定。纵黄肠不悯，青史不彰，也总该有人记得你（们）曾经的荡气回肠。"
    - respondent: "刘兴汉"
      text: "我知道一个地方长年需要会带骑兵的，后来还能有非常好的炮兵。你找文强打听打听他表哥。你给他说说你能下农村调研，你问问他那里还要人不要。"
    - respondent: "Chen"
      text: "建楚，谢谢你在战争中做出的一切努力。在多年后依然会有人从历史中看清你是怎样的人，知道你们做过哪些事，付出了什么。"
    - respondent: "341"
      text: "啊啊啊啊啊一定要说的话大概就是希望对方身体健康平平安安这样的东西，毕竟战场上死亡和明天不知道那个会先到来，，"
    - respondent: "敲棋子"
      text: "大概真的一句话都说不出来，可能会止不住流泪，然后狠狠拥抱。如果还有时间的话就把约稿给他看，并问道：“帅吗？”"
    - respondent: "柒言"
      text: "保重身体"
    - respondent: "Thinker"
      text: |
        因为是除夕夜写的回答，所以首先肯定是向他道一声：廖将军，新年快乐！
        然后想告诉他“您一生的故事，我用一生铭记”。您永远是宝庆的骄傲、邵阳的骄傲、湖南的骄傲、中国的骄傲，也是全世界的骄傲！永远会有人记得你的才华、记得你的壮志、记得你的智慧！
        接着，廖老师我有个不情之请，想请您讲讲您当年的故事，讲讲您的战友、您的家人，还想看您统帅骑兵的样子（春晚刚好播到青海玉树的骑兵战士们）……还有好多好多。廖老师要不我们找个饭馆边吃边聊吧！哦，对了，我吃不得辣的，委屈廖老师这次将就一下吧。
        最后，廖老师，请您好好看看这个国泰民安的新中国，她的诞生也有您的一份努力，这盛世如您所愿！
    - respondent: "明月清风我"
      text: "建楚，我想过见到你的情景，我一定会落下泪来，我不希望你功成名就，我希望你永远健康，开心快乐"
    - respondent: "萨尔玛"
      text: "如果时空可以重叠，我想对廖耀湘将军说：感谢您和先辈在抗日战争中的贡献，让我们今天过上和平幸福的生活。您的好学精神特别鼓舞我，得向您学习。另外，我真的很喜欢您！"
    - respondent: "赵美琛"
      text: "我是从2026年回来的人，您的事迹终会得到公正的评价，后世有许多人崇敬纪念您，我想熟读马哲经典的您会明白历史是螺旋上升的，不要绝望，不要情绪剧烈波动，关注血压血糖血脂，见证这世界上发生的一切。（打完这段文字觉得自己好像骗子，估计也起不到什么作用，默默希望能像远山寒山里那样尽量地弥补一些历史上的遗憾）"
    - respondent: "🍊"
      text: "想告诉他一定要好好保重身体，健康饮食，注意心脏问题呜呜"
    - respondent: "睦月"
      text: "不会说什么，只是看着他，记住他。"
    - respondent: "dashwood"
      text: |
        建楚将军，回家吃米粉/卤菜咯，要变态辣，哈哈哈。

- question: "最好奇或想看他哪方面的材料？（录音/家书/日记/等等…）"
  answers:
    - respondent: "长亭"
      text: "日记。"
    - respondent: "Eric Liu"
