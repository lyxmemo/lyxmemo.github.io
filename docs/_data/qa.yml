    - respondent: "小嘻"
      text: "喜欢上他之后，我在不知不觉中戒掉了身上的弱者气息。纵观建楚的一生，虽结局令人唏嘘，过程却足够精彩，这让我对生命的意义有了更为透彻的考量。以往我总是习惯于被悲观情绪笼罩，被畏难情绪左右，抱怨我没有生活在更好的环境里、没有获得更多的资源。在了解他的过程中，日渐觉悟自己以往的生活态度并不可取。从立志投军到毅然留法再到南征北战，他的人生历程尤其是翻越野人山的经历，让我受到了一次又一次的精神洗礼。他笃行不怠、骁勇无畏、昂扬向上的精神和救民族于危难之中的责任感也让我逐渐意识到，人的一生需要尽力去做一些有价值、有意义的事情，在有限的条件内创造无限的可能性。而不是毫无节制地伤春悲秋，畏首畏尾，怨天尤人，以致年华虚度。虽前路多艰，付出并非有回报，亦需以热忱之心全力以赴，享受每一次奋力拼搏的过程。"
    - respondent: "Siyuan"
      text: |
        亲爱的建楚bot_，
        首先非常感恩您为建楚所做的一切，也感谢自己终于可以鼓起勇气下定决心来谈一谈廖耀湘将军给予我自己的精神鼓励。
        我想先谈一谈自己在美国的学习和生活，因为这一段经历给我提供一个完美的了解抗日战争及优秀国民革命军将领的平台。我在美国求学期间，曾有过一段在企业工作的经历，之后又重返校园继续攻读博士，当我驱车穿越了无数乡村及田野来到学校所在的小城时，我还没有意识到这座小城会带给我无尽的欢喜与悲伤。
        在这所大学我开始了紧张而又孤独的读博生涯，这是一个有着严冬与酷暑的城市，在高压的科研环境下，校园里的图书馆成了我科研不顺时的避风港，在这里我第一次体验到了跨图书馆全美借书的方便与快捷，我也有幸读到了关于将军们的竖版繁体字图书，我先后借阅了子珊行述——方先觉将军哀荣录、廖耀湘将军逝世十周年纪念专辑、长沙常德衡阳血战亲历记、胡公伯玉纪念集和民族战士邱清泉等书，同时，在网上，我也努力找寻着他们的印迹，以至于陆军军歌、空军军歌、黄埔军校校歌这些在大陆已经销声匿迹的歌曲都已深深烙印进我的脑海中。
        我必须得承认廖耀湘将军给我的第一印象并不是那么完美，甚至我一度觉得他是一个有一些自大的人，我是从子珊行述——方先觉将军哀荣录这本书中第一次看见了廖耀湘这个名字，书中的廖耀湘评价衡阳会战为不人道的战争，他这一番“高论”引起了第十军战士们的不满，也激起了我对廖耀湘这个名字的好奇，毕竟敢于在公开场合这么张扬的“贬人褒己”的人，在我们华人圈中还是不太常见的存在。于是，我开始主动查找关于廖耀湘将军的资料，当我了解到将军字建楚、名耀湘时，我不由得为其名与字之间的对仗工整、意义互文而发出感叹；当我读到少年廖耀湘为争取留法名额而勇闯校长办公室时，一个活泼开朗而又积极向上的少年英雄的形象在我的脑海里浮现；当我读到廖耀湘将军率领新22师在瓦鲁班剿灭日军第十八师团并得到校长“中国虎”的赞誉时，我仿佛看到了他微微上扬的嘴角；当我读到他在主持完南京受降仪式后，亲自前往南京郊区拜访曾经营救他逃出南京围城的老农并告知老农道“老兄，我们赢了”时，我的泪水夺目而出，这短短的六个字仿佛是中国历史借中年廖耀湘之口讲出，既歇斯底里又云淡风轻……自此，廖耀湘将军在我心中不再是那个自大傲慢的人，他只是一骄傲纯真的属于战场的“书呆子”。
        在实验室中，我的课题也一度取得了非常大的成功，我发表了自己的第一篇一作文章，此时，我觉得自己一定能顺利毕业……可是，谁曾想到情况竟然急转直下，导师让我接手了一个本不属于我的全新课题，一个和原方向毫不相关的领域，我硬着头皮去做，但实在是无法在短时间内理出头绪。最终，博士资格考试未能通过，只能拿一个硕士学位离开……
        
        那时正值严冬，我好像死在了那个极寒的冬天。“这难道就是1948年建楚的境遇吗”我不停的反复问自己。在网上有位网友用故人叹这首歌曲给大决战里面有建楚出现的镜头作为配乐，我每一次看都泪流满面，那悲凉沧桑的歌词为剧中建楚怅然若失的背影做了最深刻的注解。我记得考试失败后的某一个傍晚，我在这个小城中冒着大雪漫无目的的游走，循环播放着这首歌，那一瞬间我甚至分不清我是在为自己哭泣还是在为建楚哭泣，只是由着那些悲怆的歌词和曲调缓缓的流入自己的意识……
        
        风沙漫延　扰乱晴天　丹心照明月
        遥望城外　兵器相见　浮生又一劫
        
        最后的城墙破开　登高望海　一片烟火海
        
        无能为力　尸变满地　故人心已远
        
        在之后的日子里我像一只受伤的狮子一样无力的舔舐着自己的伤口，每当我坚持不下去的时候，我就会跑到旷野中让风儿任意的吹打着我的思绪，只有这样我好像才能意识到自己的生命再继续，自己在成长，就像您为建楚配乐中唱的那样“泥土啊，刨开吧；种子啊，在挣扎，生长啊，生长啊，秋冬与春夏”。离校的前夕，我归还了所有的图书，当然也包括和建楚相关的图书，在图书管理员接走那些书籍的时候，我感到了失落，但我不会悲伤，因为是书中的主人公们陪我走过了这一段既充满欢笑又充满泪水的努力奋斗的日子，而他们也早已成为了我生命中不可或缺的一部分。
        
        我知道我用了很大篇幅来记述自己的境遇，而且我用自己的境遇来和建楚的境遇作类比是不恰当且狂妄之极的举动，可是我确实因遭遇失败而更懂他，我由衷的感谢他陪我走过我人生中至暗的时光。
    - respondent: "dashwood"
      text: |
        有。学习上的用功刻苦，工作上的讲原则、有担当，人际交往上的有情义，道德品行上的君子作风，都让我终生受益。尤其是低谷时，看着廖将军的小故事，想着他会怎样渡过困难，于是内心变得更平和更安静。
        ————————————————————
        最后想说：在廖公馆的时候，展厅门推不开，有位游客大哥帮着推开了虚掩上的门。他并不知道廖将军，于是问：“你为什么来这里？”我说：“因为他是英雄。”然后整个展厅只剩下我一人，眼泪就默默下来了，当时眼前是展厅芷江受降照片。回来后给廖将军写了一段词，附后：

        小院石径初凉，几经沧桑
        水光塔影依旧，试问前尘过往
        只是草木不言、落花不语
        惟有四季更替、时间作答

        满屋照片是你的峥嵘岁月、赫赫战功
        而今庭前故人远去、繁华落尽
        秋露频频滴落，犹似无声垂泪
        你是天空的雄鹰，为何会那样玉碎？
        到底用什么能把你留住？
        又怎样才算与你相逢？
        是览尽文字、笔迟墨落
        徒留万千愁、长嗟叹，望黄尘古道，远上寒山
        是读罢史书、灯下沉吟
        只道千古恨、从此灭，忆往事悠悠，烟消云散
        是赴远千里、寻迹凭吊
        却见小村坞、苔痕绿，感秋风不尽，故居寂寥

        曾念家舍著花未
        如今枯藤荒陌，尘埃满梁
        一抔故土，天涯断肠
        资江上疏雨初歇
        乡音悠远，天际茫茫
        犹唱百年风霜
        雁南度，远征时
        鼓角阵阵，寒光凛凛
        一剑出鞘敌胆寒
        秦淮月，燕京雪
        此去是经年
        多少事，憾无边

