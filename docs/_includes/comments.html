{% if site.comments.enabled %}
<div class="comments-section">
  <hr>
  <h2 id="comments">评论</h2>
  <p class="comments-hint">欢迎留言，无需登录即可评论。</p>

  {% if site.comments.provider == "waline" %}
  <div id="waline"></div>
  <link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css" />
  <script type="module">
    import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';
    init({
      el: '#waline',
      serverURL: '{{ site.comments.waline.server_url }}',
      lang: '{{ site.comments.waline.lang | default: "zh-CN" }}',
      placeholder: '{{ site.comments.waline.placeholder | default: "欢迎留言" }}',
      pageSize: {{ site.comments.waline.page_size | default: 10 }},
      avatar: '{{ site.comments.waline.avatar | default: "mp" }}',
      meta: ['nick', 'mail'],
      requiredMeta: [],
      pageview: true,
      comment: true,
    });
  </script>
  {% endif %}
</div>
{% endif %}
